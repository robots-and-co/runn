<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2f4a6b">
<title>Runn</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<style>
  :root {
    --bg: #f8f5ef;
    --surface: #fffdf9;
    --surface-2: #f1ece2;
    --ink: #2a2622;
    --muted: #8a8278;
    --border: #e6e0d6;
    --brand: #2f4a6b;
    --accent: #b85c1f;
    --user-bubble: #2f4a6b;
    --user-ink: #f8f5ef;
    --ai-bubble: #ffffff;
    --list-w: 340px;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; }
  /* App shell: the page itself never scrolls — scrolling lives in the inner
     regions (.job-list, .turns, …). Without this lock a tall job list scrolls
     the whole document on mobile, pushing the pinned + Job foot below the fold. */
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .app { display: flex; height: 100dvh; }

  /* ── Left: job list ─────────────────────────────── */
  .list-pane {
    width: var(--list-w);
    min-width: var(--list-w);
    height: 100dvh;          /* hard boundary so the foot reserves space and the */
    min-height: 0;           /* job list (not the pane/document) is what scrolls  */
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    perspective: 1600px;
  }
  /* The swappable list body (jobs ⇄ invoices). The $ total flips it on its
     vertical axis; the fixed header stays put. */
  .list-flip {
    flex: 1; min-height: 0; display: flex; flex-direction: column;
    transform-origin: center center; backface-visibility: hidden;
  }
  @keyframes listFlipOut { from { transform: rotateY(0); opacity: 1; } to { transform: rotateY(-90deg); opacity: 0; } }
  @keyframes listFlipIn  { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }
  .list-flip.flip-out { animation: listFlipOut .15s ease-in forwards; }
  .list-flip.flip-in  { animation: listFlipIn .26s ease-out forwards; }
  @media (prefers-reduced-motion: reduce) {
    .list-flip.flip-out, .list-flip.flip-in { animation: none; }
  }
  .list-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .list-head .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--accent); color: var(--bg);
    display: grid; place-items: center;
    border: 0; padding: 0; cursor: pointer;
    font-family: inherit; font-size: 15px; font-weight: 700; line-height: 1;
  }
  .list-head .logo:hover { filter: brightness(0.92); }
  .list-head .logo:active { transform: translateY(1px); }
  .list-head h1 { font-size: 17px; margin: 0; letter-spacing: -0.2px; }
  .job-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .job-row {
    display: flex; flex-direction: column; gap: 4px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .job-row:hover { background: var(--surface-2); }
  .job-row.active { background: var(--surface-2); box-shadow: inset 3px 0 0 var(--accent); }
  /* Due urgency — a left bar + faint wash so today/overdue read louder than
     the rest. The open (active) row keeps its own treatment. */
  .job-row.due-today:not(.active)   { background: #fbf4ea; box-shadow: inset 3px 0 0 var(--accent); }
  .job-row.due-overdue:not(.active) { background: #fcefec; box-shadow: inset 3px 0 0 #b23b2a; }
  .job-row.due-overdue .title { color: #8a3a2e; }
  /* Urgent — the loudest of the soft treatments: a stronger left bar, a faint
     warm wash and a heavier title. Same vocabulary as overdue, one notch up. */
  .job-row.is-urgent:not(.active) { background: #fdeceb; box-shadow: inset 3px 0 0 #d23a2a; }
  .job-row.is-urgent .title { color: #8a2e2a; font-weight: 700; }
  .job-row .title {
    font-size: 15px; font-weight: 600; line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .job-row .title.untitled { color: var(--muted); font-weight: 500; font-style: italic; }
  .job-row .meta { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .job-row .meta .meta-client { justify-self: start; min-width: 0; }
  .job-row .meta .meta-due    { justify-self: center; }
  .job-row .meta .meta-status { justify-self: end; }
  /* Experiment: in-card client/status chips read as plain-ish text (no pill,
     lighter weight) so they sit quieter than the job title above them. The
     meaningful text colour is kept; only the loud background is dropped. */
  .job-row .meta .chip {
    background: none; padding: 0; border-radius: 0;
    font-size: 12px; font-weight: 500; line-height: 1.4;
  }
  .job-row .meta .chip.tap:hover { filter: none; text-decoration: underline; }

  /* Lives as a direct child of .list-pane (NOT inside .list-flip): the flip
     container sits in a 3D context (perspective + backface-visibility) that can
     clip/displace descendants, which is what pushed + Job off-screen. Kept out
     of that context and flex-shrink:0, it's always pinned at the pane's foot. */
  .list-foot { flex: 0 0 auto; padding: 12px; border-top: 1px solid var(--border); }
  .btn-newjob {
    width: 100%; padding: 12px; border: 0; border-radius: 10px;
    background: var(--brand); color: var(--bg); font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn-newjob:active { transform: translateY(1px); }

  /* status + client chips */
  .chip {
    display: inline-flex; align-items: center;
    padding: 4px 12px; border-radius: 999px;
    font-size: 13px; font-weight: 600; line-height: 1.5;
    background: var(--surface-2); color: var(--muted);
    white-space: nowrap;
  }
  .chip.client { background: #e7eef6; color: var(--brand); }
  .chip.st-urgent   { background:#ffdcd8; color:#c1302a; }
  .chip.st-open     { background:#e8e4db; color:#6b6357; }
  .chip.st-doing    { background:#dcebff; color:#1f5fb0; }
  .chip.st-review   { background:#fff0d6; color:#a9711a; }
  .chip.st-done     { background:#dff2e3; color:#2f7a45; }
  .chip.st-invoiced { background:#e7e2f5; color:#5b48a8; }
  .chip.st-paid     { background:#d7efe0; color:#1f7a55; }
  .chip.st-blocked  { background:#ffe1dc; color:#b23b2a; }
  .chip.st-hold     { background:#ececec; color:#777; }
  .chip.st-note     { background:#faf3c0; color:#897a1f; }
  /* selectable status chip — click opens the status picker */
  .chip.pick { cursor: pointer; }
  .chip.pick::after { content: '▾'; margin-left: 5px; font-size: 11px; opacity: .55; }
  /* In-card chip that toggles a filter on click — no caret, just a tap target. */
  .chip.tap { cursor: pointer; }
  .chip.tap:hover { filter: brightness(0.95); }

  /* due-date chip (header): a pill that opens the native date picker, plus an
     optional clear ×. .overdue reddens a past, not-yet-finished due date. */
  .due-chip { display: inline-flex; align-items: center; flex-shrink: 0; position: relative; }
  .due-set {
    display: inline-flex; align-items: center;   /* match .chip's box so heights line up */
    font: inherit; font-size: 13px; font-weight: 600; line-height: 1.5;
    padding: 4px 12px; border-radius: 999px; border: 0; cursor: pointer;
    background: #eef1f4; color: var(--brand); white-space: nowrap;
  }
  .due-set:hover { filter: brightness(0.96); }
  /* Quick one-tap "set due to today", shown only when no due is set yet.
     NB: named .due-quick, not .due-today — the latter is the job-row urgency
     modifier, and an unscoped .due-today rule would restyle whole cards. */
  .due-quick {
    display: inline-flex; align-items: center;
    font: inherit; font-size: 12px; font-weight: 600; line-height: 1.5;
    padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--brand); cursor: pointer;
    white-space: nowrap; margin-left: 6px;
  }
  .due-quick:hover { border-color: var(--brand); }
  .due-quick[hidden] { display: none; }
  .due-set.empty { background: var(--surface-2); color: var(--muted); font-weight: 500; }
  .due-chip.overdue .due-set { background: #ffe1dc; color: #b23b2a; }
  .due-clear {
    border: 0; background: none; cursor: pointer; color: var(--muted);
    font-size: 17px; line-height: 1; padding: 2px 4px 2px 2px; margin-left: -2px;
  }
  .due-clear:hover { color: var(--ink); }
  /* The native input is invisible but overlaps the chip, so showPicker() anchors
     the desktop calendar to the chip (offscreen positioning popped it off-screen
     on desktop). Clicks pass through to the buttons underneath. */
  .due-input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; border: 0; margin: 0; padding: 0; }
  /* due text in a list row */
  .job-row .due { color: var(--brand); }
  .job-row .due.overdue { color: #b23b2a; font-weight: 600; }
  /* Labeled section dividers — one per due bucket, placed above its group. */
  .list-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 30px 16px 8px;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em;
  }
  .list-divider:first-child { margin-top: 10px; }
  .list-divider::before, .list-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border); opacity: .8;
  }
  .list-divider[data-bucket="overdue"] { color: #b23b2a; }
  .list-divider[data-bucket="overdue"]::before,
  .list-divider[data-bucket="overdue"]::after { background: #e7b9a3; opacity: .7; }
  .list-divider[data-bucket="urgent"] { color: #c1302a; }
  .list-divider[data-bucket="urgent"]::before,
  .list-divider[data-bucket="urgent"]::after { background: #eab0a8; opacity: .7; }
  /* The label is a click-to-filter toggle for its due bucket. */
  .divider-label {
    border: 0; background: none; margin: 0; padding: 2px 8px;
    font: inherit; color: inherit; letter-spacing: inherit;
    text-transform: inherit; cursor: pointer; border-radius: 999px;
  }
  .divider-label:hover { background: var(--surface-2); color: var(--ink); }
  .divider-label.is-active { background: var(--brand); color: #fff; }
  .list-divider[data-bucket="overdue"] .divider-label.is-active { background: #b23b2a; color: #fff; }
  .list-divider[data-bucket="urgent"] .divider-label.is-active { background: #c1302a; color: #fff; }

  /* status picker menu (shared, body-level, fixed-positioned at the chip) */
  .chip-menu {
    position: fixed; z-index: 200; min-width: 210px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 6px; display: flex; flex-direction: column; gap: 3px;
  }
  .chip-menu[hidden] { display: none; }
  .chip-menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; background: none; border: 0; border-radius: 9px;
    cursor: pointer; font: inherit; font-size: 15px; color: var(--ink);
    text-align: left; width: 100%;
  }
  .chip-menu-item:hover { background: var(--surface-2); }
  .chip-menu-item.is-current { background: var(--surface-2); font-weight: 600; }
  .chip-menu-item.danger { color: #b23b2a; }
  /* Project rows sit indented under their client, lighter, with a tree tick. */
  .chip-menu-item.is-project { padding-left: 30px; font-size: 13px; color: var(--muted); }
  .chip-menu-item.is-project::before { content: '└ '; opacity: .6; }
  .chip-menu-item.is-project.is-current { color: var(--ink); }
  .chip-menu-item .chip { pointer-events: none; }
  /* Command palette — pops above the composer the moment you type a leading ! */
  .cmd-palette {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 6px; margin-bottom: 8px; display: flex; flex-direction: column;
    gap: 2px; max-height: 240px; overflow-y: auto;
  }
  .cmd-palette[hidden] { display: none; }
  .cmd-item {
    display: flex; align-items: baseline; gap: 10px;
    padding: 9px 12px; background: none; border: 0; border-radius: 9px;
    cursor: pointer; font: inherit; color: var(--ink); text-align: left; width: 100%;
  }
  .cmd-item:hover, .cmd-item.active { background: var(--surface-2); }
  .cmd-item .cmd-name { font-weight: 600; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .cmd-item .cmd-desc { color: var(--muted); font-size: 13px; }

  /* chat header overflow menu (archive / delete) */
  .job-menu-btn {
    flex-shrink: 0; border: 0; background: none; cursor: pointer;
    color: var(--muted); font-size: 24px; line-height: 1;
    padding: 4px 10px; border-radius: 8px;
  }
  .job-menu-btn:hover { background: var(--surface-2); color: var(--ink); }

  /* left-pane subheader: three filter chips — client left, due centre, status
     right — mirroring the card meta layout. */
  .list-sub {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px;
    padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .list-sub #clientFilterChip { justify-self: start; min-width: 0; }
  .list-sub #dueFilterChip    { justify-self: center; }
  .list-sub #statusFilterChip { justify-self: end; }
  .client-filter {
    flex: 1; min-width: 0; font: inherit; font-size: 13px; color: var(--ink);
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 8px; -webkit-appearance: none; appearance: none;
  }
  /* Filter chips — card-style pills that open a picker. The client one sits
     left, the status one right, mirroring the card meta layout. */
  .filter-chip { border: 0; cursor: pointer; flex-shrink: 0; }
  .filter-chip:hover { filter: brightness(0.97); }
  /* Due filter chip: plain white (bordered) by default so the row reads
     blue-client / white-date / grey-status; tints only when a date filter
     is active (overdue red, today amber). */
  .due-filter { background: var(--surface); color: var(--brand); border: 1px solid var(--border); }
  .due-filter.is-overdue { background: #ffe1dc; color: #b23b2a; border-color: #f3c4bc; }
  .due-filter.is-today   { background: #f6e6d2; color: #a9601f; border-color: #e6cfae; }
  .total { flex-shrink: 0; margin-left: auto; border: 0; background: none; padding: 0; }
  .total .amt {
    display: inline-flex; align-items: center; gap: 4px;
    height: 32px; padding: 0 12px;
    background: var(--surface); border: 1px solid #dbe3ec; border-radius: 8px;
    color: var(--brand);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .total .amt::before { content: '$'; opacity: .6; }
  .total.clickable { cursor: pointer; }
  .total.clickable:hover .amt { border-color: var(--brand); }
  /* active = the left pane is currently flipped to invoices */
  .total.is-active .amt { background: var(--brand); color: #fff; border-color: var(--brand); }
  .total.is-active .amt::before { opacity: .8; }

  /* Left pane flips between jobs and invoices (toggled by the $ total) */
  .billing-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 12px; display: none; }
  body.show-invoices #jobList,
  body.show-invoices .list-sub,
  body.show-invoices .list-foot { display: none; }
  body.show-invoices .billing-list { display: block; }
  .bill-entry.active { border-color: var(--brand); box-shadow: inset 3px 0 0 var(--brand); }

  /* ── Billing pane ───────────────────────────────── */
  .billing-pane { flex: 1; display: none; flex-direction: column; min-width: 0; }
  body.show-billing .billing-pane { display: flex; }
  body.show-billing .chat-pane { display: none; }
  .billing-body { flex: 1; overflow: auto; padding: 16px; }

  /* Billing list: draft + issued entries */
  .bill-section-h {
    font-size: 12px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); font-weight: 700; margin: 8px 2px 8px;
  }
  .bill-section-h:first-child { margin-top: 2px; }
  .bill-entry {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    padding: 14px; margin-bottom: 8px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--surface); cursor: pointer; font: inherit;
  }
  .bill-entry:hover { border-color: var(--brand); }
  .bill-entry .main { flex: 1; min-width: 0; }
  .bill-entry .ttl { font-weight: 600; font-size: 15px; }
  .bill-entry .sub { color: var(--muted); font-size: 13px; margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bill-entry .sum {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-weight: 700; color: var(--brand); white-space: nowrap;
  }
  .bill-entry .badge {
    font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .badge.st-sent { background: #fdeede; color: #a85513; }
  .badge.st-paid { background: #e2f3e6; color: #2f7a45; }

  /* Invoice document — mirrors the real Robots & Co. A4 tax invoice.
     Draft = editable (number + due + line removal); issued = read-only. */
  .inv-doc { max-width: 760px; margin: 0 auto; }
  .inv-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .inv-actions button {
    font: inherit; font-size: 14px; font-weight: 600; padding: 10px 16px;
    border-radius: 8px; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--ink);
  }
  .inv-actions .primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .inv-actions .primary:disabled { opacity: .5; cursor: default; }
  .inv-actions .danger { color: #a33; margin-left: auto; }

  .inv-paper {
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    padding: 44px 46px; color: #222; min-height: 960px;
    display: flex; flex-direction: column;
    font: 13px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .inv-head { display: flex; justify-content: space-between; gap: 28px; align-items: flex-start; }
  .inv-from { max-width: 58%; }
  .inv-logo { max-width: 280px; max-height: 150px; display: block; margin-bottom: 14px; }
  .inv-from-name { font-size: 23px; font-weight: 700; color: var(--brand); margin-bottom: 12px; }
  .inv-from-meta { font-size: 12.5px; color: #333; }
  .inv-from-meta div { margin-bottom: 2px; }
  .inv-to { text-align: right; min-width: 230px; }
  .inv-title { font-size: 20px; font-weight: 700; color: #222; margin-bottom: 16px; white-space: nowrap; }
  .inv-title input {
    font: inherit; font-size: 20px; font-weight: 700; width: 132px; text-align: right;
    border: 0; border-bottom: 1px dashed #bbb; background: transparent; color: inherit; padding: 0 0 1px;
  }
  .inv-to div { margin-bottom: 2px; }
  .inv-to .att { color: #555; }
  .inv-to .inv-date { margin-top: 10px; }

  .inv-rule { border: 0; border-top: 1px solid #dcdcdc; margin: 22px 0 0; }
  .inv-items { width: 100%; border-collapse: collapse; }
  .inv-items th {
    font-style: italic; font-weight: 400; color: #8a8a8a; font-size: 12.5px;
    text-align: left; padding: 12px 4px;
  }
  .inv-items th.r, .inv-items td.r { text-align: right; }
  .inv-items td { padding: 8px 4px; font-size: 13px; vertical-align: top; }
  .inv-items td.r { font-variant-numeric: tabular-nums; }
  .inv-items thead th { border-bottom: 1px solid #dcdcdc; }
  .inv-items th:nth-child(2), .inv-items td:nth-child(2) { width: 150px; }
  .inv-items th:nth-child(3), .inv-items td:nth-child(3) { width: 150px; }
  .inv-items .rm-cell { width: 26px; padding-left: 8px; }
  .inv-items .rm { border: 0; background: none; color: #b33; cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; }
  .inv-items tr.li-link { cursor: pointer; }
  .inv-items tr.li-link:hover td { background: #f4f7ff; }
  .inv-items tr.li-link:hover td:first-child { color: var(--brand); }
  .inv-addline {
    margin: 12px 0 0; border: 1px dashed #cdcdcd; background: transparent; color: #777;
    border-radius: 5px; padding: 6px 12px; cursor: pointer; font: inherit; font-size: 12.5px;
  }
  .inv-addline:hover { color: var(--brand); border-color: var(--brand); }

  .inv-spacer { flex: 1; min-height: 36px; }

  .inv-foot {
    display: flex; justify-content: space-between; gap: 28px;
    border: 1px solid #dcdcdc; border-radius: 4px; padding: 20px 24px;
    min-height: 122px; font-size: 12.5px;
  }
  .inv-foot-left, .inv-foot-right { display: flex; flex-direction: column; justify-content: space-between; }
  .inv-foot .fr, .inv-foot .tr { display: flex; }
  .inv-foot-left { min-width: 240px; }
  .inv-foot-left .fr { gap: 8px; }
  .inv-foot-left .k { color: #555; min-width: 42px; }
  .inv-foot-left .inv-due input {
    font: inherit; font-size: 12.5px; border: 0; border-bottom: 1px dashed #bbb;
    background: transparent; color: inherit; padding: 0;
  }
  .inv-foot-right { text-align: right; min-width: 250px; }
  .inv-foot-right .tr { justify-content: flex-end; gap: 18px; }
  .inv-foot-right .k { color: #555; }
  .inv-foot-right .v { min-width: 84px; text-align: right; font-variant-numeric: tabular-nums; }
  .inv-foot-right .tr.total .k, .inv-foot-right .tr.total .v { font-weight: 700; }
  .inv-foot-right .tr.balance .v { color: #c0291f; font-weight: 700; }

  /* Full-page A4 preview — what the printed invoice looks like at print size.
     The page is rendered at true A4 (794×1123px = 210×297mm @96dpi) and scaled
     to fit the viewport via JS. */
  .inv-preview-overlay {
    position: fixed; inset: 0; z-index: 50; display: none; flex-direction: column;
    background: rgba(24, 21, 17, 0.62);
  }
  .inv-preview-overlay.open { display: flex; }
  .inv-preview-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px calc(10px + var(--safe-b)); padding-top: max(10px, var(--safe-t));
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .inv-preview-label { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; }
  .inv-preview-close {
    font: inherit; font-size: 14px; font-weight: 600; padding: 8px 14px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--surface);
    color: var(--ink); cursor: pointer;
  }
  .inv-preview-scroll { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
    display: flex; align-items: flex-start; justify-content: center; padding: 16px; }
  .inv-preview-stage { position: relative; flex: none; }
  .inv-preview-page {
    position: relative;
    width: 794px; height: auto; min-height: 1123px;
    border: 0; border-radius: 0; box-shadow: 0 6px 28px rgba(0,0,0,0.35);
    transform-origin: top left;
  }
  /* Dashed rule marking where each A4 page ends (the page is one tall sheet that
     scrolls; these guides show the print breaks). */
  .inv-page-break {
    position: absolute; left: 0; right: 0; height: 0; pointer-events: none;
    border-top: 1px dashed #c9beae;
  }
  .inv-page-break::after {
    content: attr(data-label); position: absolute; right: 0; top: 4px;
    font-size: 10px; letter-spacing: .04em; color: #b3a692; background: #fff; padding: 0 4px;
  }

  /* + Job → client picker (lives in the left column footer) */
  .newjob-picker { width: 100%; font-size: 15px; padding: 12px; cursor: pointer; }

  /* ── Right: chat ────────────────────────────────── */
  .chat-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); min-height: 56px;
    /* Pin the header and lift it above the scrolling thread so it's always
       clear which chat you're in (belt-and-suspenders with the flex layout). */
    position: sticky; top: 0; z-index: 3;
    box-shadow: 0 4px 10px -8px rgba(0, 0, 0, 0.35);
  }
  .chat-head .back {
    display: none; border: 0; background: none; font-size: 26px;
    color: var(--brand); cursor: pointer; padding: 0 6px 0 0; line-height: 1;
  }
  /* Quick "Done" — mobile only (see media query). Closes the job + pops to the
     list. Hidden on desktop, where the status chip / chip-menu already cover it. */
  .done-btn {
    display: none; border: 0; border-radius: 999px; cursor: pointer;
    background: #2f7a45; color: #fff; font-size: 15px; font-weight: 600;
    padding: 7px 16px; line-height: 1; white-space: nowrap;
  }
  .done-btn:active { filter: brightness(0.92); }
  .chat-head .ttl { font-size: 16px; font-weight: 600; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Click-to-rename: the title is an editable field for real, saved jobs. */
  .chat-head .ttl.editable { cursor: text; }
  .chat-head .ttl.editable:hover { text-decoration: underline dotted; text-underline-offset: 3px; }
  .chat-head .ttl-input {
    flex: 1 1 auto; min-width: 0; font: inherit; font-size: 16px; font-weight: 600;
    padding: 2px 7px; border: 1px solid var(--brand); border-radius: 6px;
    background: var(--surface); color: inherit; outline: none;
  }
  .chat-head .ttl-input[hidden] { display: none; }
  .chat-head .ttl-badge {
    flex: none; font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .chat-head .ttl-badge[hidden] { display: none; }
  /* $ amount of the open job (billable clients only). Shows hours×rate live, or a
     hand-entered override when set. Editable when the clock is paused; editing it
     writes only the amount, never the logged time. */
  .chat-head .amount {
    flex: none; display: inline-flex; align-items: baseline;
    font-size: 13px; font-weight: 700; color: var(--brand); white-space: nowrap;
    font-variant-numeric: tabular-nums; font-feature-settings: "tnum";
  }
  .chat-head .amount[hidden] { display: none; }
  .chat-head .amount-sym { opacity: .7; margin-right: 1px; }
  .chat-head .amount-input {
    width: 6.5ch; border: 0; padding: 0; background: none; color: inherit;
    font: inherit; text-align: right; font-variant-numeric: tabular-nums;
  }
  .chat-head .amount-input:focus { outline: none; }
  .chat-head .amount-input:read-write {
    border-bottom: 1px dashed var(--border); cursor: text;
  }
  .chat-head .amount-input:read-write:hover { border-bottom-color: var(--brand); }
  /* Manual override — a hand-entered amount, not hours×rate. Amber + a ✎ so it
     reads as deliberately set, not auto-computed. */
  .chat-head .amount.manual { color: #a9711a; }
  .chat-head .amount.manual .amount-sym::before {
    content: '✎'; font-weight: 400; margin-right: 4px; opacity: .85;
  }
  /* Hours = the editable work figure (decimal hours). It's a wrapper so the live
     timer + green running-dot survive, with a borderless inline input inside.
     readOnly while the work clock runs (status doing); editable when stopped. */
  .chat-head .hours {
    flex: none; display: inline-flex; align-items: baseline;
    font-size: 13px; color: var(--muted); white-space: nowrap;
    font-variant-numeric: tabular-nums; font-feature-settings: "tnum";
  }
  .chat-head .hours[hidden] { display: none; }
  .chat-head .hours-input {
    width: 4.5ch; border: 0; padding: 0; background: none; color: inherit;
    font: inherit; text-align: right; font-variant-numeric: tabular-nums;
  }
  .chat-head .hours-input:focus { outline: none; }
  .chat-head .hours-input:read-write {
    border-bottom: 1px dashed var(--border); cursor: text;
  }
  .chat-head .hours-input:read-write:hover { border-bottom-color: var(--brand); }
  .chat-head .hours-unit { margin-left: 1px; opacity: .65; }
  .chat-head .hours.running { color: #2f7a45; font-weight: 700; }
  .chat-head .hours.running::before {
    content: ''; display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: #2f7a45; margin-right: 5px; align-self: center;
    animation: timerpulse 1.2s ease-in-out infinite;
  }
  @keyframes timerpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

  /* Play/pause work-clock cluster (button + hours). Default PAUSED: the clock
     only runs once the user presses play. The button is the single control over
     billing time — opening a job no longer ticks. */
  /* Absolutely centred in the header on every breakpoint: dead-centre on the
     single-row desktop header, and on the 3-row mobile grid top:50% lands it on
     the middle (2nd) row, also centred. A surface background masks anything it
     might float over. */
  .chat-head .timer {
    display: inline-flex; align-items: center; gap: 8px;
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    background: var(--surface); padding: 0 6px; z-index: 2;
  }
  .chat-head .timer[hidden] { display: none; }
  .chat-head .clock-btn {
    flex: none; display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; padding: 0; border-radius: 50%; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--brand); font-size: 12px; line-height: 1;
  }
  .chat-head .clock-btn:hover { border-color: var(--brand); }
  .chat-head .clock-btn.running { background: #2f7a45; border-color: #2f7a45; color: #fff; }
  .chat-head .clock-btn[hidden] { display: none; }
  /* A flexible spacer pushes the right-hand chips to the edge so the timer can
     sit dead-centre (see the desktop media query). Collapsed on mobile (grid). */
  .chat-head .head-spacer { flex: 1 1 0; min-width: 0; }

  /* Desktop: title sizes to content (capped so it can't reach the centred timer),
     and the spacer pushes the right-hand chips to the edge. */
  @media (min-width: 721px) {
    .chat-head .ttl { flex: 0 1 auto; max-width: calc(50% - 96px); }
    .chat-head .ttl-input { max-width: calc(50% - 96px); }
  }

  .turns { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px; }
  .empty {
    height: 100%; display: grid; place-items: center;
    color: var(--muted); font-size: 15px; text-align: center; padding: 0 32px;
  }

  .turn { display: flex; margin: 0 0 12px; }
  .turn.user { justify-content: flex-end; }
  .bubble {
    max-width: 92%; padding: 10px 14px; border-radius: 16px;
    font-size: 15px; line-height: 1.45; word-wrap: break-word; overflow-wrap: anywhere;
  }
  .turn.user .bubble { background: var(--user-bubble); color: var(--user-ink); border-bottom-right-radius: 5px; }
  /* AI replies read like Claude's chat: span the full column, not a narrow bubble. */
  .turn.ai .bubble { max-width: 100%; background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  /* Collapsed AI reply: show only the first line; click the row to expand. Keeps
     the history scannable so the human reads one line per reply, not pages. */
  .bubble.collapsible { padding: 0; }
  .bubble.collapsible .ai-summary {
    display: flex; gap: 8px; align-items: baseline; width: 100%; text-align: left;
    background: none; border: 0; cursor: pointer; padding: 10px 14px; font: inherit; color: inherit;
  }
  .bubble.collapsible .ai-caret { flex: none; opacity: .55; transition: transform .15s; }
  .bubble.collapsible.expanded .ai-caret { transform: rotate(90deg); }
  .bubble.collapsible .ai-summary-text { flex: 1; min-width: 0; white-space: normal; overflow-wrap: anywhere; opacity: .9; }
  .bubble.collapsible.expanded .ai-summary-text { white-space: normal; opacity: .5; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .bubble.collapsible .ai-full { display: none; padding: 0 14px 12px; }
  .bubble.collapsible.expanded .ai-full { display: block; }
  .ai-seg + .ai-seg { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .bubble :first-child { margin-top: 0; } .bubble :last-child { margin-bottom: 0; }
  .bubble pre { background: #f3efe7; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
  .turn.user .bubble pre { background: rgba(255,255,255,0.15); }
  /* copy-to-clipboard button on each rendered code block */
  .code-wrap { position: relative; }
  .code-wrap pre { margin: 0; }
  .copy-btn {
    position: absolute; top: 6px; right: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); border-radius: 6px;
    font-size: 11px; font-weight: 600; padding: 2px 8px; cursor: pointer;
    opacity: 0; transition: opacity .12s;
  }
  .code-wrap:hover .copy-btn, .copy-btn:focus { opacity: 1; }
  .copy-btn.copied { color: var(--brand); border-color: var(--brand); opacity: 1; }
  @media (hover: none) { .copy-btn { opacity: 1; } }   /* touch: no hover, keep it visible */
  .bubble code { font-family: ui-monospace, Menlo, monospace; font-size: 0.9em; }
  /* Interactive report: a ```runn-report block rendered as a sandboxed iframe.
     The iframe runs the AI's JS in an opaque origin (no allow-same-origin) under
     a locked CSP — it can't reach Runn's DOM/API or the network. */
  .report-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin: 8px 0; background: #fff; }
  .report-head { display: flex; align-items: center; gap: 6px; padding: 5px 10px; background: #f3efe7; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .report-head .report-title { font-weight: 600; flex: 1; }
  .report-head button { border: none; background: transparent; cursor: pointer; font-size: 14px; line-height: 1; color: var(--muted); padding: 2px 6px; border-radius: 5px; }
  .report-head button:hover { background: rgba(0,0,0,0.06); }
  .report-card iframe { display: block; width: 100%; border: 0; background: #fff; }
  /* Fullscreen view lives at <body> level (NOT a class on the card): on mobile
     the panes are transformed, which creates a stacking/containing context, so a
     position:fixed inside a pane is viewport-wrong AND stacks below a body-level
     backdrop. Rendering the modal under <body> escapes the transform entirely. */
  .report-modal { position: fixed; inset: 0; z-index: 4000; display: flex; flex-direction: column; padding: 4vh 4vw; background: rgba(0,0,0,0.55); }
  .report-modal .report-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 12px 48px rgba(0,0,0,0.4); }
  .report-modal iframe { flex: 1; width: 100%; border: 0; background: #fff; }
  /* Edit affordance on a private (pre-invite) user turn. Kept low-key but always
     visible (so it's discoverable on touch, where there's no hover). */
  .turn-edit {
    align-self: center; flex: none; margin: 0 2px; padding: 4px 6px;
    border: 0; background: none; cursor: pointer; color: var(--muted);
    font-size: 16px; line-height: 1; border-radius: 8px; opacity: .5;
  }
  .turn-edit:hover { opacity: 1; background: var(--surface-2); }
  /* Inline editor that replaces the bubble while editing one turn. */
  .turn.editing { flex-direction: column; align-items: stretch; }
  .turn-edit-input {
    width: 100%; box-sizing: border-box; resize: none; max-height: 200px;
    border: 1px solid var(--brand); border-radius: 12px; padding: 10px 12px;
    font: inherit; font-size: 15px; background: var(--bg); color: var(--ink);
  }
  .turn-edit-input:focus { outline: none; }
  .turn-edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
  .turn-edit-actions button {
    border: 0; border-radius: 10px; cursor: pointer;
    font-size: 14px; font-weight: 600; padding: 7px 14px;
  }
  .te-save { background: var(--brand); color: #fff; }
  .te-cancel { background: var(--surface-2); color: var(--ink); }
  /* Demote-to-note sits apart on the left; Cancel/Save stay right. */
  .te-note { background: #f3e6a8; color: #6b5a16; margin-right: auto; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 2px; color: var(--muted); font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* Thinking bubble — shown on the AI side while status === 'doing' so the
     human can see Claude is working. Three pulsing dots in an ai-style bubble. */
  .turn.thinking .bubble { display: flex; gap: 5px; align-items: center; padding: 14px; }
  .turn.thinking .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
    animation: thinkpulse 1.2s ease-in-out infinite;
  }
  .turn.thinking .dot:nth-child(2) { animation-delay: .2s; }
  .turn.thinking .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes thinkpulse { 0%, 60%, 100% { opacity: .25; } 30% { opacity: 1; } }
  /* Queued-invite variant: a muted text line instead of dots, gently pulsing. */
  .turn.thinking .bubble.waiting {
    font-size: 13px; font-style: italic; color: var(--muted);
    animation: thinkpulse 1.8s ease-in-out infinite;
  }

  /* Permission prompts (the gated AI model). Sit between the transcript and the
     composer; an amber card with Allow / Deny, or a red danger card for the
     raw-SSH escape hatch (which also drops the "Always allow" affordance). */
  .chat-permissions { flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; padding: 0 12px; }
  .chat-permissions:empty { display: none; }
  .chat-permission {
    display: flex; flex-direction: column; gap: 8px;
    padding: 10px 12px; border-radius: 8px; margin-top: 8px;
    background: #fff7e6; border: 1px solid #f0c674; color: var(--ink); font-size: 13px;
  }
  .chat-permission .perm-head { display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .chat-permission .perm-icon { font-size: 15px; }
  .chat-permission .perm-title code {
    font-family: ui-monospace, Menlo, monospace; font-size: 12px;
    background: rgba(0,0,0,.05); padding: 1px 5px; border-radius: 3px;
  }
  .chat-permission .perm-detail {
    font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--muted);
    background: rgba(0,0,0,.04); padding: 6px 8px; border-radius: 4px;
    overflow-x: auto; white-space: pre; max-height: 120px;
  }
  .chat-permission .perm-warning { font-size: 12px; color: #5c1d1d; padding: 4px 0; }
  .chat-permission .perm-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .chat-permission .perm-btn {
    font: inherit; font-size: 12px; padding: 5px 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer; color: var(--ink);
  }
  .chat-permission .perm-btn:hover:not(:disabled) { border-color: var(--muted); }
  .chat-permission .perm-btn:disabled { opacity: .5; cursor: default; }
  .chat-permission .perm-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chat-permission .perm-btn.primary:hover:not(:disabled) { filter: brightness(0.95); }
  .chat-permission .perm-deny { color: #b85c1f; }
  .chat-permission.chat-permission-dangerous { background: #fdecea; border-color: #d93025; color: #5c1d1d; }
  .chat-permission.chat-permission-dangerous .perm-head { font-weight: 700; }
  .chat-permission.chat-permission-dangerous .perm-btn.primary { background: #d93025; border-color: #d93025; }

  /* composer */
  .composer { display: flex; gap: 8px; align-items: flex-end;
    padding: 10px 12px calc(10px + var(--safe-b)); border-top: 1px solid var(--border); background: var(--surface); }
  .composer textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 14px; font: inherit; font-size: 15px; max-height: 140px;
    background: var(--bg); color: var(--ink);
  }
  .composer textarea:focus { outline: none; border-color: var(--brand); }
  .composer button {
    border: 0; border-radius: 12px; background: var(--accent); color: var(--bg);
    font-size: 15px; font-weight: 600; padding: 0 18px; height: 44px; cursor: pointer;
  }
  .composer button:disabled { opacity: 0.45; cursor: not-allowed; }
  /* "+ AI" — the invite/handover. Shown only on a private, not-yet-invited job.
     Distinct from Send so the handover reads as a separate, deliberate action. */
  .composer button.invite-ai {
    background: var(--brand); color: #fff; white-space: nowrap;
  }
  .composer button.invite-ai[hidden] { display: none; }
  /* note mode — jot a private margin note Claude never sees until promoted */
  .composer button.note-toggle { background: var(--surface-2); color: var(--muted); padding: 0 12px; font-size: 18px; }
  .composer button.note-toggle[aria-pressed="true"] { background: #f3e6a8; color: #6b5a16; }
  .composer.note-mode textarea { border-color: #d8b94a; background: #fdf8e8; }
  .composer.note-mode button[type="submit"] { background: #b8941f; }

  /* ── Chat attachments ──────────────────────────────────────
     Composer-side chips (a row above the input, before send) and
     transcript-side chips/thumbnails (above the user bubble's text). Both
     rows need the explicit [hidden] override — a class `display` otherwise
     wins over the boolean attribute. */
  /* Match .note-toggle's specificity (.composer button.x) so the generic
     .composer button accent rule doesn't paint it loud orange. */
  .composer button.composer-attach {
    background: var(--surface-2); color: var(--muted);
    padding: 0 12px; font-size: 18px;
  }
  .composer button.composer-attach:hover:not(:disabled) { color: var(--ink); background: var(--border); }
  /* Overflow ("⋯") — phone-only; holds 📝 + 📎 so the input keeps its width. */
  .composer button.composer-more {
    display: none; background: var(--surface-2); color: var(--muted);
    padding: 0 12px; font-size: 22px; line-height: 1;
  }
  .composer button.composer-more:hover:not(:disabled) { color: var(--ink); background: var(--border); }
  .composer-attachments {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px 12px 0; background: var(--surface);
  }
  .composer-attachments[hidden] { display: none; }
  .attach-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 6px 4px 4px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    font-size: 12px; line-height: 1.2; max-width: 220px; color: var(--ink);
    text-decoration: none;
  }
  .attach-chip img {
    width: 36px; height: 36px; object-fit: cover; border-radius: 4px;
    flex-shrink: 0; background: var(--surface-2);
  }
  .attach-chip .attach-icon {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; background: var(--surface-2); border-radius: 4px; font-size: 18px;
  }
  .attach-chip .attach-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0; color: var(--muted);
  }
  a.attach-chip:hover .attach-name { color: var(--ink); }
  .attach-chip .attach-x {
    border: none; background: none; cursor: pointer;
    color: var(--muted); font-size: 16px; line-height: 1; padding: 0 2px;
    flex-shrink: 0;
  }
  .attach-chip .attach-x:hover { color: var(--ink); }
  /* Attachment row inside a user bubble (transcript display). */
  .turn-col { display: flex; flex-direction: column; max-width: 92%; min-width: 0; }
  .turn.user .turn-col { align-items: flex-end; }
  .turn-col .bubble { max-width: 100%; }
  .turn-attachments { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .turn.user .turn-attachments { justify-content: flex-end; }
  /* Drag-drop drop-target ring on the transcript. */
  .turns.drop-target { outline: 2px dashed var(--accent); outline-offset: -6px; background: rgba(184, 92, 31, 0.04); }

  /* Toast — transient feedback for !commands (and the like). */
  .toast-host {
    position: fixed; left: 50%; bottom: calc(24px + var(--safe-b)); transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    z-index: 50; pointer-events: none;
  }
  .toast {
    background: var(--ink); color: var(--bg); padding: 10px 16px; border-radius: 10px;
    font-size: 14px; max-width: 80vw; box-shadow: 0 6px 20px -6px rgba(0, 0, 0, 0.5);
    opacity: 0; transform: translateY(8px); transition: opacity .18s ease, transform .18s ease;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.err { background: #b23b2a; }
  /* a private note rendered inline in the thread */
  .turn.note { justify-content: center; }
  .turn.note .note-card {
    max-width: 82%; background: #fdf8e8; border: 1px dashed #d8b94a; border-radius: 10px;
    padding: 8px 12px; font-size: 14px; color: #6b5a16;
  }
  .turn.note .note-body { white-space: pre-wrap; }
  .turn.note .note-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 6px; }
  .turn.note .note-actions button {
    border: 0; background: none; cursor: pointer; font-size: 12px; color: #8a7320; padding: 2px 4px;
  }
  .turn.note .note-actions button:hover { text-decoration: underline; }

  /* ── Responsive: collapse to one pane ───────────── */
  @media (max-width: 720px) {
    :root { --list-w: 100%; }
    .list-pane { width: 100%; min-width: 0; border-right: 0; }
    .chat-pane { position: fixed; inset: 0; background: var(--bg);
      transform: translateX(100%); transition: transform 0.22s ease; z-index: 5; }
    body.show-chat .chat-pane { transform: translateX(0); }
    .chat-head .back { display: block; }

    /* Phone: spread the header over three rows.
       Row1: ‹ Title ⋯   Row2: (timer, centred)   Row3: Client Due Status.
       (min-height:56px absorbs the empty-state rows, so no phantom gap.) */
    .chat-head {
      display: grid; align-items: center;
      grid-template-columns: auto 1fr auto;
      grid-template-areas:
        "back   title  menu"
        ".      hours  done"
        "client due    status";
    }
    .chat-head .back     { grid-area: back; justify-self: start; }
    .chat-head .ttl      { grid-area: title; }
    .chat-head .ttl-input { grid-area: title; width: 100%; box-sizing: border-box; }
    .chat-head .head-spacer { display: none; }
    #jobMenuBtn          { grid-area: menu; justify-self: end; }
    /* #chatTimer (clock + hours + $) is absolutely centred over the header (see
       base styles), so it's not placed in the grid — its "hours" cell stays empty. */
    #chatClient          { grid-area: client; justify-self: start; }
    #chatDue             { grid-area: due;    justify-self: center; }
    #chatStatus          { grid-area: status; justify-self: end; }
    #chatDoneBtn         { grid-area: done;   justify-self: end; }
    .done-btn.show       { display: inline-flex; }

    .billing-pane { display: flex; position: fixed; inset: 0; background: var(--bg);
      transform: translateX(100%); transition: transform 0.22s ease; z-index: 6; }
    body.show-billing .billing-pane { transform: translateX(0); }
    body.show-billing .chat-pane { display: flex; }   /* don't fight the overlay on mobile */
    .inv-paper { padding: 22px 20px; min-height: 0; }
    .inv-head { flex-direction: column; gap: 16px; }
    .inv-from { max-width: none; }
    .inv-to { text-align: left; min-width: 0; }
    .inv-title { white-space: normal; }
    .inv-title input { text-align: left; }
    .inv-foot { flex-direction: column; gap: 18px; }
    .inv-foot-left, .inv-foot-right { min-width: 0; text-align: left; }
    .inv-foot-right .tr { justify-content: space-between; gap: 18px; }
    .inv-actions .danger { margin-left: 0; }

    /* bigger chips + menus = easier taps on a phone */
    .chip { font-size: 15px; padding: 6px 14px; }
    .chip.pick::after { font-size: 12px; margin-left: 6px; }
    .job-row .meta { gap: 10px; font-size: 13px; }
    .chip-menu { min-width: 260px; padding: 8px; gap: 4px; }
    .chip-menu-item { font-size: 17px; padding: 15px 16px; }
    .job-menu-btn { font-size: 28px; padding: 6px 12px; }

    /* + Job is a floating pill fixed to the VIEWPORT, bottom-right — always on
       screen no matter what scrolls. The earlier attempt failed because
       `position:fixed` anchors to the nearest transformed/perspective ancestor,
       and .list-pane sets `perspective`; that trapped the FAB inside the pane.
       Fix: drop the perspective on mobile (the list flip just goes flat) so the
       FAB anchors to the viewport instead. */
    .list-pane { perspective: none; }
    .list-foot {
      position: fixed; right: 16px; bottom: calc(16px + var(--safe-b)); z-index: 20;
      display: flex; justify-content: flex-end;
      padding: 0; border-top: 0; background: transparent;
    }
    /* leave room so the last job row can't hide behind the floating pill */
    .job-list { padding-bottom: 88px; }
    /* the FAB belongs to the list view only — hide it under the chat/billing
       overlays (which slide over the list on mobile). */
    body.show-chat .list-foot, body.show-billing .list-foot { display: none; }
    .btn-newjob {
      width: auto; border-radius: 999px;
      padding: 14px 22px; font-size: 16px;
      box-shadow: 0 6px 18px -4px rgba(0, 0, 0, 0.4);
    }
    .newjob-picker { width: auto; min-width: 200px; }

    /* Phone composer: tuck 📝 + 📎 behind the ⋯ overflow so the text input
       isn't squashed down to a sliver. (+ AI / Send stay inline.) */
    .composer button.note-toggle, .composer button.composer-attach { display: none; }
    .composer button.composer-more { display: inline-flex; align-items: center; justify-content: center; }
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="list-pane">
      <div class="list-head">
        <button class="logo" id="logoReset" type="button" title="Reload — clears cached copies for a clean test">R</button>
        <h1>Runn</h1>
        <button class="total clickable" id="billingBtn" type="button" title="Invoices — tap to flip this list to billing">
          <span class="amt" id="valueTotal">0.00</span>
        </button>
      </div>
      <div class="list-flip" id="listFlip">
        <div class="list-sub">
          <button class="filter-chip chip client pick" id="clientFilterChip" type="button" aria-label="Filter by client or project">All</button>
          <button class="filter-chip chip pick due-filter" id="dueFilterChip" type="button" aria-label="Filter by due date">Any</button>
          <button class="filter-chip chip pick" id="statusFilterChip" type="button" aria-label="Filter by status">open</button>
        </div>
        <div class="job-list" id="jobList"></div>
        <div class="billing-list" id="billingList"></div>
      </div>
      <div class="list-foot">
        <button class="btn-newjob" id="newJobBtn">+ Job</button>
        <select class="client-filter newjob-picker" id="newJobPicker" aria-label="Pick a client for the new job" hidden></select>
      </div>
    </aside>

    <main class="chat-pane">
      <div class="chat-head">
        <button class="back" id="backBtn" aria-label="Back">‹</button>
        <span class="ttl" id="chatTitle" tabindex="0"></span>
        <input class="ttl-input" id="chatTitleInput" type="text" maxlength="120" autocomplete="off" aria-label="Job title" hidden>
        <span class="head-spacer" aria-hidden="true"></span>
        <span class="timer" id="chatTimer" hidden>
          <button class="clock-btn" id="clockBtn" type="button" aria-label="Start timer" aria-pressed="false">▶</button>
          <span class="hours" id="chatHours" hidden>
            <input type="text" inputmode="decimal" class="hours-input" id="chatHoursInput" aria-label="Hours worked">
            <span class="hours-unit">h</span>
          </span>
          <span class="amount" id="chatAmount" hidden>
            <span class="amount-sym">$</span>
            <input type="text" inputmode="decimal" class="amount-input" id="chatAmountInput" aria-label="Job amount">
          </span>
        </span>
        <span class="chip client" id="chatClient" hidden></span>
        <span class="due-chip" id="chatDue" hidden>
          <button type="button" class="due-set" id="chatDueBtn"></button>
          <button type="button" class="due-quick" id="chatDueToday" hidden>Today</button>
          <button type="button" class="due-clear" id="chatDueClear" aria-label="Clear due date" hidden>×</button>
          <input type="date" id="chatDueInput" class="due-input" aria-hidden="true" tabindex="-1">
        </span>
        <span class="chip" id="chatStatus" hidden></span>
        <button class="done-btn" id="chatDoneBtn" type="button" aria-label="Mark job done">✓ Done</button>
        <button class="job-menu-btn" id="jobMenuBtn" type="button" aria-label="Job actions" hidden>⋯</button>
      </div>
      <div class="turns" id="turns">
        <div class="empty" id="emptyState">Select a job, or start a new one.</div>
      </div>
      <div class="chat-permissions" id="chatPermissions"></div>
      <div class="composer-attachments" id="composerAttachments" hidden></div>
      <div class="cmd-palette" id="cmdPalette" hidden></div>
      <form class="composer" id="composer">
        <button type="button" id="inviteAiBtn" class="invite-ai" hidden>+ AI</button>
        <button type="button" id="noteToggle" class="note-toggle" aria-pressed="false" title="Note mode — jot a private note Claude can't see (promote it to a message later)">📝</button>
        <button type="button" id="attachBtn" class="composer-attach" title="Attach a file (or paste / drag-drop)" aria-label="Attach a file">📎</button>
        <input type="file" id="attachInput" multiple hidden accept="image/png,image/jpeg,image/webp,image/gif,application/pdf,text/plain,text/markdown,text/csv,application/json,.png,.jpg,.jpeg,.webp,.gif,.pdf,.txt,.md,.csv,.json">
        <!-- Phone-only: 📝 + 📎 collapse into this overflow so the input isn't squashed. -->
        <button type="button" id="composerMoreBtn" class="composer-more" title="More" aria-label="More actions">⋯</button>
        <textarea id="msgInput" rows="1" placeholder="Select a job, or start a new one." disabled></textarea>
        <button type="submit" id="sendBtn" disabled>Send</button>
      </form>
    </main>

    <section class="billing-pane" id="billingPane">
      <div class="chat-head billing-head">
        <button class="back" id="billingBack" type="button" aria-label="Back">‹</button>
        <span class="ttl" id="billingTitle">Billing</span>
        <span class="ttl-badge badge" id="billingBadge" hidden></span>
      </div>
      <div class="billing-body" id="billingBody"></div>
    </section>
  </div>
  <div class="chip-menu" id="chipMenu" hidden></div>
  <div class="chip-menu" id="jobMenu" hidden></div>
  <div class="chip-menu" id="composerMenu" hidden></div>
  <div class="chip-menu" id="clientMenu" hidden></div>
  <div class="chip-menu" id="clientFilterMenu" hidden></div>
  <div class="chip-menu" id="dueFilterMenu" hidden></div>
  <div class="chip-menu" id="statusFilterMenu" hidden></div>

<script>
'use strict';
(function () {
  const DRAFT = '__draft__';   // a not-yet-persisted new job (created on first send)
  const state = {
    jobs: new Map(),       // id -> job
    clients: new Map(),    // id -> client
    currentId: null,
    sending: false,
    noteMode: false,       // composer flips to writing private notes (Claude can't see them)
    pendingAttachments: [], // files staged in the composer, sent with the next message
    filterClient: '',      // '' = all clients
    filterProject: '',     // '' = all projects (only meaningful within a client)
    picking: false,        // choosing a client for a new job
    draftClientId: null,   // client chosen for the not-yet-saved draft
    invoicesPane: false,   // left pane flipped from jobs → invoices (tap the $ total)
    invoices: new Map(),   // id -> issued invoice record
    billingSel: null,      // null = list; {kind:'draft',clientId} | {kind:'invoice',id}
    editing: null,         // working copy of the invoice draft being composed
    editingTurn: null,     // {id, idx} of a private user turn being edited (pre-invite)
    renaming: null,        // id of the job whose title is being inline-edited (chat header)
    settings: {},          // business/bank/GST defaults for invoice snapshots
    statusFilter: 'open',  // 'open' = active group (open/doing/review/blocked/hold); a status; or 'all'
    dueFilter: 'all',      // 'all' | 'overdue' | 'today' | 'thisweek' | 'none'
  };

  const $ = (id) => document.getElementById(id);
  const jobListEl = $('jobList');
  const turnsEl = $('turns');
  const msgInput = $('msgInput');
  const sendBtn = $('sendBtn');
  const inviteAiBtn = $('inviteAiBtn');
  const noteToggle = $('noteToggle');
  const attachBtn = $('attachBtn');
  const attachInput = $('attachInput');
  const composerMoreBtn = $('composerMoreBtn');
  const composerAttachments = $('composerAttachments');

  marked.setOptions({ breaks: true, gfm: true });
  const mdToHtml = (s) => DOMPurify.sanitize(marked.parse(s || ''));
  // One line of an AI reply, stripped of markdown markers, for the collapsed
  // summary shown in the chat history. `last` picks the final meaningful line
  // (the question for the user, or "done"); otherwise the first.
  const lineSummary = (s, last) => {
    const lines = String(s || '')
      .split('\n')
      .map((l) => l.trim())
      .filter((l) => l && !/^[-*_=#>`]{3,}$/.test(l));
    const line = (last ? lines[lines.length - 1] : lines[0]) || '…';
    const clean = line
      .replace(/^#{1,6}\s+/, '')        // heading markers
      .replace(/^[-*+]\s+/, '')         // bullet markers
      .replace(/^>\s+/, '')             // blockquote
      .replace(/[*_`]/g, '')            // bold/italic/code ticks
      .replace(/!?\[([^\]]*)\]\([^)]*\)/g, '$1');  // links/images → their text
    return clean;   // full line — the collapsed box wraps to fit it
  };
  const lastLineSummary = (s) => lineSummary(s, true);
  // Copy to clipboard, with a fallback for non-secure (plain-http LAN) contexts
  // where navigator.clipboard is unavailable.
  async function copyText(text) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch {}
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.top = '-1000px'; ta.setAttribute('readonly', '');
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch { return false; }
  }
  // Wrap every rendered code block in a positioned container and pin a Copy
  // button to it. The wrap (not the scrolling <pre>) carries the button so it
  // stays put when wide code scrolls horizontally.
  function addCopyButtons(root) {
    root.querySelectorAll('pre').forEach((pre) => {
      if (pre.parentElement && pre.parentElement.classList.contains('code-wrap')) return;
      const wrap = document.createElement('div');
      wrap.className = 'code-wrap';
      pre.parentNode.insertBefore(wrap, pre);
      wrap.appendChild(pre);
      const code = pre.querySelector('code') || pre;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.title = 'Copy to clipboard';
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const ok = await copyText(code.innerText.replace(/\n+$/, ''));
        btn.textContent = ok ? 'Copied' : 'Failed';
        btn.classList.toggle('copied', ok);
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
      });
      wrap.appendChild(btn);
    });
  }

  // ── Interactive reports ───────────────────────────────────────────────────
  // An AI turn may emit a ```runn-report fenced block whose body is a
  // self-contained HTML/CSS/JS document. We render it in a sandboxed iframe:
  //   sandbox="allow-scripts" (and NOT allow-same-origin) → the script runs in
  //   an opaque origin, so it can't touch Runn's DOM, our 127.0.0.1 API, cookies
  //   or storage; a locked CSP (connect-src 'none') blocks all network egress.
  // JS works for live controls/visualisations, but data the AI inlines can't
  // leave the frame. Ephemeral: rebuilt from the turn text on every render.
  let reportSeq = 0;
  const reportFrames = new Map();
  function reportSrcdoc(html, id) {
    const csp = "default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; "
      + "img-src data: blob:; font-src data:; media-src data: blob:; connect-src 'none'";
    // Reports can't read their own height from the parent (opaque origin), so the
    // frame posts its height up and the parent sizes it (see the message listener).
    const reporter = '<scr' + 'ipt>(function(){function s(){try{parent.postMessage('
      + '{__runnReport:1,id:' + id + ',h:document.documentElement.scrollHeight},"*");}catch(e){}}'
      + 'addEventListener("load",s);if(window.ResizeObserver){new ResizeObserver(s)'
      + '.observe(document.documentElement);}setTimeout(s,60);setTimeout(s,400);})();</scr' + 'ipt>';
    // Always wrap in our own shell so we control <head> + CSP. A stray full
    // document from the AI still parses fine — the browser keeps our head.
    return '<!doctype html><html><head><meta charset="utf-8">'
      + '<meta http-equiv="Content-Security-Policy" content="' + csp + '">'
      + '<meta name="viewport" content="width=device-width, initial-scale=1">'
      + '<style>html,body{margin:0}body{font:14px/1.5 system-ui,-apple-system,sans-serif;'
      + 'color:#2a2620;padding:12px;box-sizing:border-box}*{box-sizing:border-box}</style>'
      + '</head><body>' + html + reporter + '</body></html>';
  }
  // Open a fullscreen copy at <body> level (see .report-modal CSS for why a class
  // on the card won't work on mobile). A fresh iframe + fresh id keeps it isolated
  // from the inline frame; closing just removes the modal.
  function openReportModal(html) {
    const modal = document.createElement('div');
    modal.className = 'report-modal';
    const panel = document.createElement('div');
    panel.className = 'report-panel';
    const head = document.createElement('div');
    head.className = 'report-head';
    head.innerHTML = '<span class="report-title">📊 Report</span>';
    const closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.textContent = '✕';
    closeBtn.title = 'Close';
    head.appendChild(closeBtn);
    const frame = document.createElement('iframe');
    frame.setAttribute('sandbox', 'allow-scripts');
    frame.srcdoc = reportSrcdoc(html, ++reportSeq);   // unregistered id → message handler ignores it; CSS sizes it
    panel.appendChild(head);
    panel.appendChild(frame);
    modal.appendChild(panel);
    const close = () => modal.remove();
    closeBtn.addEventListener('click', close);
    modal.addEventListener('click', (e) => { if (e.target === modal) close(); });  // click the dark margin to dismiss
    document.body.appendChild(modal);
  }
  function renderReports(root) {
    root.querySelectorAll('code.language-runn-report').forEach((code) => {
      const pre = code.closest('pre');
      if (!pre) return;
      const id = ++reportSeq;
      const html = code.textContent || '';
      const card = document.createElement('div');
      card.className = 'report-card';
      const head = document.createElement('div');
      head.className = 'report-head';
      head.innerHTML = '<span class="report-title">📊 Report</span>';
      const expandBtn = document.createElement('button');
      expandBtn.type = 'button';
      expandBtn.textContent = '⤢';
      expandBtn.title = 'Expand';
      expandBtn.addEventListener('click', () => openReportModal(html));
      head.appendChild(expandBtn);
      const frame = document.createElement('iframe');
      frame.setAttribute('sandbox', 'allow-scripts');
      frame.setAttribute('scrolling', 'no');
      frame.style.height = '120px';
      frame.srcdoc = reportSrcdoc(html, id);
      reportFrames.set(id, frame);
      card.appendChild(head);
      card.appendChild(frame);
      // Swap out the code block (or its code-wrap, if addCopyButtons ran first).
      const target = pre.parentElement && pre.parentElement.classList.contains('code-wrap')
        ? pre.parentElement : pre;
      target.replaceWith(card);
    });
  }
  window.addEventListener('message', (e) => {
    const d = e.data;
    if (!d || d.__runnReport !== 1) return;
    const frame = reportFrames.get(d.id);
    if (!frame) return;
    if (!frame.isConnected) { reportFrames.delete(d.id); return; }   // prune stale frames
    if (frame.contentWindow !== e.source) return;                    // ignore spoofed sources
    frame.style.height = Math.max(40, Math.min(2400, Number(d.h) || 0)) + 'px';
  });

  const clientName = (id) => (id && state.clients.get(id)?.name) || null;
  const clientOf = (id) => (id ? state.clients.get(id) : null);
  // Outstanding = done work not yet invoiced. Only 'done' billable jobs with a
  // rate and hours count toward the running $ total and the Outstanding tab.
  function jobValue(j) {
    const c = clientOf(j.client_id);
    if (!c || c.non_billable || !c.rate_per_hour) return 0;
    if (j.status !== 'done') return 0;
    // A hand-entered amount overrides hours × rate — the price lives on the job
    // record, so the invoice can't drift from it. See setJobAmount.
    if (j.amount_override != null && j.amount_override !== '') return round2(Number(j.amount_override));
    return (Number(j.hours) || 0) * Number(c.rate_per_hour);
  }
  const fmtMoney = (n) => '$' + Math.round(n).toLocaleString();
  const money2 = (n) => (Number(n) || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const money = (n) => '$' + money2(n);
  // A discount line is just a negative amount; render it as -$150.00, not $-150.00.
  const moneySigned = (sym, n) => { n = Number(n) || 0; return n < 0 ? `-${sym}${money2(-n)}` : `${sym}${money2(n)}`; };
  const round2 = (n) => Math.round((Number(n) || 0) * 100) / 100;
  // "Today" is the Melbourne calendar day, not UTC: toISOString() is always UTC,
  // so before ~10am local it would read as yesterday. Pin the zone explicitly so
  // the date is right wherever this runs (NUC, container, or a remote browser).
  const TZ = 'Australia/Melbourne';
  const today = () => new Intl.DateTimeFormat('en-CA', {
    timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit',
  }).format(new Date());
  // Pure calendar arithmetic on a YYYY-MM-DD string: parse and read back in UTC
  // so no zone offset ever shifts the day.
  function addDays(iso, days) {
    const d = new Date(iso + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + days);
    return d.toISOString().slice(0, 10);
  }
  // Calendar-week bounds for "this week": the current Sunday→Saturday span.
  // getUTCDay() is 0=Sun..6=Sat, so subtracting it lands on Sunday and adding the
  // complement lands on Saturday. UTC parse keeps it day-shift free.
  const startOfWeekIso = () => addDays(today(), -new Date(today() + 'T00:00:00Z').getUTCDay());
  const endOfWeekIso = () => addDays(today(), 6 - new Date(today() + 'T00:00:00Z').getUTCDay());
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    if (isNaN(d)) return iso;
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${dd}/${mm}/${d.getFullYear()}`;
  }
  // Invoice dates drop the leading zero on the day (e.g. 1/06/2026) to match the
  // real Robots & Co. template.
  function fmtDateInv(iso) {
    if (!iso) return '';
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    if (isNaN(d)) return iso;
    return `${d.getDate()}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
  }
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
    (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const titleOf = (j) => j.title || firstUserText(j) || null;
  function firstUserText(j) {
    const t = (j.turns || []).find((x) => x.role === 'user' && x.text);
    return t ? t.text.replace(/\s+/g, ' ').slice(0, 80) : null;
  }
  // A job's due date for display. overdue = past and the job isn't wrapped up.
  function dueInfo(j) {
    const d = j && j.due_at;
    if (!d) return { set: false, label: '', overdue: false };
    const overdue = d < today() && !['done', 'invoiced', 'paid', 'note'].includes(j.status);
    return { set: true, label: fmtDate(d), overdue };
  }
  // Due bucket for the labeled list dividers (overdue / today / tomorrow / this
  // week / later / no due). Wrapped-up jobs (done/invoiced/paid) never read as
  // overdue — their due date is moot — so a past-due finished job sinks to the
  // no-due tail rather than shouting red.
  function dueBucket(j) {
    // 'urgent' jumps every due bucket — its own rank above overdue keeps it
    // pinned to the top of the list (and gives it its own section divider).
    if (j && j.status === 'urgent') return { rank: 6, key: 'urgent', label: 'urgent' };
    const d = j && j.due_at;
    if (!d) return { rank: 0, key: 'none', label: 'no due' };
    const wrapped = ['done', 'invoiced', 'paid', 'note'].includes(j.status);
    const diff = Math.round((new Date(d + 'T00:00:00') - new Date(today() + 'T00:00:00')) / 86400000);
    if (diff < 0)   return wrapped ? { rank: 0, key: 'none', label: 'no due' } : { rank: 5, key: 'overdue', label: 'overdue' };
    if (diff === 0) return { rank: 4, key: 'today',    label: 'today' };
    if (diff === 1) return { rank: 3, key: 'tomorrow', label: 'tomorrow' };
    if (d <= endOfWeekIso()) return { rank: 2, key: 'thisweek', label: 'this week' };
    return { rank: 1, key: 'later', label: 'later' };
  }
  function dayLabel(iso) {
    return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── List rendering ──────────────────────────────
  function visibleJobs() {
    let jobs = [...state.jobs.values()].filter((j) => !j.archived);
    if (state.filterClient) jobs = jobs.filter((j) => j.client_id === state.filterClient);
    if (state.filterProject) jobs = jobs.filter((j) => j.thread === state.filterProject);
    return jobs.sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)));
  }
  // Distinct project (thread) names among a client's orchestrated jobs. With
  // openOnly, a project only counts if it has at least one job in an open
  // (active) status — so finished projects drop out of the picker.
  function projectsForClient(clientId, openOnly) {
    const names = new Set();
    for (const j of state.jobs.values()) {
      if (j.archived || j.client_id !== clientId) continue;
      if (j.type !== 'orchestrated' || !j.thread) continue;
      if (openOnly && !ACTIVE_STATUSES.includes(j.status)) continue;
      names.add(j.thread);
    }
    return [...names].sort((a, b) => String(a).localeCompare(String(b)));
  }
  function renderTotal(jobs) {
    const total = jobs.reduce((s, j) => s + jobValue(j), 0);
    $('valueTotal').textContent = total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  // The 'open' filter is a group: every status that isn't wrapped up. The
  // picker also offers each status individually plus 'all'.
  const ACTIVE_STATUSES = ['urgent', 'open', 'doing', 'review', 'blocked', 'hold'];
  const STATUS_FILTERS = ['urgent', 'open', 'doing', 'review', 'blocked', 'hold', 'done', 'invoiced', 'paid', 'note', 'all'];
  function matchesStatusFilter(j) {
    const sf = state.statusFilter;
    if (sf === 'all') return true;
    if (sf === 'open') return ACTIVE_STATUSES.includes(j.status);
    return j.status === sf;
  }
  // Due-bucket filter. 'thisweek' is the next-7-days run (today → this week).
  const DUE_FILTERS = ['overdue', 'today', 'thisweek', 'later', 'none', 'all'];
  // 'tomorrow' isn't in the picker — it's only reachable by clicking the
  // "tomorrow" list divider — but it still needs a chip label.
  const DUE_LABELS = { all: 'Any', urgent: 'Urgent', overdue: 'Overdue', today: 'Today', tomorrow: 'Tomorrow', thisweek: 'This week', later: 'Later', none: 'No due' };
  function matchesDueFilter(j) {
    const df = state.dueFilter;
    if (df === 'all') return true;
    const key = dueBucket(j).key;
    // "This week" filters by the literal Sunday→Saturday calendar week, so it
    // also catches earlier-this-week days that have already gone overdue.
    if (df === 'thisweek') return !!j.due_at && j.due_at >= startOfWeekIso() && j.due_at <= endOfWeekIso();
    return key === df;
  }
  // Repaint the two filter chips from state (label + colour).
  function renderFilterOptions() {
    const c = state.filterClient ? state.clients.get(state.filterClient) : null;
    if (state.filterClient && !c) state.filterClient = '';   // client vanished → fall back to All
    // Drop a stale project pick if its client is gone or it no longer exists.
    if (state.filterProject && (!c || !projectsForClient(state.filterClient, false).includes(state.filterProject))) state.filterProject = '';
    $('clientFilterChip').textContent = c ? (state.filterProject ? c.name + ' · ' + state.filterProject : c.name) : 'All';
    const sc = $('statusFilterChip');
    const sf = state.statusFilter;
    sc.className = 'filter-chip chip pick' + (sf === 'all' ? '' : ' st-' + sf);
    sc.textContent = sf === 'all' ? 'All' : sf;
    const dc = $('dueFilterChip');
    const df = state.dueFilter;
    dc.className = 'filter-chip chip pick due-filter' + (df === 'overdue' ? ' is-overdue' : df === 'today' ? ' is-today' : '');
    dc.textContent = DUE_LABELS[df] || 'Any';
  }
  function renderList() {
    const base = visibleJobs();
    renderTotal(base);                       // $ total always sums the full set (incl. done)
    const jobs = base.filter((j) => matchesStatusFilter(j) && matchesDueFilter(j));
    jobListEl.innerHTML = '';
    const showEmpty = () => {
      const e = document.createElement('div');
      e.className = 'empty';
      e.style.padding = '40px 24px';
      e.textContent = base.length ? 'No jobs match this filter.'
                    : state.filterClient ? 'No jobs for this client yet.' : 'No jobs yet — hit + Job to start.';
      jobListEl.appendChild(e);
    };

    // Drilled into a project (via the picker): just that project's jobs, in
    // build order — no date buckets, no group header.
    if (state.filterProject) {
      const items = jobs.slice().sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
      if (!items.length) return showEmpty();
      items.forEach((j) => jobListEl.appendChild(buildJobRow(j)));
      return;
    }

    // Otherwise — All, or a client with no project picked — every job flows in
    // the normal due-date list, orchestrated jobs included (just no group band).
    const list = jobs.slice();
    if (!list.length) return showEmpty();
    // Order by due urgency (overdue → today → … → no due) so the labeled
    // dividers group cleanly. Within a bucket, review jobs rise to the top and
    // on-hold jobs sink below the rest; remaining ties fall back to
    // most-recently-touched.
    list.sort((a, b) => (dueBucket(b).rank - dueBucket(a).rank)
      || ((b.status === 'review') - (a.status === 'review'))
      || ((a.status === 'hold') - (b.status === 'hold'))
      || String(b.updated_at).localeCompare(String(a.updated_at)));
    const buckets = list.map(dueBucket);
    // Show dividers when there's more than one bucket, or a due filter is active.
    const showDividers = new Set(buckets.map((b) => b.key)).size > 1 || state.dueFilter !== 'all';
    let prevKey = null;
    list.forEach((j, i) => {
      const b = buckets[i];
      if (showDividers && b.key !== prevKey) {
        const sep = document.createElement('div');
        sep.className = 'list-divider';
        sep.dataset.bucket = b.key;
        const lbl = document.createElement('button');
        lbl.type = 'button';
        lbl.className = 'divider-label' + (state.dueFilter === b.key ? ' is-active' : '');
        lbl.textContent = b.label;
        lbl.addEventListener('click', () => {       // quick filter: toggle this bucket
          state.dueFilter = (state.dueFilter === b.key) ? 'all' : b.key;
          renderFilterOptions();
          renderList();
        });
        sep.appendChild(lbl);
        jobListEl.appendChild(sep);
      }
      prevKey = b.key;
      jobListEl.appendChild(buildJobRow(j));
    });
  }

  // Build one job-row element — shared by the thread groups and the standard
  // due-bucket list. dueBucket drives the urgency tint regardless of section.
  function buildJobRow(j) {
    const b = dueBucket(j);
    const row = document.createElement('div');
    row.className = 'job-row' + (j.id === state.currentId ? ' active' : '')
      + (b.key === 'urgent' ? ' is-urgent' : b.key === 'overdue' ? ' due-overdue' : b.key === 'today' ? ' due-today' : '');
    row.dataset.id = j.id;

    const ttl = titleOf(j);
    const title = document.createElement('div');
    title.className = 'title' + (ttl ? '' : ' untitled');
    title.textContent = ttl || 'Untitled job';
    row.appendChild(title);

    // Three justified slots: client left, due centre, status right. Empty
    // placeholders keep the grid columns stable when a job lacks one.
    const meta = document.createElement('div');
    meta.className = 'meta';
    const cEl = document.createElement('span');
    cEl.className = 'meta-client';
    const cn = clientName(j.client_id);
    if (cn) {
      cEl.classList.add('chip', 'client', 'tap');
      cEl.textContent = cn;
      cEl.title = 'Filter by ' + cn;
      cEl.addEventListener('click', (ev) => {     // quick filter: toggle this client
        ev.stopPropagation();                     // don't open the job row
        state.filterClient = (state.filterClient === j.client_id) ? '' : j.client_id;
        renderFilterOptions();
        renderList();
      });
    }
    meta.appendChild(cEl);
    const dEl = document.createElement('span');
    dEl.className = 'meta-due';
    const di = dueInfo(j);
    if (di.set) { dEl.classList.add('due'); if (di.overdue) dEl.classList.add('overdue'); dEl.textContent = di.label; }
    meta.appendChild(dEl);
    const sEl = statusChip(j.status);   // static — no jobId, so not the picker
    sEl.classList.add('meta-status', 'tap');
    sEl.title = 'Filter by ' + j.status;
    sEl.addEventListener('click', (ev) => {     // quick filter: toggle this status
      ev.stopPropagation();                     // don't open the job row
      state.statusFilter = (state.statusFilter === j.status) ? 'open' : j.status;
      renderFilterOptions();
      renderList();
    });
    meta.appendChild(sEl);
    row.appendChild(meta);

    // The card toggles its own detail pane: tap an unopened card to open it
    // (pane 2) and start the work clock; tap the already-open card again to
    // close the detail and stop tracking.
    row.addEventListener('click', () => {
      if (state.currentId === j.id) closeChat();
      else openJob(j.id);
    });
    return row;
  }

  function statusChip(status, jobId) {
