// ── Chat input: send message to open session ─────────────────
const chatInput    = document.getElementById('chatInput');
const chatSend     = document.getElementById('chatSend');
const chatInputRow = document.getElementById('chatInputRow');
const chatErrorMsg = document.getElementById('chatErrorMsg');

async function handleChatSubmit() {
  if (!openCardId) return;
  const val = chatInput.value.trim();
  if (!val) return;
  chatInputRow.classList.add('busy');
  chatInput.disabled = true;
  chatSend.disabled = true;
  chatErrorMsg.hidden = true;
  try {
    await sendMessage(openCardId, val);
    chatInput.value = '';
    // Transcript will refresh via session.updated WS event.
  } catch (err) {
    chatErrorMsg.textContent = `Send failed: ${err.message}`;
    chatErrorMsg.hidden = false;
  } finally {
    chatInputRow.classList.remove('busy');
    chatInput.disabled = false;
    chatSend.disabled = false;
    chatInput.focus();
  }
}
chatSend.addEventListener('click', handleChatSubmit);
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChatSubmit(); }
});

// ── WebSocket ────────────────────────────────────────────────
const wsDot = document.getElementById('wsDot');
let ws;
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => wsDot.classList.add('live');
  ws.onclose = () => {
    wsDot.classList.remove('live');
    setTimeout(connectWS, 1000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'card.added') {
      cards.set(msg.card.id, msg.card);
      // Auto-expand the parent so the new step is actually visible.
      if (msg.card.parent_id) expandedCardIds.add(msg.card.parent_id);
      renderAll();
      flash(msg.card.id);
      if (openCardId && msg.card.parent_id === openCardId) renderSteps();
      refreshOutstanding();
      if (billingPanel.classList.contains('open')) renderBillingPanel();
    } else if (msg.type === 'card.changed') {
      cards.set(msg.card.id, msg.card);
      const el = list.querySelector(`[data-card-id="${CSS.escape(msg.card.id)}"]`);
      if (el) {
        applyCard(el, msg.card);
        flash(msg.card.id);
        renderAll();
      } else {
        renderAll();
      }
      // If this card is currently open in the panel, refresh panel state
      if (openCardId === msg.card.id) applyPanel(msg.card);
      // If this card is a step of the open card, refresh the steps list
      if (openCardId && msg.card.parent_id === openCardId) renderSteps();
      refreshOutstanding();
      if (billingPanel.classList.contains('open')) renderBillingPanel();
    } else if (msg.type === 'card.removed') {
      cards.delete(msg.card.id);
      renderAll();
      if (openCardId) renderSteps();
      refreshOutstanding();
      if (billingPanel.classList.contains('open')) renderBillingPanel();
    } else if (msg.type === 'session.updated') {
      pulseSession(msg.session_id);
      // If the chat panel is open for a card with this session, refresh it.
      if (openCardId) {
        const c = cards.get(openCardId);
        if (c && c.session_id === msg.session_id) refreshOpenTranscript();
      }
    }
  };
}

function pulseSession(sessionId) {
  for (const c of cards.values()) {
    if (c.session_id !== sessionId) continue;
    const el = list.querySelector(`[data-card-id="${CSS.escape(c.id)}"]`);
    const dot = el && el.querySelector('.pulse');
    if (!dot) continue;
    dot.classList.remove('live');
    void dot.offsetWidth;
    dot.classList.add('live');
    setTimeout(() => dot.classList.remove('live'), 1500);
  }
}

function flash(id) {
  const el = list.querySelector(`[data-card-id="${CSS.escape(id)}"]`);
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth; // restart animation
  el.classList.add('flash');
}

// ── Invoice composer ──────────────────────────────────────
async function openComposer(tag) {
  const t = await api('GET', `/tags/${encodeURIComponent(tag)}`);
  const s = await api('GET', '/settings');
  const rate = (t.rate_per_hour != null) ? t.rate_per_hour : (s.default_rate_per_hour || 0);
  // Collect this tag's done+unbilled cards
  const items = [];
  for (const c of cards.values()) {
    if (c.status !== 'done') continue;
    if ((c.billing || 'unbilled') !== 'unbilled') continue;
    if (!(c.tags || []).includes(tag)) continue;
    const hours = (typeof c.hours === 'number') ? c.hours : 0;
    const amount = round2(hours * rate);
    items.push({
      card_id: c.id,
      description: c.title,
      date: (c.updated_at || '').slice(0, 10) || todayISOC(),
      amount_ex_gst: amount,
    });
  }
  composerCtx = { tag, items, gstRate: s.default_gst_rate || 0.10, currencySymbol: s.currency_symbol || '$' };
  document.getElementById('compTitle').textContent = `New invoice for #${tag}`;
  document.getElementById('compClientHint').textContent =
    t.client_name ? `To: ${t.client_name}` : `(No client name set — click ⚙ on the tag to add details)`;
  document.getElementById('compIssued').value = todayISOC();
  document.getElementById('compDue').value    = addDaysISO(todayISOC(), s.default_due_days || 14);
  document.getElementById('compNotes').value  = '';
  renderComposerItems();
  openModal(modalComposer);
}
function todayISOC() { return new Date().toISOString().slice(0, 10); }
function addDaysISO(iso, days) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
function round2(n) { return Math.round(n * 100) / 100; }

function renderComposerItems() {
  const cont = document.getElementById('compItems');
  cont.innerHTML = '';
  for (let i = 0; i < composerCtx.items.length; i++) {
    const it = composerCtx.items[i];
    const row = document.createElement('div');
    row.className = 'composer-item';
    row.innerHTML = `
      <input type="text" placeholder="Description" value="">
      <input type="date" value="">
      <input type="number" step="0.01" min="0" placeholder="amount" value="">
      <button class="rm" title="Remove">×</button>
    `;
    const [descIn, dateIn, amtIn, rmBtn] = row.querySelectorAll('input,button');
    descIn.value = it.description;
    dateIn.value = it.date;
    amtIn.value  = it.amount_ex_gst;
    descIn.addEventListener('input', () => { composerCtx.items[i].description = descIn.value; });
    dateIn.addEventListener('change', () => { composerCtx.items[i].date = dateIn.value; });
    amtIn.addEventListener('input', () => {
      composerCtx.items[i].amount_ex_gst = Number(amtIn.value) || 0;
      renderComposerTotals();
    });
    rmBtn.addEventListener('click', () => {
      composerCtx.items.splice(i, 1);
      renderComposerItems();
    });
    cont.appendChild(row);
  }
  renderComposerTotals();
}
function renderComposerTotals() {
  const sym = composerCtx.currencySymbol;
  const subtotal = round2(composerCtx.items.reduce((s, it) => s + (Number(it.amount_ex_gst) || 0), 0));
  const gst      = round2(subtotal * composerCtx.gstRate);
  const total    = round2(subtotal + gst);
  document.getElementById('compTotals').innerHTML = `
    <div class="composer-totals-row"><span class="composer-totals-label">Subtotal ex GST:</span><span>${sym}${subtotal.toFixed(2)}</span></div>
    <div class="composer-totals-row"><span class="composer-totals-label">GST (${(composerCtx.gstRate*100).toFixed(0)}%):</span><span>${sym}${gst.toFixed(2)}</span></div>
    <div class="composer-totals-row total"><span class="composer-totals-label">Total inc GST:</span><span>${sym}${total.toFixed(2)}</span></div>
  `;
}
document.getElementById('compAddRow').addEventListener('click', () => {
  composerCtx.items.push({ card_id: null, description: '', date: todayISOC(), amount_ex_gst: 0 });
  renderComposerItems();
});
document.getElementById('compIssue').addEventListener('click', async () => {
  if (!composerCtx) return;
  const btn = document.getElementById('compIssue');
  btn.disabled = true;
  btn.textContent = 'issuing…';
  try {
    const inv = await api('POST', '/invoices', {
      tag: composerCtx.tag,
      items: composerCtx.items,
      issued_at: document.getElementById('compIssued').value,
      due_at:    document.getElementById('compDue').value,
      notes:     document.getElementById('compNotes').value,
      gst_rate:  composerCtx.gstRate,
    });

    navigateTo(`/invoices/${inv.id}`);

    btn.disabled = false; btn.textContent = 'issue invoice';

for (const t of document.querySelectorAll('.billing-tab')) {
  t.addEventListener('click', () => {
    for (const x of document.querySelectorAll('.billing-tab')) x.classList.remove('active');
    t.classList.add('active');
    currentBillingTab = t.dataset.tab;
    renderBillingPanel();

// Override the original renderBillingPanel to support tabs
const _origRenderBillingPanel = renderBillingPanel;
renderBillingPanel = function() {
  if (currentBillingTab === 'invoices') renderInvoicesTab();
  else renderOutstandingTab();
};

function renderOutstandingTab() {
  _origRenderBillingPanel();
  // Inject per-group "Generate invoice" buttons + edit-tag affordances
  const groups = billingGroups();
  const grpEls = billingBody.querySelectorAll('.billing-group');
  let i = 0;
  for (const [tag, g] of [...groups.entries()].sort((a, b) =>
        (b[1].hours.unbilled + b[1].hours.invoiced) - (a[1].hours.unbilled + a[1].hours.invoiced))) {
    const grpEl = grpEls[i++];
    if (!grpEl) continue;
    if (tag === '_untagged') continue;
    // Add edit-tag button in header
    const header = grpEl.querySelector('.billing-group-header');
    if (header && !header.querySelector('.billing-group-edit')) {
      const editBtn = document.createElement('button');
      editBtn.className = 'billing-group-edit';
      editBtn.title = 'Edit tag settings';
      editBtn.textContent = '⚙';
      editBtn.addEventListener('click', (ev) => { ev.stopPropagation(); openTagSettings(tag); });
      header.insertBefore(editBtn, header.querySelector('.billing-group-total'));
    }
    // Add "Generate invoice" button to actions row
    const actions = grpEl.querySelector('.billing-group-actions');
    if (actions && !actions.querySelector('.gen-invoice-btn')) {
      const genBtn = document.createElement('button');
      genBtn.className = 'detail-btn primary gen-invoice-btn';
      genBtn.textContent = 'generate invoice';
      genBtn.addEventListener('click', () => openComposer(tag));
      actions.insertBefore(genBtn, actions.firstChild);
    }
  }
}

async function renderInvoicesTab() {
  billingBody.innerHTML = '<div class="billing-empty">Loading…</div>';
  let invoices = [];
  try { invoices = await api('GET', '/invoices'); } catch {}
  billingBody.innerHTML = '';
  if (!invoices.length) {
    billingBody.innerHTML = '<div class="billing-empty">No invoices yet.<br>Generate one from the Outstanding tab.</div>';
    return;
  }
  for (const inv of invoices) {
    const row = document.createElement('div');
    row.className = 'billing-invoice-row';
    const sym = (inv.snapshot && inv.snapshot.currency_symbol) || '$';
    row.innerHTML = `
      <span class="billing-invoice-id">${escapeHtml(inv.id)}</span>
      <span class="billing-invoice-meta">${escapeHtml(inv.snapshot && inv.snapshot.to && inv.snapshot.to.company || inv.tag)} · ${escapeHtml(inv.issued_at || '')}</span>
      <span class="billing-invoice-total">${sym}${(inv.total_inc_gst || 0).toFixed(2)}</span>
      <span class="billing-invoice-status ${inv.status || 'draft'}">${inv.status || 'draft'}</span>
    `;
    row.addEventListener('click', () => navigateTo(`/invoices/${inv.id}`));
    billingBody.appendChild(row);
  }
}

// ── SPA routing ───────────────────────────────────────────
function navigateTo(path) {
  history.pushState({}, '', path);
  route();
}
function route() {
  const m = location.pathname.match(/^\/invoices\/(.+)$/);
  if (m) {
    document.body.classList.add('invoice-route');
    closeBilling();
    closeChat();
    closeAllModals();
    currentInvoiceId = m[1];
    renderInvoicePage(m[1]);
  } else {
    document.body.classList.remove('invoice-route');
    currentInvoiceId = null;
  }
}
window.addEventListener('popstate', route);

async function renderInvoicePage(id) {
  invoiceDoc.innerHTML = '<div style="text-align:center;padding:40px;color:#8c8578;">Loading…</div>';
  let inv;
  try { inv = await api('GET', `/invoices/${encodeURIComponent(id)}`); }
  catch (err) {
    invoiceDoc.innerHTML = `<div style="text-align:center;padding:40px;color:#b84f1f;">Invoice not found: ${escapeHtml(err.message)}</div>`;
    return;
  }
  document.title = `Tax Invoice ${inv.id} — Runn`;
  const snap = inv.snapshot || {};
  const from = snap.from || {};
  const to   = snap.to   || {};
  const bank = snap.bank || {};
  const sym  = snap.currency_symbol || '$';

  function fmt$(n) { return sym + (Number(n) || 0).toFixed(2); }
  function fmtAUDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  const itemsHtml = inv.items.map(it => `
    <tr>
      <td>${escapeHtml(it.description || '')}</td>
      <td class="date">${fmtAUDate(it.date)}</td>
      <td class="right">${fmt$(it.amount_ex_gst)}</td>
    </tr>
  `).join('');

  const logoHtml = from.logo_path
    ? `<img class="invoice-doc-logo" src="${escapeHtml(from.logo_path)}" alt="logo" onerror="this.style.display='none'">`
    : '';

  const balance = (typeof inv.balance === 'number') ? inv.balance : (inv.total_inc_gst - (inv.paid || 0));
  const balanceClass = balance > 0 ? 'outstanding' : '';

  invoiceDoc.innerHTML = `
    <div class="invoice-doc-header">
      <div>
        ${logoHtml}
        <div class="invoice-doc-from-meta">
          ${(from.address_lines || []).map(escapeHtml).join('<br>')}
          ${from.abn_acn ? '<br>' + escapeHtml(from.abn_acn) : ''}
        </div>
      </div>
      <div class="invoice-doc-right">
        <div class="invoice-doc-title">Tax Invoice ${escapeHtml(inv.id)}</div>
        <div class="invoice-doc-to">
          ${to.contact ? 'Att:<br>' + escapeHtml(to.contact) + '<br>' : ''}
          ${to.company ? escapeHtml(to.company) + '<br>' : ''}
          ${(to.address_lines || []).map(escapeHtml).join('<br>')}
        </div>
      </div>
    </div>
    <table class="invoice-doc-table">
      <thead>
        <tr>
          <th>Item Description</th>
          <th>Date</th>
          <th class="right">Amount ExGST</th>
        </tr>
      </thead>
      <tbody>${itemsHtml}</tbody>
    </table>
    <div class="invoice-doc-footer">
      <div class="invoice-doc-bank">
        <div class="invoice-doc-bank-row"><span class="lbl">Due:</span><span>${fmtAUDate(inv.due_at)}</span></div>
        ${bank.bank ? `<div class="invoice-doc-bank-row"><span class="lbl">Bank:</span><span>${escapeHtml(bank.bank)}</span></div>` : ''}
        ${bank.name ? `<div class="invoice-doc-bank-row"><span class="lbl">Name:</span><span>${escapeHtml(bank.name)}</span></div>` : ''}
        ${bank.bsb  ? `<div class="invoice-doc-bank-row"><span class="lbl">BSB:</span><span>${escapeHtml(bank.bsb)}</span></div>` : ''}
        ${bank.acc  ? `<div class="invoice-doc-bank-row"><span class="lbl">Acc:</span><span>${escapeHtml(bank.acc)}</span></div>` : ''}
      </div>
      <div class="invoice-doc-totals">
        <div class="invoice-doc-totals-row"><span class="lbl">Sub Total Ex GST:</span><span class="val">${fmt$(inv.subtotal_ex_gst)}</span></div>
        <div class="invoice-doc-totals-row"><span class="lbl">GST:</span><span class="val">${fmt$(inv.gst)}</span></div>
        <div class="invoice-doc-totals-row"><span class="lbl">Total Inc GST:</span><span class="val">${fmt$(inv.total_inc_gst)}</span></div>
        <div class="invoice-doc-totals-row"><span class="lbl">Paid:</span><span class="val">${(inv.paid || 0) > 0 ? fmt$(inv.paid) : ''}</span></div>
        <div class="invoice-doc-totals-row balance"><span class="lbl">Balance:</span><span class="val ${balanceClass}">${fmt$(balance)}</span></div>
      </div>
    </div>
  `;

  // Status badge + action buttons
  const status = inv.status || 'draft';
  invStatusBadge.innerHTML = `<span class="billing-invoice-status ${status}">${status}</span>`;
  const markSent = document.getElementById('invMarkSent');
  const markPaid = document.getElementById('invMarkPaid');
  markSent.disabled = (status !== 'draft');
  markPaid.disabled = (status === 'paid');
  markSent.onclick = async () => {
    await api('PATCH', `/invoices/${encodeURIComponent(inv.id)}`, { status: 'sent' });
    renderInvoicePage(inv.id);
  };
  markPaid.onclick = async () => {
    await api('PATCH', `/invoices/${encodeURIComponent(inv.id)}`, {
      status: 'paid',
      paid: inv.total_inc_gst,
    });
    renderInvoicePage(inv.id);
  };
}
