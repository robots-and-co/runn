    const c = document.createElement('span');
    const st = status || 'open';
    c.className = 'chip st-' + st + (jobId ? ' pick' : '');
    c.textContent = st;
    if (jobId) {
      c.addEventListener('click', (ev) => {
        ev.stopPropagation();          // don't open the job row
        openChipMenu(c, jobId, st);
      });
    }
    return c;
  }

  // ── Status picker (selectable chip → dropdown) ──
  const STATUS_ORDER = ['urgent', 'open', 'doing', 'review', 'blocked', 'hold', 'done', 'invoiced', 'paid', 'note'];
  let chipMenuJobId = null;
  function openChipMenu(anchorEl, jobId, current) {
    const menu = $('chipMenu');
    chipMenuJobId = jobId;
    menu.innerHTML = '';
    for (const st of STATUS_ORDER) {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (st === current ? ' is-current' : '');
      item.dataset.status = st;
      item.appendChild(statusChip(st));   // static colored chip (no jobId)
      menu.appendChild(item);
    }
    menu.hidden = false;
    const r = anchorEl.getBoundingClientRect();
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    let left = r.left;
    let top = r.bottom + 4;
    if (left + mw > window.innerWidth - 8) left = window.innerWidth - 8 - mw;
    if (top + mh > window.innerHeight - 8) top = r.top - 4 - mh;  // flip above if no room below
    menu.style.left = Math.max(8, left) + 'px';
    menu.style.top = Math.max(8, top) + 'px';
  }
  function closeChipMenu() { $('chipMenu').hidden = true; chipMenuJobId = null; }
  async function setJobStatus(id, status) {
    const j = await patchJson('/jobs/' + id, { status });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }
  async function setJobDue(id, due_at) {
    const j = await patchJson('/jobs/' + id, { due_at: due_at || null });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }
  // Hand-edit the work hours. We persist hours AND the matching work_seconds so
  // the live timer (which derives from work_seconds) and billing stay in step.
  // Only valid while the work clock is stopped — a running job owns its own time.
  async function setJobHours(id, hours) {
    const h = Math.max(0, round2(hours));
    const j = await patchJson('/jobs/' + id, { hours: h, work_seconds: Math.round(h * 3600) });
    state.jobs.set(j.id, j);
    renderList(); renderTimerDisplay();
  }
  // Hand-edit the billable $ on the job — a manual override of hours × rate. This
  // writes ONLY amount_override; it never touches hours/work_seconds, so logged
  // time is preserved. An empty field clears the override (back to auto). Keeping
  // the price on the job record is what stops invoices drifting from it.
  async function setJobAmount(id, raw) {
    const s = String(raw).replace(/[^0-9.]/g, '');   // tolerate the $ and thousands commas
    let override;
    if (s === '') {
      override = null;
    } else {
      const v = parseFloat(s);
      if (!isFinite(v) || v < 0) { renderTimerDisplay(); return; }
      override = round2(v);
    }
    const j = await patchJson('/jobs/' + id, { amount_override: override });
    state.jobs.set(j.id, j);
    renderList(); renderTimerDisplay();
  }
  async function setJobTitle(id, title) {
    const j = await patchJson('/jobs/' + id, { title });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }
  // Inline rename from the chat header. Click the title → it becomes a field,
  // commit on Enter/blur, cancel on Escape. Clearing it to empty drops the
  // override so the title falls back to the first message (titleOf()).
  let titleEditCancelled = false;
  function beginRenameTitle() {
    const id = state.currentId;
    if (!id || id === DRAFT || state.picking) return;
    const j = state.jobs.get(id);
    if (!j) return;
    state.renaming = id;
    titleEditCancelled = false;
    const input = $('chatTitleInput');
    input.value = titleOf(j) || '';
    input.hidden = false;
    $('chatTitle').hidden = true;
    input.focus();
    input.select();
  }
  function cancelRenameTitle() {
    state.renaming = null;
    titleEditCancelled = true;
    renderChat();
  }
  async function commitRenameTitle() {
    if (state.renaming == null) return;
    const id = state.renaming;
    const j = state.jobs.get(id);
    const raw = $('chatTitleInput').value.trim();
    const next = raw === '' ? null : raw;
    const effective = (j && titleOf(j)) || null;
    state.renaming = null;
    renderChat();                      // restore the title span right away
    if (next === effective) return;    // unchanged → nothing to save
    try { await setJobTitle(id, next); }
    catch (e) { console.error('rename failed', e); }
  }
  // Paint the header due chip for the open job: a pill that reads "Set due" when
  // empty or "Due <date>" when set, goes red when overdue, and shows a clear (×).
  function renderDueChip(j) {
    const chip = $('chatDue'), btn = $('chatDueBtn'), clr = $('chatDueClear'), tdy = $('chatDueToday');
    const di = dueInfo(j);
    chip.classList.toggle('overdue', di.overdue);
    btn.classList.toggle('empty', !di.set);
    btn.textContent = di.set ? 'Due ' + di.label : 'Set due';
    clr.hidden = !di.set;
    tdy.hidden = di.set;       // quick "Today" only while there's no due yet
    chip.hidden = false;
  }

  // ── Job actions menu (archive / delete) ──
  function placeMenu(menu, anchorEl, align = 'left') {
    const r = anchorEl.getBoundingClientRect();
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    let left = align === 'right' ? r.right - mw : r.left;
    let top = r.bottom + 4;
    if (left + mw > window.innerWidth - 8) left = window.innerWidth - 8 - mw;
    if (top + mh > window.innerHeight - 8) top = r.top - 4 - mh;
    menu.style.left = Math.max(8, left) + 'px';
    menu.style.top = Math.max(8, top) + 'px';
  }
  function openJobMenu(anchorEl) {
    const menu = $('jobMenu');
    menu.innerHTML = '';
    const archive = document.createElement('button');
    archive.type = 'button';
    archive.className = 'chip-menu-item';
    archive.dataset.action = 'archive';
    archive.textContent = 'Archive job';
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'chip-menu-item danger';
    del.dataset.action = 'delete';
    del.textContent = 'Delete job';
    menu.appendChild(archive);
    menu.appendChild(del);
    menu.hidden = false;
    placeMenu(menu, anchorEl, 'right');
  }
  function closeJobMenu() { $('jobMenu').hidden = true; }

  // Phone-only overflow fronting 📝 + 📎. Items mirror the inline buttons'
  // availability: attach unless disabled (note mode / no job), note only once
  // Claude's been invited. The is-current dot reflects active note mode.
  function openComposerMenu(anchorEl) {
    const menu = $('composerMenu');
    menu.innerHTML = '';
    const mk = (action, label, current) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (current ? ' is-current' : '');
      item.dataset.action = action;
      item.textContent = label;
      menu.appendChild(item);
    };
    if (!attachBtn.disabled) mk('attach', '📎  Attach a file');
    if (!noteToggle.hidden) mk('note', '📝  Note mode', state.noteMode);
    if (!menu.children.length) return;   // nothing to offer — leave it closed
    menu.hidden = false;
    placeMenu(menu, anchorEl, 'right');
  }
  function closeComposerMenu() { $('composerMenu').hidden = true; }

  // ── Client picker (click the client chip to re-assign the job) ──
  let clientMenuJobId = null;
  function openClientMenu(anchorEl, jobId, currentClientId) {
    const menu = $('clientMenu');
    clientMenuJobId = jobId;
    menu.innerHTML = '';
    const mk = (value, label, isCurrent) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (isCurrent ? ' is-current' : '');
      item.dataset.client = value;          // '' = Personal (no client)
      item.textContent = label;
      menu.appendChild(item);
    };
    mk('', 'Personal', !currentClientId);
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    for (const c of clients) mk(c.id, c.name, c.id === currentClientId);
    menu.hidden = false;
    placeMenu(menu, anchorEl);
  }
  function closeClientMenu() { $('clientMenu').hidden = true; clientMenuJobId = null; }

  // ── List filter pickers (the two chips in the list subheader) ──
  function openClientFilterMenu(anchorEl) {
    const menu = $('clientFilterMenu');
    menu.innerHTML = '';
    const mkClient = (value, label, isCurrent) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (isCurrent ? ' is-current' : '');
      item.dataset.client = value;
      item.textContent = label;
      menu.appendChild(item);
    };
    // A project row: same client, plus a project name. Indented under its client.
    const mkProject = (clientId, name, isCurrent) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item is-project' + (isCurrent ? ' is-current' : '');
      item.dataset.client = clientId;
      item.dataset.project = name;
      item.textContent = name;
      menu.appendChild(item);
    };
    mkClient('', 'All clients', !state.filterClient && !state.filterProject);
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    for (const c of clients) {
      mkClient(c.id, c.name, c.id === state.filterClient && !state.filterProject);
      // Only projects that still have open work show under the client.
      for (const name of projectsForClient(c.id, true)) {
        mkProject(c.id, name, c.id === state.filterClient && name === state.filterProject);
      }
    }
    menu.hidden = false;
    placeMenu(menu, anchorEl, 'left');
  }
  function closeClientFilterMenu() { $('clientFilterMenu').hidden = true; }
  function openDueFilterMenu(anchorEl) {
    const menu = $('dueFilterMenu');
    menu.innerHTML = '';
    for (const v of DUE_FILTERS) {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (v === state.dueFilter ? ' is-current' : '');
      item.dataset.dueFilter = v;
      item.textContent = v === 'all' ? 'Any due' : DUE_LABELS[v];
      menu.appendChild(item);
    }
    menu.hidden = false;
    placeMenu(menu, anchorEl, 'left');
  }
  function closeDueFilterMenu() { $('dueFilterMenu').hidden = true; }
  function openStatusFilterMenu(anchorEl) {
    const menu = $('statusFilterMenu');
    menu.innerHTML = '';
    for (const v of STATUS_FILTERS) {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (v === state.statusFilter ? ' is-current' : '');
      item.dataset.statusFilter = v;
      if (v === 'all') { const c = document.createElement('span'); c.className = 'chip'; c.textContent = 'All'; item.appendChild(c); }
      else item.appendChild(statusChip(v));
      menu.appendChild(item);
    }
    menu.hidden = false;
    placeMenu(menu, anchorEl, 'right');
  }
  function closeStatusFilterMenu() { $('statusFilterMenu').hidden = true; }

  async function setJobClient(id, clientId) {
    const j = await patchJson('/jobs/' + id, { client_id: clientId || null });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }
  async function archiveCurrentJob() {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    await patchJson('/jobs/' + id, { archived: true });
    state.jobs.delete(id);
    closeChat();
  }
  // Quick "Done" (mobile): close out an active job, then pop back to the list.
  async function markCurrentJobDone() {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    const j = state.jobs.get(id);
    if (!j || !ACTIVE_STATUSES.includes(j.status || 'open')) return;
    try { await setJobStatus(id, 'done'); }
    catch (e) { console.error('mark done failed', e); return; }
    closeChat();
  }
  async function deleteCurrentJob() {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    const j = state.jobs.get(id);
    const name = (j && titleOf(j)) || 'this job';
    if (!confirm(`Delete ${name}? This removes the whole chat for good and can't be undone.`)) return;
    await delJson('/jobs/' + id);
    state.jobs.delete(id);
    closeChat();
  }

  // ── Active-work timer (v1 model) ────────────────
  // Time accrues only while a job's status is `doing` (the AI is working, or
  // it's set by hand). The server stamps doing_started_at on entering `doing`
  // and folds the elapsed time into the job on leaving — here we just paint a
  // live clock. timerSync() runs from renderChat, so it starts/stops the tick
  // as the open job changes or its status flips.
  const timer = { jobId: null, tickId: null };

  function jobSeconds(j) {
    if (!j) return 0;
    if (j.work_seconds != null) return Number(j.work_seconds) || 0;
    return Math.round((Number(j.hours) || 0) * 3600);   // back-fill from old jobs
  }
  // The work clock runs whenever the job carries a start-stamp. That stamp is set
  // EITHER by the user pressing play (manual; the clock is default-paused) OR by
  // the AI when it's spawned (status === 'doing'). Decoupled from the thinking
  // spinner, which keys off status === 'doing'.
  function jobRunning(j) { return !!(j && j.doing_started_at); }
  function liveSeconds(j) {
    let s = jobSeconds(j);
    if (jobRunning(j)) s += Math.max(0, (Date.now() - new Date(j.doing_started_at).getTime()) / 1000);
    return s;
  }
  function timerSync() {
    const id = (state.currentId && state.currentId !== DRAFT) ? state.currentId : null;
    timer.jobId = id;
    const running = jobRunning(id ? state.jobs.get(id) : null);
    if (running && !timer.tickId) timer.tickId = setInterval(renderTimerDisplay, 1000);
    if (!running && timer.tickId) { clearInterval(timer.tickId); timer.tickId = null; }
    renderTimerDisplay();
  }
  const fmtHours = (h) => String(round2(h));
  function renderTimerDisplay() {
    const cluster = $('chatTimer');
    const wrap = $('chatHours');
    const input = $('chatHoursInput');
    const amtWrap = $('chatAmount');
    const amtInput = $('chatAmountInput');
    const btn = $('clockBtn');
    const j = timer.jobId ? state.jobs.get(timer.jobId) : null;
    if (!j) {
      cluster.hidden = true; wrap.hidden = true; wrap.classList.remove('running');
      btn.hidden = true; amtWrap.hidden = true;
      return;
    }
    const running = jobRunning(j);
    const hrs = liveSeconds(j) / 3600;
    cluster.hidden = false;
    wrap.hidden = false;
    wrap.classList.toggle('running', running);
    input.readOnly = running;   // editable only when the work clock is stopped
    // Don't clobber what the user is mid-edit (only possible while stopped).
    if (!(input === document.activeElement && !running)) input.value = fmtHours(hrs);
    // Play/pause control. Hidden for terminal jobs (nothing more to bill) and
    // while the AI owns the clock (status 'doing' — the spinner covers that and
    // the backend refuses a manual stop). ▶ when paused, ⏸ when running.
    const showBtn = clockBillable(j) && j.status !== 'doing';
    btn.hidden = !showBtn;
    btn.textContent = running ? '⏸' : '▶';
    btn.classList.toggle('running', running);
    btn.setAttribute('aria-label', running ? 'Pause timer' : 'Start timer');
    btn.setAttribute('aria-pressed', running ? 'true' : 'false');
    // $ amount — billable clients only. Shows hours×rate live, OR a hand-entered
    // override when one's set (amber + ✎). Editable only while the clock is
    // stopped; editing it writes the amount alone and never the logged time.
    const c = clientOf(j.client_id);
    if (c && !c.non_billable && c.rate_per_hour) {
      const manual = j.amount_override != null && j.amount_override !== '';
      const amt = manual ? round2(Number(j.amount_override)) : round2(hrs * Number(c.rate_per_hour));
      amtWrap.hidden = false;
      amtWrap.classList.toggle('manual', manual);
      amtWrap.title = manual
        ? 'Manual amount — overrides hours × rate. Clear the field to revert to auto.'
        : 'Auto: hours × rate. Type an amount to set it manually.';
      amtInput.readOnly = running;
      // Don't clobber what the user is mid-edit (only possible while stopped).
      if (!(amtInput === document.activeElement && !running)) amtInput.value = money2(amt);
    } else {
      amtWrap.hidden = true;
    }
  }

  // ── Work-clock control (default paused) ─────────────
  // The clock NEVER auto-starts: opening a job must not tick (that ticking on
  // landing caused anxiety). The user presses play (clockToggle) to run it and
  // pause to stop. The only automatic move is *pausing* — when the job you were
  // timing stops being the open, billable foreground job (you closed it, opened
  // another, or it was marked done), stop its clock so it can't keep billing
  // while you're elsewhere. The AI's own clock (status 'doing') is never tracked
  // here, and the backend refuses a manual stop while it's running.
  let clockedJobId = null;
  function clockBillable(j) {
    return !!(j && j.status !== 'done' && j.status !== 'invoiced' && j.status !== 'paid' && j.status !== 'note');
  }
  function applyClockJob(j) {
    if (!j || !j.id) return;
    state.jobs.set(j.id, j);
    renderList();
    if (j.id === state.currentId) timerSync();
  }
  // Play/pause, wired to #clockBtn. Starts the clock on the open job, or stops it
  // if already running. No-op for drafts, terminal jobs, or while the AI owns it.
  function clockToggle() {
    const id = (state.currentId && state.currentId !== DRAFT) ? state.currentId : null;
    if (!id) return;
    const j = state.jobs.get(id);
    if (!clockBillable(j) || (j && j.status === 'doing')) return;
    if (jobRunning(j)) {
      clockedJobId = null;
      postJson(`/jobs/${id}/clock/stop`, {}).then(applyClockJob).catch(() => {});
    } else {
      clockedJobId = id;
      postJson(`/jobs/${id}/clock/start`, {}).then(applyClockJob).catch(() => {});
    }
  }
  // Reconcile on every navigation: pause the clocked job when it's no longer the
  // open, billable foreground job. Never starts anything.
  function clockSync() {
    const cur = (state.currentId && state.currentId !== DRAFT) ? state.currentId : null;
    const keep = (cur && clockBillable(state.jobs.get(cur))) ? cur : null;
    if (clockedJobId && clockedJobId !== keep) {
      const prev = clockedJobId; clockedJobId = null;
      postJson(`/jobs/${prev}/clock/stop`, {}).then(applyClockJob).catch(() => {});
    }
  }
  // On tab close a normal fetch may be cancelled — beacon the stop so a clock the
  // user left running doesn't keep ticking after the tab goes away.
  window.addEventListener('pagehide', () => {
    if (clockedJobId) { try { navigator.sendBeacon(`/jobs/${clockedJobId}/clock/stop`); } catch {} clockedJobId = null; }
  });

  // ── Billing ─────────────────────────────────────
  // The $ total in the list header flips the LEFT pane between jobs and invoices.
  // The invoice list lives in the left pane; selecting an entry opens its document
  // in the main pane (a slide-over on mobile, the right column on desktop).
  const isMobile = () => window.matchMedia('(max-width: 720px)').matches;
  // Set true right before a programmatic history.back() so the resulting popstate
  // is swallowed (avoids the back from closePreview cascading into exitInvoices).
  let suppressPop = false;

  function toggleInvoices() {
    flipPane(() => {
      if (state.invoicesPane) exitInvoices();
      else enterInvoices();
    });
  }
  // Half-flip the list body out (edge-on), run `applyChange` while it's hidden,
  // then flip the new content back in. Honours reduced-motion (instant swap).
  function flipPane(applyChange) {
    const flip = $('listFlip');
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!flip || reduce) { applyChange(); return; }
    flip.classList.remove('flip-in');
    flip.classList.add('flip-out');
    const onOut = (e) => {
      if (e.target !== flip) return;
      flip.removeEventListener('animationend', onOut);
      applyChange();
      flip.classList.remove('flip-out');
      flip.classList.add('flip-in');
      const onIn = (ev) => {
        if (ev.target !== flip) return;
        flip.removeEventListener('animationend', onIn);
        flip.classList.remove('flip-in');
      };
      flip.addEventListener('animationend', onIn);
    };
    flip.addEventListener('animationend', onOut);
  }
  function enterInvoices() {
    state.invoicesPane = true;
    state.currentId = null;
    state.picking = false;
    state.billingSel = null;
    state.editing = null;
    resetNewJobPicker();
    document.body.classList.add('show-invoices');
    $('billingBtn').classList.add('is-active');
    if (isMobile()) {
      if (!(history.state && history.state.runnInvoices)) history.pushState({ runnInvoices: true }, '');
    } else {
      document.body.classList.add('show-billing');   // desktop: doc/placeholder fills the main column
    }
    renderList();
    renderBilling();
  }
  function exitInvoices(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    state.invoicesPane = false;
    state.billingSel = null;
    state.editing = null;
    document.body.classList.remove('show-invoices', 'show-billing');
    $('billingBtn').classList.remove('is-active');
    renderList();
    renderChat();
    if (!fromPop && history.state && history.state.runnInvoices) history.back();
  }
  // Open one invoice/draft document in the main pane.
  function openInvoiceDoc(sel) {
    state.billingSel = sel;
    document.body.classList.add('show-billing');
    // Mobile: push a history entry so the device back button returns to the
    // invoice LIST (closeBillingDoc) rather than exiting the pane to the jobs list.
    if (isMobile() && !(history.state && history.state.runnBillingDoc)) history.pushState({ runnBillingDoc: true }, '');
    renderBilling();
  }
  // Close the open document, returning to the invoice list (mobile slides back;
  // desktop falls to the placeholder).
  function closeBillingDoc(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    state.billingSel = null;
    state.editing = null;
    if (isMobile()) document.body.classList.remove('show-billing');
    renderBilling();
    if (!fromPop && history.state && history.state.runnBillingDoc) { suppressPop = true; history.back(); }
  }
  // Don't auto-rerender billing out from under an in-progress draft edit.
  function maybeRenderBilling() {
    if (!state.invoicesPane) return;
    if (state.billingSel && state.billingSel.kind === 'draft') return;
    renderBilling();
  }
  function billingGroups() {
    const groups = new Map();   // clientId -> { client, rows:[], total }
    for (const j of state.jobs.values()) {
      if (j.archived) continue;
      if (j.status !== 'done') continue;                       // only done-not-yet-invoiced work rolls up
      const c = clientOf(j.client_id);
      if (!c || c.non_billable || !c.rate_per_hour) continue;  // billable clients only
      const v = jobValue(j);    // 0 until hours are logged — the job still rolls up so you can set hours on the draft
      let g = groups.get(c.id);
      if (!g) { g = { client: c, rows: [], total: 0 }; groups.set(c.id, g); }
      g.rows.push({ job: j, hours: Number(j.hours) || 0, amount: v });
      g.total += v;
    }
    const out = [...groups.values()];
    out.forEach((g) => g.rows.sort((a, b) => String(a.job.done_at || a.job.updated_at).localeCompare(String(b.job.done_at || b.job.updated_at))));
    return out.sort((a, b) => b.total - a.total);
  }
  // Two surfaces: the list (left pane) and the open document (main pane).
  function renderBilling() {
    if (!state.invoicesPane) return;
    renderBillingList($('billingList'));
    renderBillingDoc();
  }
  // The status pill beside the billing-pane title (issued docs only).
  function setBillingBadge(status) {
    const b = $('billingBadge');
    if (!status) { b.hidden = true; b.className = 'ttl-badge badge'; b.textContent = ''; return; }
    b.hidden = false;
    b.className = 'ttl-badge badge st-' + status;
    b.textContent = status;
  }
  function renderBillingDoc() {
    const body = $('billingBody');
    const titleEl = $('billingTitle');
    body.innerHTML = '';
    if (state.billingSel && state.billingSel.kind === 'draft') return renderDraftDoc(body, titleEl);
    if (state.billingSel && state.billingSel.kind === 'invoice') return renderIssuedDoc(body, titleEl);
    setBillingBadge(null);
    titleEl.textContent = 'Billing';
    body.innerHTML = '<div class="empty">Select a draft or an invoice to open it.</div>';
  }

  function renderBillingList(body) {
    body.innerHTML = '';   // rebuild from scratch — otherwise repeat renders stack duplicate sections
    const groups = billingGroups();
    const invs = [...state.invoices.values()].sort((a, b) => String(b.issued_at).localeCompare(String(a.issued_at)));
    if (!groups.length && !invs.length) {
      body.innerHTML = '<div class="empty">Nothing to bill yet. Mark a job “done” and it lands here as a draft.</div>';
      return;
    }
    if (groups.length) {
      const h = document.createElement('div'); h.className = 'bill-section-h'; h.textContent = 'Drafts';
      body.appendChild(h);
      for (const g of groups) {
        const n = g.rows.length;
        body.appendChild(billEntry({
          title: g.client.name || 'Client',
          sub: `${n} ${n === 1 ? 'item' : 'items'} · not yet invoiced`,
          sum: money(g.total),
          active: !!(state.billingSel && state.billingSel.kind === 'draft' && state.billingSel.clientId === g.client.id),
          onClick: () => openDraft(g.client.id),
        }));
      }
    }
    const ih = document.createElement('div'); ih.className = 'bill-section-h'; ih.textContent = 'Invoices';
    body.appendChild(ih);
    if (!invs.length) {
      const e = document.createElement('div'); e.className = 'empty'; e.style.padding = '20px 8px';
      e.textContent = 'No issued invoices yet.';
      body.appendChild(e);
    } else {
      for (const inv of invs) {
        const company = inv.snapshot?.to?.company || clientName(inv.client_id) || '';
        body.appendChild(billEntry({
          title: '#' + inv.id,
          sub: `${company} · ${fmtDate(inv.issued_at)}`,
          badge: inv.status,
          sum: money(inv.total),
          active: !!(state.billingSel && state.billingSel.kind === 'invoice' && state.billingSel.id === inv.id),
          onClick: () => openInvoiceDoc({ kind: 'invoice', id: inv.id }),
        }));
      }
    }
  }

  function billEntry({ title, sub, sum, badge, active, onClick }) {
    const e = document.createElement('button'); e.type = 'button'; e.className = 'bill-entry' + (active ? ' active' : '');
    const main = document.createElement('div'); main.className = 'main';
    const t = document.createElement('div'); t.className = 'ttl'; t.textContent = title;
    const s = document.createElement('div'); s.className = 'sub'; s.textContent = sub;
    main.append(t, s);
    e.appendChild(main);
    if (badge) { const b = document.createElement('span'); b.className = 'badge st-' + badge; b.textContent = badge; e.appendChild(b); }
    const m = document.createElement('div'); m.className = 'sum'; m.textContent = sum; e.appendChild(m);
    e.addEventListener('click', onClick);
    return e;
  }

  // The user's invoice-number convention: client code + 2-digit year + 2-digit
  // month, e.g. LTHCS + 26 + 06 = LTHCS2606. The code is the client's
  // invoice_prefix (falls back to its name). Still hand-editable on the draft.
  function invoiceNumberFor(client, iso) {
    const code = String((client && (client.invoice_prefix || client.name)) || '').trim();
    const d = new Date(iso && iso.length === 10 ? iso + 'T00:00:00' : (iso || Date.now()));
    const yy = String(d.getFullYear()).slice(-2);
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${code}${yy}${mm}`;
  }

  // Build the working copy for a client's live draft and open the editable doc.
  function openDraft(clientId) {
    const group = billingGroups().find((g) => g.client.id === clientId);
    if (!group) { state.billingSel = null; state.editing = null; return renderBilling(); }
    const s = state.settings || {};
    const c = group.client;
    const gstRate = (typeof c.gst_rate === 'number') ? c.gst_rate
                  : (typeof s.default_gst_rate === 'number') ? s.default_gst_rate : 0;
    const issued = today();
    state.editing = {
      clientId, client: c, gstRate,
      number: invoiceNumberFor(c, issued),       // <CODE><YY><MM>, e.g. LTHCS2606; hand-editable
      issued, due: addDays(issued, s.default_due_days || 14),
      discount: 0, notes: '',
      items: group.rows.map((r) => ({
        job_id: r.job.id,
        description: titleOf(r.job) || 'Work',
        date: (r.job.done_at || r.job.updated_at || '').slice(0, 10) || issued,
        hours: r.hours,
        amount: round2(r.amount),
      })),
    };
    openInvoiceDoc({ kind: 'draft', clientId });
  }

  function calcTotals(items, discountRaw, gstRate) {
    const subtotal = round2(items.reduce((acc, it) => acc + (Number(it.amount) || 0), 0));
    const discount = Math.min(subtotal, Math.max(0, round2(discountRaw)));
    const taxable = round2(subtotal - discount);
    const gst = round2(taxable * (Number(gstRate) || 0));
    const total = round2(taxable + gst);
    return { subtotal, discount, taxable, gst, total };
  }

  // Inner HTML of .inv-paper, matching the real Robots & Co. A4 tax invoice:
  // logo + address top-left, "Tax Invoice <no>" + Att block top-right, an
  // italic-headed items table, then a bottom-pinned footer (bank left, totals
  // right, Balance in red). editable=true → draft (number + due inputs, per-line
  // remove); editable=false → issued (read-only, frozen totals).
  function invPaperHtml(o) {
    const sym = o.sym || '$';
    const t = o.precomputed
      ? { subtotal: o.precomputed.subtotal, gst: o.precomputed.gst, total: o.precomputed.total }
      : calcTotals(o.items, 0, o.gstRate);
    const paid = Number(o.paid) || 0;
    const balance = (o.balance != null) ? Number(o.balance) : round2(t.total - paid);

    const fromLines = (o.from.lines || []).map((l) => `<div>${esc(l)}</div>`).join('');
    const brand = o.from.logo
      ? `<img class="inv-logo" src="${esc(o.from.logo)}" alt="${esc(o.from.name)}"><div class="inv-from-name" hidden>${esc(o.from.name)}</div>`
      : `<div class="inv-from-name">${esc(o.from.name)}</div>`;
    const title = o.editable
      ? `Tax Invoice <input id="invNum" value="${esc(o.number)}" spellcheck="false">`
      : `Tax Invoice ${esc(o.number)}`;
    const toLines = (o.to.lines || []).map((l) => `<div>${esc(l)}</div>`).join('');

    const rows = o.items.map((it, i) => o.editable ? `<tr class="li-row${it.job_id ? ' li-link' : ''}"${it.job_id ? ` data-job="${esc(it.job_id)}" title="Open this job"` : ''}>
        <td>${esc(it.description)}</td>
        <td>${esc(fmtDateInv(it.date))}</td>
        <td class="r">${moneySigned(sym, it.amount)}</td>
        <td class="rm-cell"><button class="rm" type="button" data-i="${i}" title="Remove line">×</button></td>
      </tr>` : `<tr>
        <td>${esc(it.description)}</td>
        <td>${esc(fmtDateInv(it.date))}</td>
        <td class="r">${moneySigned(sym, it.amount)}</td>
      </tr>`).join('');

    const due = o.editable
      ? `<input id="invDue" type="date" value="${esc(o.due)}">`
      : esc(fmtDateInv(o.due));
    const bank = o.bank || {};
    const bankRow = (k, v) => v ? `<div class="fr"><span class="k">${k}</span><span class="v">${esc(v)}</span></div>` : '';

    return `
      <div class="inv-head">
        <div class="inv-from">
          ${brand}
          <div class="inv-from-meta">${fromLines}${o.from.abn ? `<div>${esc(o.from.abn)}</div>` : ''}</div>
        </div>
        <div class="inv-to">
          <div class="inv-title">${title}</div>
          <div class="att">Att:</div>
          ${o.to.contact ? `<div>${esc(o.to.contact)}</div>` : ''}
          ${o.to.company ? `<div>${esc(o.to.company)}</div>` : ''}
          ${toLines}
          <div class="inv-date">${esc(fmtDateInv(o.issued))}</div>
        </div>
      </div>
      <hr class="inv-rule">
      <table class="inv-items">
        <thead><tr>
          <th>Item Description</th><th>Date</th><th class="r">Amount ExGST</th>${o.editable ? '<th class="rm-cell"></th>' : ''}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <hr class="inv-rule">
      <div class="inv-spacer"></div>
      <div class="inv-foot">
        <div class="inv-foot-left">
          <div class="fr inv-due"><span class="k">Due:</span><span class="v">${due}</span></div>
          ${bankRow('Bank:', bank.bank)}
          ${bankRow('Name:', bank.name)}
          ${bankRow('BSB:', bank.bsb)}
          ${bankRow('Acc:', bank.acc)}
        </div>
        <div class="inv-foot-right">${footRightInner(t, paid, balance, sym)}</div>
      </div>`;
  }

  // The totals column (Sub Total / GST / Total / Paid / Balance). Shared by
  // invPaperHtml and the live draft recompute so they always agree.
  function footRightInner(t, paid, balance, sym) {
    return `
      <div class="tr"><span class="k">Sub Total Ex GST:</span><span class="v">${moneySigned(sym, t.subtotal)}</span></div>
      <div class="tr"><span class="k">GST:</span><span class="v">${moneySigned(sym, t.gst)}</span></div>
      <div class="tr total"><span class="k">Total Inc GST:</span><span class="v">${moneySigned(sym, t.total)}</span></div>
      <div class="tr"><span class="k">Paid:</span><span class="v">${paid > 0 ? sym + money2(paid) : ''}</span></div>
      <div class="tr balance"><span class="k">Balance:</span><span class="v">${moneySigned(sym, balance)}</span></div>`;
  }

  // The logo path may 404 (asset not yet present) — fall back to the business
  // name text so the header is never blank.
  function wireLogoFallback(paper) {
    const img = paper.querySelector('.inv-logo');
    if (!img) return;
    img.addEventListener('error', () => {
      img.style.display = 'none';
      const nm = paper.querySelector('.inv-from-name');
      if (nm) nm.hidden = false;
    });
  }

  // Lay out the dashed page-break guides over the preview sheet, one per A4 break.
  function drawPageBreaks(page, pageH) {
    page.querySelectorAll('.inv-page-break').forEach((el) => el.remove());
    const pages = Math.max(1, Math.round(page.offsetHeight / pageH));
    for (let i = 1; i < pages; i++) {
      const line = document.createElement('div');
      line.className = 'inv-page-break';
      line.style.top = (i * pageH) + 'px';
      line.dataset.label = 'Page ' + (i + 1);
      page.appendChild(line);
    }
  }

  function fromSnapshot(s) {
    return { name: s.business_name || '', logo: s.logo_path || '', lines: s.business_address_lines || [], abn: s.business_abn_acn || '' };
  }
  function toSnapshot(c) {
    return { company: c.company || c.name || '', contact: c.contact || '', lines: c.address_lines || [] };
  }

  // Build the invPaperHtml options for a live draft / an issued invoice. Shared
  // by the editable doc, the read-only A4 preview, and the print/PDF output.
  function draftPaperOpts(ed, s, editable) {
    return {
      from: fromSnapshot(s), to: toSnapshot(ed.client), bank: s.bank, editable,
      number: ed.number, issued: ed.issued, due: ed.due,
      items: ed.items, gstRate: ed.gstRate, sym: s.currency_symbol || '$',
    };
  }
  function invoicePaperOpts(inv, editable) {
    const snap = inv.snapshot || {};
    return {
      from: { name: snap.from?.name, logo: snap.from?.logo_path, lines: snap.from?.address_lines || [], abn: snap.from?.abn_acn },
      to: { company: snap.to?.company, contact: snap.to?.contact, lines: snap.to?.address_lines || [] },
      bank: snap.bank,
      number: inv.id, issued: inv.issued_at, due: inv.due_at,
      items: inv.items, gstRate: inv.gst_rate,
      precomputed: { subtotal: inv.subtotal, gst: inv.gst, total: inv.total },
      paid: inv.paid, balance: inv.balance, sym: snap.currency_symbol || '$', editable,
    };
  }

  function renderDraftDoc(body, titleEl) {
    const ed = state.editing;
    if (!ed) { state.billingSel = null; return renderBilling(); }
    setBillingBadge(null);
    titleEl.textContent = 'New invoice — ' + (ed.client.name || '');
    const s = state.settings || {};

    const wrap = document.createElement('div'); wrap.className = 'inv-doc';
    const actions = document.createElement('div'); actions.className = 'inv-actions';
    const issueBtn = document.createElement('button'); issueBtn.type = 'button'; issueBtn.className = 'primary'; issueBtn.textContent = 'Issue invoice';
    const previewBtn = document.createElement('button'); previewBtn.type = 'button'; previewBtn.textContent = 'Preview';
    previewBtn.addEventListener('click', () => openPreview(draftPaperOpts(ed, s, false)));
    actions.append(issueBtn, previewBtn);
    wrap.appendChild(actions);

    const paper = document.createElement('div'); paper.className = 'inv-paper';
    paper.innerHTML = invPaperHtml(draftPaperOpts(ed, s, true));
    wrap.appendChild(paper);
    body.appendChild(wrap);
    wireLogoFallback(paper);

    paper.querySelectorAll('.inv-items .rm').forEach((btn) => {
      btn.addEventListener('click', () => {
        ed.items.splice(Number(btn.dataset.i), 1);
        if (!ed.items.length) { state.billingSel = null; state.editing = null; }
        renderBilling();   // trimming the last line drops the draft back to the list
      });
    });
    // A line item is a window onto its job: click the row to open it and edit
    // its details there. Amount/description aren't editable on the invoice itself.
    paper.querySelectorAll('.inv-items tr.li-link').forEach((tr) => {
      tr.addEventListener('click', (e) => {
        if (e.target.closest('.rm')) return;   // the × removes; it doesn't navigate
        openJob(tr.dataset.job);
      });
    });
    const num = paper.querySelector('#invNum');
    const due = paper.querySelector('#invDue');
    num.addEventListener('input', () => { ed.number = num.value.trim(); });
    due.addEventListener('input', () => { ed.due = due.value; });
    issueBtn.addEventListener('click', () => issueInvoice(issueBtn));
  }

  async function issueInvoice(btn) {
    const ed = state.editing;
    if (!ed) return;
    const id = (ed.number || '').trim();
    if (!id) { alert('Give the invoice a number first.'); return; }
    if (!ed.items.length) { alert('There are no line items to invoice.'); return; }
    btn.disabled = true;
    try {
      const inv = await postJson('/invoices', {
        id, client_id: ed.clientId,
        items: ed.items.map((it) => ({ job_id: it.job_id, description: it.description, date: it.date, amount: it.amount })),
        discount: Number(ed.discount) || 0,
        gst_rate: ed.gstRate,
        notes: ed.notes || '',
        issued_at: ed.issued, due_at: ed.due,
      });
      state.invoices.set(inv.id, inv);
      state.editing = null;
      state.billingSel = { kind: 'invoice', id: inv.id };   // land on the issued doc
      renderBilling();
    } catch (e) {
      alert('Could not issue: ' + e.message);
      btn.disabled = false;
    }
  }

  function renderIssuedDoc(body, titleEl) {
    const inv = state.invoices.get(state.billingSel.id);
    if (!inv) { state.billingSel = null; return renderBilling(); }
    titleEl.textContent = '#' + inv.id;
    setBillingBadge(inv.status);

    const wrap = document.createElement('div'); wrap.className = 'inv-doc';
    const actions = document.createElement('div'); actions.className = 'inv-actions';
    if (inv.status !== 'paid') {
      const paid = document.createElement('button'); paid.type = 'button'; paid.className = 'primary'; paid.textContent = 'Mark paid';
      paid.addEventListener('click', () => markPaid(inv.id, paid));
      actions.appendChild(paid);
    }
    const previewBtn = document.createElement('button'); previewBtn.type = 'button'; previewBtn.textContent = 'Preview';
    previewBtn.addEventListener('click', () => openPreview(invoicePaperOpts(inv, false)));
    actions.appendChild(previewBtn);
    const print = document.createElement('button'); print.type = 'button'; print.textContent = 'Print / PDF';
    print.addEventListener('click', () => printInvoice(inv));
    actions.appendChild(print);
    const voidBtn = document.createElement('button'); voidBtn.type = 'button'; voidBtn.className = 'danger'; voidBtn.textContent = 'Void';
    voidBtn.addEventListener('click', () => voidInvoice(inv.id, voidBtn));
    actions.appendChild(voidBtn);
    wrap.appendChild(actions);

    const paper = document.createElement('div'); paper.className = 'inv-paper';
    paper.innerHTML = invPaperHtml(invoicePaperOpts(inv, false));
    wrap.appendChild(paper);
    body.appendChild(wrap);
    wireLogoFallback(paper);
  }

  async function markPaid(id, btn) {
    btn.disabled = true;
    try {
      const inv = await patchJson('/invoices/' + id, { status: 'paid' });
      state.invoices.set(inv.id, inv);
      renderBilling();
    } catch (e) { alert('Could not mark paid: ' + e.message); btn.disabled = false; }
  }

  async function voidInvoice(id, btn) {
    if (!confirm(`Void invoice #${id}? Its jobs go back to “done” and roll into the next draft.`)) return;
    btn.disabled = true;
    try {
      await delJson('/invoices/' + id);
      state.invoices.delete(id);
      closeBillingDoc();
    } catch (e) { alert('Could not void: ' + e.message); btn.disabled = false; }
  }

  function printInvoice(inv) {
    const w = window.open('', '_blank');
    if (!w) { alert('Allow pop-ups to print or save the PDF.'); return; }
    w.document.write(invPrintHtml(inv));
    w.document.close();
    w.focus();
    setTimeout(() => { try { w.print(); } catch {} }, 250);
  }

  // Full-page A4 preview: render the read-only invoice at true A4 size and scale
  // it to fit the viewport, so you see the printed page without leaving the app.
  function openPreview(opts) {
    let overlay = $('invPreview');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'invPreview';
      overlay.className = 'inv-preview-overlay';
      overlay.innerHTML = `
        <div class="inv-preview-bar">
          <span class="inv-preview-label">A4 preview</span>
          <button type="button" class="inv-preview-close">Close</button>
        </div>
        <div class="inv-preview-scroll"><div class="inv-preview-stage"><div class="inv-paper inv-preview-page"></div></div></div>`;
      document.body.appendChild(overlay);
      overlay.querySelector('.inv-preview-close').addEventListener('click', closePreview);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closePreview(); });
    }
    const page = overlay.querySelector('.inv-preview-page');
    page.innerHTML = invPaperHtml(opts);
    wireLogoFallback(page);
    overlay.classList.add('open');
    // Mobile: push a history entry so the device back button closes the preview
    // (returning to the draft) instead of leaving the doc — see popstate handler.
    if (isMobile() && !(history.state && history.state.runnPreview)) history.pushState({ runnPreview: true }, '');
    layoutPreview();
    // The logo loads async and changes the height; re-lay-out once it lands.
    const logo = page.querySelector('.inv-logo');
    if (logo && !logo.complete) logo.addEventListener('load', layoutPreview, { once: true });
  }
  // One A4 page at 96dpi is 1123px tall. The footer is bottom-pinned by the same
  // flex layout as the print sheet (a flex:1 spacer in .inv-paper); here we just
  // draw the page-break guides and scale the whole sheet to fit the viewport.
  const A4_PAGE_PX = 1123;
  function layoutPreview() {
    const overlay = $('invPreview');
    if (!overlay || !overlay.classList.contains('open')) return;
    const page = overlay.querySelector('.inv-preview-page');
    page.style.transform = 'none';            // measure unscaled
    drawPageBreaks(page, A4_PAGE_PX);
    scalePreview();
  }
  function closePreview(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    const overlay = $('invPreview');
    if (overlay) overlay.classList.remove('open');
    // Consume the pushed entry unless the browser already did (device back).
    if (!fromPop && history.state && history.state.runnPreview) { suppressPop = true; history.back(); }
  }
  // The page is a fixed 794×1123 (A4 @96dpi); fit it to the available area by
  // scaling, and size the stage to the scaled box so scrolling/centring is sane.
  function scalePreview() {
    const overlay = $('invPreview');
    if (!overlay || !overlay.classList.contains('open')) return;
    const scroll = overlay.querySelector('.inv-preview-scroll');
    const stage = overlay.querySelector('.inv-preview-stage');
    const page = overlay.querySelector('.inv-preview-page');
    // Scale to fit the width; the sheet can be several pages tall, so let it
    // scroll vertically rather than shrinking to fit the height.
    const s = Math.min((scroll.clientWidth - 32) / 794, 1);
    const h = page.offsetHeight;              // full multi-page height, unscaled
    page.style.transform = `scale(${s})`;
    stage.style.width = (794 * s) + 'px';
    stage.style.height = (h * s) + 'px';
  }

  // Print/PDF reuses the exact same document markup (invPaperHtml, read-only) as
  // the on-screen invoice, with print-tuned CSS, so the PDF matches 1:1.
  function invPrintHtml(inv) {
    const doc = invPaperHtml(invoicePaperOpts(inv, false));
    return `<!doctype html><html><head><meta charset="utf-8"><title>Tax Invoice ${esc(inv.id)}</title>
      <style>
        @page { size: A4; margin: 16mm; }
        * { box-sizing: border-box; }
        /* Lay the document out at the exact printable width (A4 210mm − 2×16mm). */
        body { width: 178mm; margin: 0 auto; color: #222; font: 13px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        /* Flex column + a flex:1 spacer pins the footer to the page bottom on a
           single-page invoice (verified in Chromium print). min-height is set just
           UNDER one printable page (265mm) so the spacer can never grow the page
           past a sheet and bump the footer onto a blank page. On a multi-page
           invoice the rows overflow naturally: the <thead> repeats, the spacer
           collapses, and the footer follows the last line item. */
        .inv-paper { display: flex; flex-direction: column; min-height: 258mm; }
        .inv-items tr { break-inside: avoid; }
        .inv-foot { break-inside: avoid; }
        .inv-head { display: flex; justify-content: space-between; gap: 28px; align-items: flex-start; }
        .inv-from { max-width: 58%; }
        .inv-logo { max-width: 280px; max-height: 150px; display: block; margin-bottom: 14px; }
        .inv-from-name { font-size: 23px; font-weight: 700; color: #2f4a6b; margin-bottom: 12px; }
        .inv-from-meta { font-size: 12.5px; color: #333; }
        .inv-from-meta div { margin-bottom: 2px; }
        .inv-to { text-align: right; min-width: 230px; }
        .inv-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .inv-to div { margin-bottom: 2px; } .inv-to .att { color: #555; }
        .inv-to .inv-date { margin-top: 10px; }
        .inv-rule { border: 0; border-top: 1px solid #dcdcdc; margin: 22px 0 0; }
        .inv-items { width: 100%; border-collapse: collapse; }
        .inv-items th { font-style: italic; font-weight: 400; color: #8a8a8a; font-size: 12.5px; text-align: left; padding: 12px 4px; }
        .inv-items th.r, .inv-items td.r { text-align: right; }
        .inv-items td { padding: 8px 4px; font-size: 13px; vertical-align: top; }
        .inv-items thead th { border-bottom: 1px solid #dcdcdc; }
        .inv-items th:nth-child(2), .inv-items td:nth-child(2) { width: 150px; }
        .inv-items th:nth-child(3), .inv-items td:nth-child(3) { width: 150px; }
        .inv-spacer { flex: 1 1 auto; }
        .inv-foot { display: flex; justify-content: space-between; gap: 28px; border: 1px solid #dcdcdc; border-radius: 4px; padding: 20px 24px; min-height: 122px; font-size: 12.5px; }
        .inv-foot-left, .inv-foot-right { display: flex; flex-direction: column; justify-content: space-between; }
        .inv-foot .fr, .inv-foot .tr { display: flex; }
        .inv-foot-left .fr { gap: 8px; } .inv-foot-left .k { color: #555; min-width: 42px; }
        .inv-foot-right { text-align: right; min-width: 250px; }
        .inv-foot-right .tr { justify-content: flex-end; gap: 18px; }
        .inv-foot-right .k { color: #555; } .inv-foot-right .v { min-width: 84px; text-align: right; }
        .inv-foot-right .tr.total .k, .inv-foot-right .tr.total .v { font-weight: 700; }
        .inv-foot-right .tr.balance .v { color: #c0291f; font-weight: 700; }
      </style></head><body>
      <div class="inv-paper">${doc}</div>
      <script>(function(){var i=document.querySelector('.inv-logo');if(i)i.addEventListener('error',function(){i.style.display='none';var n=document.querySelector('.inv-from-name');if(n)n.hidden=false;});}())<\/script>
      </body></html>`;
  }

  // ── Chat rendering ──────────────────────────────
  // On mobile the chat is a slide-over. Push a history entry when it opens so
  // the device back button returns to the list instead of leaving the app.
  function enterChatView() {
    document.body.classList.add('show-chat');
    if (window.matchMedia('(max-width: 720px)').matches &&
        !(history.state && history.state.runnChat)) {
      history.pushState({ runnChat: true }, '');
    }
  }
  function openJob(id) {
    if (state.invoicesPane) {
      state.invoicesPane = false;
      state.billingSel = null;
      state.editing = null;
      document.body.classList.remove('show-invoices', 'show-billing');
      $('billingBtn').classList.remove('is-active');
    }
    state.currentId = id;
    state.editingTurn = null;
    state.picking = false;
    clearPendingAttachments();   // staged files belong to the job you were in
    resetNewJobPicker();
    enterChatView();
    renderList();
    renderChat();
    clockSync();
    if (window.matchMedia('(min-width: 721px)').matches) msgInput.focus();
  }
  function startNewJob() {
    state.picking = true;
    state.draftClientId = null;
    state.currentId = null;
    clockSync();   // leaving the open job → pause its clock
    const sel = $('newJobPicker');
    sel.innerHTML = '';
    const ph = document.createElement('option');
    ph.value = ''; ph.textContent = 'New job for…'; ph.disabled = true; ph.selected = true;
    sel.appendChild(ph);
    const personal = document.createElement('option');
    personal.value = '__personal__'; personal.textContent = 'Personal';
    sel.appendChild(personal);
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    for (const c of clients) {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      sel.appendChild(o);
    }
    $('newJobBtn').hidden = true;
    sel.hidden = false;
    renderList();
    renderChat();
    sel.focus();
    try { sel.showPicker(); } catch {}
  }
  function resetNewJobPicker() {
    const sel = $('newJobPicker');
    sel.hidden = true;
    sel.value = '';
    $('newJobBtn').hidden = false;
  }
  function beginDraft(clientId) {
    state.picking = false;
    state.draftClientId = clientId;
    state.currentId = DRAFT;
    clearPendingAttachments();
    clockSync();   // leaving the open job → pause its clock
    resetNewJobPicker();
    enterChatView();
    renderList();
    renderChat();
    if (!isMobile()) msgInput.focus();   // don't pop the keyboard over the read view on mobile
  }
  function closeChat(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    document.body.classList.remove('show-chat');
    state.currentId = null;
    state.picking = false;
    state.draftClientId = null;
    clearPendingAttachments();
    resetNewJobPicker();
    clockSync();   // currentId is now null → stops the clock on the job we left
    renderList();
    renderChat();
    // Consume the pushed entry unless the browser already did (device back).
    if (!fromPop && history.state && history.state.runnChat) history.back();
  }
  function setComposer(enabled, placeholder) {
    msgInput.disabled = !enabled;
    sendBtn.disabled = !enabled || state.sending;
    // Attachments ride only on real messages, never private notes — disable the
    // picker in note mode (and whenever the composer itself is disabled).
    attachBtn.disabled = !enabled || state.noteMode;
    composerMoreBtn.disabled = !enabled;   // the phone overflow that fronts 📝/📎
    msgInput.placeholder = (enabled && state.noteMode)
      ? "Private note — Claude can't see it until you promote it…"
      : placeholder;
  }
  function setNoteMode(on) {
    state.noteMode = !!on;
    noteToggle.setAttribute('aria-pressed', state.noteMode ? 'true' : 'false');
    $('composer').classList.toggle('note-mode', state.noteMode);
    if (state.noteMode) clearPendingAttachments();   // notes can't carry files
    if (state.currentId) renderChat();   // refresh the placeholder for the open job
  }
  // The 📝 toggle is the after-AI counterpart of "+ AI": notes only make sense
  // once Claude's been invited (before that, every message is already private).
  // So it shows only when the job has a session — never alongside "+ AI" — and
  // navigating to a pre-invite/draft context drops you back out of note mode.
  function setNoteAvailable(aiOpen) {
    noteToggle.hidden = !aiOpen;
    if (!aiOpen && state.noteMode) {
      state.noteMode = false;
      noteToggle.setAttribute('aria-pressed', 'false');
      $('composer').classList.remove('note-mode');
    }
  }

  // Transcript-side attachment chips for a user turn — image chips show a
  // thumbnail, others a file icon; each links to the stored file. Returns null
  // when the turn has no attachments.
  function buildTurnAttachments(jobId, turn) {
    const list = turn && Array.isArray(turn.attachments) ? turn.attachments : [];
    if (!list.length) return null;
    const row = document.createElement('div');
    row.className = 'turn-attachments';
    for (const a of list) {
      const href = `/attachments/${encodeURIComponent(jobId)}/${encodeURIComponent(a.filename)}`;
      const link = document.createElement('a');
      link.className = 'attach-chip';
      link.href = href; link.target = '_blank'; link.rel = 'noopener';
      const thumb = (a.mime && a.mime.startsWith('image/'))
        ? `<img src="${href}" alt="">`
        : `<span class="attach-icon">📄</span>`;
      link.innerHTML = `${thumb}<span class="attach-name">${escapeHtml(a.name)}</span>`;
      row.appendChild(link);
    }
    return row;
  }

  function renderChat() {
    $('jobMenuBtn').hidden = true;
    $('chatDoneBtn').classList.remove('show');   // re-shown below only for an active, saved job
    $('chatDue').hidden = true;  // shown only for a real, saved job
    inviteAiBtn.hidden = true;   // shown below only for a private, not-yet-invited job
    noteToggle.hidden = true;    // shown below only once the job has been opened to AI
    timerSync();                 // attach/detach the work timer to the open job
    // Title rename editor lives only while its own job stays the open one; any
    // other render (job switch, draft, empty) tears it down and shows the span.
    if (state.renaming && (state.picking || state.currentId === DRAFT || state.renaming !== state.currentId)) {
      state.renaming = null;
    }
    if (!state.renaming) { $('chatTitle').hidden = false; $('chatTitleInput').hidden = true; }
    if (state.picking) {
      $('chatTitle').classList.remove('editable');
      $('chatTitle').textContent = 'New job';
      $('chatClient').hidden = true;
      $('chatStatus').hidden = true;
      turnsEl.innerHTML = '<div class="empty">Pick a client to start.</div>';
      setComposer(false, 'Pick a client to begin…');
      setNoteAvailable(false);
      return;
    }
    if (state.currentId === DRAFT) {
      $('chatTitle').classList.remove('editable');
      $('chatTitle').textContent = 'New job';
      const clEl = $('chatClient');
      clEl.textContent = clientName(state.draftClientId) || 'Personal';
      clEl.className = 'chip client';
      clEl.hidden = false;
      $('chatStatus').hidden = true;
      turnsEl.innerHTML = '<div class="empty">Type your first message to start this job.</div>';
      setNoteAvailable(false);   // before setComposer, so the placeholder isn't computed from a stale note mode
      setComposer(true, 'Message…  (Enter to send)');
      return;
    }
    const j = state.jobs.get(state.currentId);
    if (!j) {
      $('chatTitle').classList.remove('editable');
      $('chatTitle').textContent = '';
      $('chatClient').hidden = true;
      $('chatStatus').hidden = true;
      turnsEl.innerHTML = '<div class="empty">Select a job, or start a new one.</div>';
      setComposer(false, 'Select a job, or start a new one.');
      setNoteAvailable(false);
      return;
    }
    setNoteAvailable(!!j.session_id);   // 📝 is the after-AI counterpart of "+ AI"; before setComposer for placeholder
    setComposer(true, 'Message…  (Enter to send)');
    if (!state.renaming) $('chatTitle').textContent = titleOf(j) || 'Untitled job';
    $('chatTitle').classList.add('editable');
    $('chatTitle').title = 'Click to rename';
    const cn = clientName(j.client_id);
    const clEl = $('chatClient');
    clEl.textContent = cn || 'Personal';
    clEl.className = 'chip client pick';
    clEl.hidden = false;
    const stEl = $('chatStatus');
    stEl.textContent = j.status || 'open';
    stEl.className = 'chip pick st-' + (j.status || 'open');
    stEl.hidden = false;
    renderDueChip(j);
    $('jobMenuBtn').hidden = false;     // #chatHours is the live timer, owned by renderTimerDisplay
    // Quick Done: only while the job is still active (open/doing/review/blocked/hold).
    $('chatDoneBtn').classList.toggle('show', ACTIVE_STATUSES.includes(j.status || 'open'));

    turnsEl.innerHTML = '';
    const turns = j.turns || [];
    // The invite gate: offer "+ AI" once the human has written something but
    // before they've handed the job over (no session yet). Hidden after invite.
    inviteAiBtn.hidden = !!j.session_id || !!j.ai_pending || turns.length === 0;
    if (!turns.length) {
      turnsEl.innerHTML = '<div class="empty">No messages yet.</div>';
      return;
    }
    // Editable until invited: before handover the turns are the human's private
    // notes and can be fixed; once AI is invited they're the record it received
    // and lock.
    const locked = !!j.session_id;
    let lastDay = null;
    const dayOf = (turn) => (turn.at ? turn.at.slice(0, 10) : null);
    const maybeDivider = (turn) => {
      const day = dayOf(turn);
      if (turn.session_event || (day && day !== lastDay)) {
        const div = document.createElement('div');
        div.className = 'divider';
        div.textContent = turn.session_event || dayLabel(turn.at);
        turnsEl.appendChild(div);
      }
      lastDay = day;
    };

    // One AI response can arrive as MANY ai turns — a line of narration before
    // each tool step. The human wants ONE box per response: collapsed by default,
    // showing only the final line (a question for them, or "done"), and expanding
    // to every step. So we group each unbroken run of ai turns into a single
    // bubble. A user turn, a note, a session event, or a day change breaks the run.
    let i = 0;
    while (i < turns.length) {
      const turn = turns[i];
      maybeDivider(turn);

      // Private note: rendered inline but visually set apart, with promote/delete
      // actions. Notes are never markdown-rendered or sent to the AI.
      if (turn.role === 'note') {
        turnsEl.appendChild(buildNoteTurn(i, turn.text));
        i++;
        continue;
      }

      if (turn.role === 'user') {
        const idx = i;
        const wrap = document.createElement('div');
        wrap.className = 'turn user';
        const editing = state.editingTurn && state.editingTurn.id === j.id && state.editingTurn.idx === idx;
        if (editing && !locked) {
          wrap.classList.add('editing');
          buildTurnEditor(wrap, idx, turn.text);
          turnsEl.appendChild(wrap);
          i++;
          continue;
        }
        if (!locked) {
          const editBtn = document.createElement('button');
          editBtn.type = 'button';
          editBtn.className = 'turn-edit';
          editBtn.setAttribute('aria-label', 'Edit message');
          editBtn.textContent = '✎';
          editBtn.addEventListener('click', () => beginEditTurn(idx));
          wrap.appendChild(editBtn);
        }
        // Attachment chips sit above the bubble; an attachments-only message
        // renders the chips with no bubble.
        const attEl = buildTurnAttachments(j.id, turn);
        const hasText = turn.text && turn.text.trim();
        if (attEl) {
          const col = document.createElement('div');
          col.className = 'turn-col';
          col.appendChild(attEl);
          if (hasText) {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerHTML = mdToHtml(turn.text);
            addCopyButtons(b);
            col.appendChild(b);
          }
          wrap.appendChild(col);
        } else {
          const bubble = document.createElement('div');
          bubble.className = 'bubble';
          bubble.innerHTML = mdToHtml(turn.text);
          addCopyButtons(bubble);
          wrap.appendChild(bubble);
        }
        turnsEl.appendChild(wrap);
        i++;
        continue;
      }

      // Gather the whole run of consecutive ai turns into one group.
      const runDay = lastDay;
      const group = [turn];
      let k = i + 1;
      while (k < turns.length) {
        const t2 = turns[k];
        if (t2.role === 'user' || t2.role === 'note') break;
        if (t2.session_event || (dayOf(t2) && dayOf(t2) !== runDay)) break;
        group.push(t2);
        k++;
      }

      const wrap = document.createElement('div');
      wrap.className = 'turn ai';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const full = document.createElement('div');
      full.className = 'ai-full';
      group.forEach((t) => {
        if (!(t.text && t.text.trim())) return;
        const seg = document.createElement('div');
        seg.className = 'ai-seg';
        seg.innerHTML = mdToHtml(t.text);
        renderReports(seg);   // runs before addCopyButtons so report blocks get no copy btn
        addCopyButtons(seg);
        full.appendChild(seg);
      });
      // If the whole response is a single line, expanding just repeats it — so
      // skip the dropdown and show the line plainly. Otherwise collapse it, with
      // the summary = the LAST line of the LAST step (the question, or "done").
      const meaningfulLines = group.map((t) => t.text || '').join('\n')
        .split('\n').map((l) => l.trim()).filter((l) => l && !/^[-*_=#>`]{3,}$/.test(l));
      if (meaningfulLines.length <= 1) {
        while (full.firstChild) bubble.appendChild(full.firstChild);
      } else {
        bubble.classList.add('collapsible');
        const lastText = [...group].reverse().find((t) => t.text && t.text.trim());
        const summary = document.createElement('button');
        summary.type = 'button';
        summary.className = 'ai-summary';
        const caret = document.createElement('span');
        caret.className = 'ai-caret';
        caret.textContent = '▸';
        const sumText = document.createElement('span');
        sumText.className = 'ai-summary-text';
        sumText.textContent = lastLineSummary(lastText ? lastText.text : '');
        summary.append(caret, sumText);
        summary.addEventListener('click', () => bubble.classList.toggle('expanded'));
        bubble.append(summary, full);
      }
      wrap.appendChild(bubble);
      turnsEl.appendChild(wrap);
      i = k;
    }
    // The thinking bubble: while the job is `doing`, Claude is working — show a
    // pulsing AI bubble so the human knows a reply is coming. Its replies stream
    // in as real ai turns (the discovery watcher folds them into job.turns), and
    // the bubble clears when the job leaves `doing` (→ review/blocked).
    if (j.status === 'doing') {
      const t = document.createElement('div');
      t.className = 'turn ai thinking';
      t.innerHTML = '<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      turnsEl.appendChild(t);
    } else if (j.ai_pending) {
      // Invite queued behind another chat in the same working tree — it'll start
      // on its own once that one finishes. Show a labelled waiting bubble so the
      // human knows it's coming and didn't silently no-op.
      const t = document.createElement('div');
      t.className = 'turn ai thinking';
      t.innerHTML = '<div class="bubble waiting">Waiting for the running chat to finish…</div>';
      turnsEl.appendChild(t);
    }
    renderPermissions();
    turnsEl.scrollTop = turnsEl.scrollHeight;
  }

  // ── Data load ───────────────────────────────────
  async function load() {
    try {
      const [jobs, clients, invoices, settings, perms] = await Promise.all([
        fetch('/jobs').then((r) => r.json()),
        fetch('/clients').then((r) => r.json()),
        fetch('/invoices').then((r) => r.json()),
        fetch('/settings').then((r) => r.json()),
        fetch('/permissions/pending').then((r) => r.json()).catch(() => []),
      ]);
      for (const c of clients) state.clients.set(c.id, c);
      for (const j of jobs) state.jobs.set(j.id, j);
      for (const inv of invoices) state.invoices.set(inv.id, inv);
      // /permissions/pending is authoritative — rebuild from it (don't merge) so
      // cards the worker has dropped (it restarted, or Claude's child died)
      // disappear instead of lingering as un-dismissable popups.
      pendingPerms.clear();
      for (const p of (perms || [])) pendingPerms.set(p.request_id, p);
      state.settings = settings || {};
      renderFilterOptions();
      renderList();
      renderChat();
      renderPermissions();
    } catch (e) {
      console.error('load failed', e);
    }
  }

  // ── WebSocket live updates ──────────────────────
  let wsConnectedOnce = false;
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    // On *reconnect* (the server restarted, the laptop woke, the network
    // blipped) we've missed every broadcast sent while the socket was down, and
    // nothing else re-fetches. Re-sync so a job that finished during the gap
    // can't stay stuck on a stale `doing` status (a spinner that never clears).
    // Skipped on the first open — startup load() already ran.
    ws.onopen = () => { if (wsConnectedOnce) load(); wsConnectedOnce = true; };
    ws.onmessage = (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === 'job.added' || m.type === 'job.changed') {
        state.jobs.set(m.job.id, m.job);
        renderList();
        if (m.job.id === state.currentId) { renderChat(); clockSync(); }
        maybeRenderBilling();
      } else if (m.type === 'job.removed') {
        state.jobs.delete(m.job.id);
        if (m.job.id === state.currentId) closeChat();
        renderList();
        maybeRenderBilling();
      } else if (m.type === 'client.added' || m.type === 'client.changed') {
        state.clients.set(m.client.id, m.client);
        renderFilterOptions(); renderList(); renderChat();
        maybeRenderBilling();
      } else if (m.type === 'client.removed') {
        state.clients.delete(m.client.id);
        renderFilterOptions(); renderList(); renderChat();
        maybeRenderBilling();
      } else if (m.type === 'invoice.added' || m.type === 'invoice.changed') {
        state.invoices.set(m.invoice.id, m.invoice);
        maybeRenderBilling();
      } else if (m.type === 'invoice.removed') {
        state.invoices.delete(m.invoice.id);
        if (state.billingSel && state.billingSel.kind === 'invoice' && state.billingSel.id === m.invoice.id) state.billingSel = null;
        maybeRenderBilling();
      } else if (m.type === 'permission.requested') {
        pendingPerms.set(m.request_id, { request_id: m.request_id, job_id: m.job_id, tool_name: m.tool_name, input: m.input });
        renderPermissions();
        turnsEl.scrollTop = turnsEl.scrollHeight;
      } else if (m.type === 'permission.resolved') {
        pendingPerms.delete(m.request_id);
        renderPermissions();
      }
    };
    ws.onclose = () => setTimeout(connectWS, 1500);
    ws.onerror = () => { try { ws.close(); } catch {} };
  }

  // ── Send a turn (storage only; AI spawn comes later) ──
  async function errMsg(r, url) {
    try { const j = await r.json(); if (j && j.error) return j.error; } catch {}
    return `${url} → ${r.status}`;
  }
  async function postJson(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await errMsg(r, url));
    return r.json();
  }
  async function patchJson(url, body) {
    const r = await fetch(url, {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await errMsg(r, url));
    return r.json();
  }
  async function putJson(url, body) {
    const r = await fetch(url, {
      method: 'PUT',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await errMsg(r, url));
    return r.json();
  }
  async function delJson(url) {
    const r = await fetch(url, { method: 'DELETE' });
    if (!r.ok) throw new Error(await errMsg(r, url));
    return r.json();
  }
  // ── Toast — transient feedback ───────────────────────────────
  let toastHost = null;
  function toast(msg, kind) {
    if (!toastHost) {
      toastHost = document.createElement('div');
      toastHost.className = 'toast-host';
      document.body.appendChild(toastHost);
    }
    const el = document.createElement('div');
    el.className = 'toast' + (kind === 'err' ? ' err' : '');
    el.textContent = msg;
    toastHost.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 220); }, 2400);
  }

  // ── Composer commands (!cmd) ─────────────────────────────────
  // A leading ! runs a local command instead of sending the text to the AI —
  // the composer's answer to slash commands. Each run(id, arg) gets the open
  // job's id and any text after the command word. Add entries to grow the set.
  const COMMANDS = {
    stop: {
      desc: 'Interrupt the AI mid-turn',
      run: async (id) => {
        if (!id || id === DRAFT) return toast('No job open', 'err');
        const r = await postJson(`/jobs/${id}/interrupt`, {});
        if (r.ok) toast('Stopped the AI');
        else toast(r.reason === 'not_running' ? 'Nothing is running' : 'Could not stop', 'err');
      },
    },
  };
  const isCommand = (text) => /^!\S/.test(text);
  async function runCommand(text) {
    const [word, ...rest] = text.slice(1).split(/\s+/);
    const cmd = COMMANDS[word.toLowerCase()];
    if (!cmd) return toast(`Unknown command: !${word}`, 'err');
    try { await cmd.run(state.currentId, rest.join(' ').trim()); }
    catch (e) { console.error('command failed', e); toast('Command failed', 'err'); }
  }

  // ── Command palette ──────────────────────────────────────────
  // A leading ! (and no space yet — still typing the command word) pops a
  // filtered picker above the composer. ↑/↓ to move, Enter/Tab/click to pick.
  // Reads straight from COMMANDS so a new entry shows up here for free.
  const cmdPalette = $('cmdPalette');
  let palItems = [];   // command keys currently shown, top-to-bottom
  let palIdx = -1;      // highlighted row
  const palOpen = () => !cmdPalette.hidden;
  // Active while the input is "!word" with no space — once you hit space you're
  // typing args, so the picker steps out of the way.
  function paletteMatch(value) {
    const m = /^!(\S*)$/.exec(value);
    if (!m) return null;
    const q = m[1].toLowerCase();
    return Object.keys(COMMANDS).filter((k) => k.startsWith(q));
  }
  function renderPalette() {
    cmdPalette.innerHTML = '';
    palItems.forEach((key, i) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'cmd-item' + (i === palIdx ? ' active' : '');
      item.dataset.cmd = key;
      item.innerHTML = `<span class="cmd-name">!${escapeHtml(key)}</span>` +
        `<span class="cmd-desc">${escapeHtml(COMMANDS[key].desc || '')}</span>`;
      // mousedown (not click) so the textarea keeps focus through the pick.
      item.addEventListener('mousedown', (e) => { e.preventDefault(); acceptPalette(key); });
      cmdPalette.appendChild(item);
    });
  }
  function syncPalette() {
    const matches = paletteMatch(msgInput.value);
    if (!matches || !matches.length) return closePalette();
    palItems = matches;
    if (palIdx < 0 || palIdx >= palItems.length) palIdx = 0;
    renderPalette();
    cmdPalette.hidden = false;
  }
  function closePalette() { cmdPalette.hidden = true; palItems = []; palIdx = -1; }
  function movePalette(delta) {
    if (!palItems.length) return;
    palIdx = (palIdx + delta + palItems.length) % palItems.length;
    renderPalette();
    const active = cmdPalette.querySelector('.cmd-item.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }
  // Pick a command: zero-arg ones (like !stop) fire immediately; ones that take
  // args get filled in with a trailing space so you can type the rest.
  function acceptPalette(key) {
    const cmd = COMMANDS[key];
    closePalette();
    if (cmd && cmd.args) {
      msgInput.value = `!${key} `;
      autoGrow();
      if (!isMobile()) msgInput.focus();
    } else {
      msgInput.value = `!${key}`;
      sendCurrent();
    }
  }

  // ── Chat attachments (composer side) ─────────────────────────
  // Files staged in state.pendingAttachments are read to base64 and ride along
  // with the next message in the POST body; the worker persists them and feeds
  // Claude their paths. Mirrors the backend's allow-list and caps so we reject
  // before upload rather than after.
  const ATTACH_MAX = 8;
  const ATTACH_MAX_BYTES = 15 * 1024 * 1024;
  const ATTACH_ALLOW = new Set([
    'image/png', 'image/jpeg', 'image/webp', 'image/gif',
    'application/pdf', 'text/plain', 'text/markdown', 'text/csv', 'application/json',
  ]);
  const ATTACH_EXT = {
    png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', webp: 'image/webp',
    gif: 'image/gif', pdf: 'application/pdf', txt: 'text/plain', md: 'text/markdown',
    csv: 'text/csv', json: 'application/json',
  };
  function attachMimeFor(file) {
    if (file.type && ATTACH_ALLOW.has(file.type)) return file.type;
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    return ATTACH_EXT[ext] || null;
  }
  function readFileBase64(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result).split(',', 2)[1] || '');  // strip data: prefix
      r.onerror = () => reject(r.error || new Error('read failed'));
      r.readAsDataURL(file);
    });
  }
  async function addFiles(fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;
    if (state.noteMode) return toast("Notes can't carry files", 'err');
    for (const file of files) {
      if (state.pendingAttachments.length >= ATTACH_MAX) { toast(`Max ${ATTACH_MAX} files`, 'err'); break; }
      const mime = attachMimeFor(file);
      if (!mime) { toast(`Unsupported: ${file.name}`, 'err'); continue; }
      if (file.size > ATTACH_MAX_BYTES) { toast(`${file.name} is too big (15MB max)`, 'err'); continue; }
      try {
        const data = await readFileBase64(file);
        const url = (mime.startsWith('image/')) ? URL.createObjectURL(file) : null;  // local thumbnail preview
        state.pendingAttachments.push({ name: file.name, mime, data, url });
      } catch (e) { console.error('attach read failed', e); toast(`Couldn't read ${file.name}`, 'err'); }
    }
    renderPendingAttachments();
  }
  function removePendingAttachment(i) {
    const a = state.pendingAttachments[i];
    if (a && a.url) { try { URL.revokeObjectURL(a.url); } catch {} }
    state.pendingAttachments.splice(i, 1);
    renderPendingAttachments();
  }
  function clearPendingAttachments() {
    for (const a of state.pendingAttachments) { if (a.url) { try { URL.revokeObjectURL(a.url); } catch {} } }
    state.pendingAttachments = [];
    if (attachInput) attachInput.value = '';
    renderPendingAttachments();
  }
  const ATTACH_ICON = '📄';
  function renderPendingAttachments() {
    if (!composerAttachments) return;
    composerAttachments.innerHTML = '';
    composerAttachments.hidden = state.pendingAttachments.length === 0;
    state.pendingAttachments.forEach((a, i) => {
      const chip = document.createElement('span');
      chip.className = 'attach-chip';
      const thumb = a.url
        ? `<img src="${a.url}" alt="">`
        : `<span class="attach-icon">${ATTACH_ICON}</span>`;
      chip.innerHTML = `${thumb}<span class="attach-name">${escapeHtml(a.name)}</span>`;
      const x = document.createElement('button');
      x.type = 'button'; x.className = 'attach-x'; x.setAttribute('aria-label', 'Remove'); x.textContent = '×';
      x.addEventListener('click', () => removePendingAttachment(i));
      chip.appendChild(x);
      composerAttachments.appendChild(chip);
    });
  }

  async function sendCurrent() {
    closePalette();
    const text = msgInput.value.trim();
    const attachments = state.pendingAttachments;
    // A message can be attachments-only — but a bare empty composer does nothing.
    if (!text && !attachments.length) return;
    // A ! command is meta — it runs locally and bypasses both the send lock and
    // note mode, so you can !stop even while a turn is in flight.
    if (isCommand(text)) {
      msgInput.value = ''; autoGrow();
      if (!isMobile()) msgInput.focus();
      return runCommand(text);
    }
    if (state.sending) return;
    // Notes never carry files; attachments only on real messages.
    const sendAttachments = state.noteMode ? [] : attachments.map(({ name, mime, data }) => ({ name, mime, data }));
    state.sending = true; sendBtn.disabled = true;
    msgInput.value = ''; autoGrow();
    // Clear the staged chips optimistically so a fast second send can't double them.
    if (sendAttachments.length) clearPendingAttachments();
    try {
      let id = state.currentId;
