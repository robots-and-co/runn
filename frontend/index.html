<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2f4a6b">
<title>Runn</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<style>
  :root {
    --bg: #f8f5ef;
    --surface: #fffdf9;
    --surface-2: #f1ece2;
    --ink: #2a2622;
    --muted: #8a8278;
    --border: #e6e0d6;
    --brand: #2f4a6b;
    --accent: #b85c1f;
    --user-bubble: #2f4a6b;
    --user-ink: #f8f5ef;
    --ai-bubble: #ffffff;
    --list-w: 340px;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .app { display: flex; height: 100dvh; }

  /* ── Left: job list ─────────────────────────────── */
  .list-pane {
    width: var(--list-w);
    min-width: var(--list-w);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    perspective: 1600px;
  }
  /* The swappable list body (jobs ⇄ invoices). The $ total flips it on its
     vertical axis; the fixed header stays put. */
  .list-flip {
    flex: 1; min-height: 0; display: flex; flex-direction: column;
    transform-origin: center center; backface-visibility: hidden;
  }
  @keyframes listFlipOut { from { transform: rotateY(0); opacity: 1; } to { transform: rotateY(-90deg); opacity: 0; } }
  @keyframes listFlipIn  { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }
  .list-flip.flip-out { animation: listFlipOut .15s ease-in forwards; }
  .list-flip.flip-in  { animation: listFlipIn .26s ease-out forwards; }
  @media (prefers-reduced-motion: reduce) {
    .list-flip.flip-out, .list-flip.flip-in { animation: none; }
  }
  .list-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .list-head .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--accent); color: var(--bg);
    display: grid; place-items: center;
    border: 0; padding: 0; cursor: pointer;
    font-family: inherit; font-size: 15px; font-weight: 700; line-height: 1;
  }
  .list-head .logo:hover { filter: brightness(0.92); }
  .list-head .logo:active { transform: translateY(1px); }
  .list-head h1 { font-size: 17px; margin: 0; letter-spacing: -0.2px; }
  .job-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .job-row {
    display: flex; flex-direction: column; gap: 4px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .job-row:hover { background: var(--surface-2); }
  .job-row.active { background: var(--surface-2); box-shadow: inset 3px 0 0 var(--accent); }
  /* Due urgency — a left bar + faint wash so today/overdue read louder than
     the rest. The open (active) row keeps its own treatment. */
  .job-row.due-today:not(.active)   { background: #fbf4ea; box-shadow: inset 3px 0 0 var(--accent); }
  .job-row.due-overdue:not(.active) { background: #fcefec; box-shadow: inset 3px 0 0 #b23b2a; }
  .job-row.due-overdue .title { color: #8a3a2e; }
  .job-row .title {
    font-size: 15px; font-weight: 600; line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .job-row .title.untitled { color: var(--muted); font-weight: 500; font-style: italic; }
  .job-row .meta { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .job-row .meta .meta-client { justify-self: start; min-width: 0; }
  .job-row .meta .meta-due    { justify-self: center; }
  .job-row .meta .meta-status { justify-self: end; }

  .list-foot { padding: 12px; border-top: 1px solid var(--border); }
  .btn-newjob {
    width: 100%; padding: 12px; border: 0; border-radius: 10px;
    background: var(--brand); color: var(--bg); font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn-newjob:active { transform: translateY(1px); }

  /* status + client chips */
  .chip {
    display: inline-flex; align-items: center;
    padding: 4px 12px; border-radius: 999px;
    font-size: 13px; font-weight: 600; line-height: 1.5;
    background: var(--surface-2); color: var(--muted);
    white-space: nowrap;
  }
  .chip.client { background: #e7eef6; color: var(--brand); }
  .chip.st-open     { background:#e8e4db; color:#6b6357; }
  .chip.st-doing    { background:#dcebff; color:#1f5fb0; }
  .chip.st-review   { background:#fff0d6; color:#a9711a; }
  .chip.st-done     { background:#dff2e3; color:#2f7a45; }
  .chip.st-invoiced { background:#e7e2f5; color:#5b48a8; }
  .chip.st-paid     { background:#d7efe0; color:#1f7a55; }
  .chip.st-blocked  { background:#ffe1dc; color:#b23b2a; }
  .chip.st-hold     { background:#ececec; color:#777; }
  /* selectable status chip — click opens the status picker */
  .chip.pick { cursor: pointer; }
  .chip.pick::after { content: '▾'; margin-left: 5px; font-size: 11px; opacity: .55; }
  /* In-card chip that toggles a filter on click — no caret, just a tap target. */
  .chip.tap { cursor: pointer; }
  .chip.tap:hover { filter: brightness(0.95); }

  /* due-date chip (header): a pill that opens the native date picker, plus an
     optional clear ×. .overdue reddens a past, not-yet-finished due date. */
  .due-chip { display: inline-flex; align-items: center; flex-shrink: 0; position: relative; }
  .due-set {
    font: inherit; font-size: 13px; font-weight: 600; line-height: 1.5;
    padding: 4px 12px; border-radius: 999px; border: 0; cursor: pointer;
    background: #eef1f4; color: var(--brand); white-space: nowrap;
  }
  .due-set:hover { filter: brightness(0.96); }
  .due-set.empty { background: var(--surface-2); color: var(--muted); font-weight: 500; }
  .due-chip.overdue .due-set { background: #ffe1dc; color: #b23b2a; }
  .due-clear {
    border: 0; background: none; cursor: pointer; color: var(--muted);
    font-size: 17px; line-height: 1; padding: 2px 4px 2px 2px; margin-left: -2px;
  }
  .due-clear:hover { color: var(--ink); }
  /* The native input is invisible but overlaps the chip, so showPicker() anchors
     the desktop calendar to the chip (offscreen positioning popped it off-screen
     on desktop). Clicks pass through to the buttons underneath. */
  .due-input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; border: 0; margin: 0; padding: 0; }
  /* due text in a list row */
  .job-row .due { color: var(--brand); }
  .job-row .due.overdue { color: #b23b2a; font-weight: 600; }
  /* Labeled section dividers — one per due bucket, placed above its group. */
  .list-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 30px 16px 8px;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em;
  }
  .list-divider:first-child { margin-top: 10px; }
  .list-divider::before, .list-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border); opacity: .8;
  }
  .list-divider[data-bucket="overdue"] { color: #b23b2a; }
  .list-divider[data-bucket="overdue"]::before,
  .list-divider[data-bucket="overdue"]::after { background: #e7b9a3; opacity: .7; }
  /* The label is a click-to-filter toggle for its due bucket. */
  .divider-label {
    border: 0; background: none; margin: 0; padding: 2px 8px;
    font: inherit; color: inherit; letter-spacing: inherit;
    text-transform: inherit; cursor: pointer; border-radius: 999px;
  }
  .divider-label:hover { background: var(--surface-2); color: var(--ink); }
  .divider-label.is-active { background: var(--brand); color: #fff; }
  .list-divider[data-bucket="overdue"] .divider-label.is-active { background: #b23b2a; color: #fff; }

  /* status picker menu (shared, body-level, fixed-positioned at the chip) */
  .chip-menu {
    position: fixed; z-index: 200; min-width: 210px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 6px; display: flex; flex-direction: column; gap: 3px;
  }
  .chip-menu[hidden] { display: none; }
  .chip-menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; background: none; border: 0; border-radius: 9px;
    cursor: pointer; font: inherit; font-size: 15px; color: var(--ink);
    text-align: left; width: 100%;
  }
  .chip-menu-item:hover { background: var(--surface-2); }
  .chip-menu-item.is-current { background: var(--surface-2); font-weight: 600; }
  .chip-menu-item.danger { color: #b23b2a; }
  .chip-menu-item .chip { pointer-events: none; }

  /* chat header overflow menu (archive / delete) */
  .job-menu-btn {
    flex-shrink: 0; border: 0; background: none; cursor: pointer;
    color: var(--muted); font-size: 24px; line-height: 1;
    padding: 4px 10px; border-radius: 8px;
  }
  .job-menu-btn:hover { background: var(--surface-2); color: var(--ink); }

  /* left-pane subheader: three filter chips — client left, due centre, status
     right — mirroring the card meta layout. */
  .list-sub {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px;
    padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .list-sub #clientFilterChip { justify-self: start; min-width: 0; }
  .list-sub #dueFilterChip    { justify-self: center; }
  .list-sub #statusFilterChip { justify-self: end; }
  .client-filter {
    flex: 1; min-width: 0; font: inherit; font-size: 13px; color: var(--ink);
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 8px; -webkit-appearance: none; appearance: none;
  }
  /* Filter chips — card-style pills that open a picker. The client one sits
     left, the status one right, mirroring the card meta layout. */
  .filter-chip { border: 0; cursor: pointer; flex-shrink: 0; }
  .filter-chip:hover { filter: brightness(0.97); }
  /* Due filter chip: brand-tinted by default, reddens when set to Overdue. */
  .due-filter { background: #e7eef6; color: var(--brand); }
  .due-filter.is-overdue { background: #ffe1dc; color: #b23b2a; }
  .due-filter.is-today   { background: #f6e6d2; color: #a9601f; }
  .total { flex-shrink: 0; margin-left: auto; border: 0; background: none; padding: 0; }
  .total .amt {
    display: inline-flex; align-items: center; gap: 4px;
    height: 32px; padding: 0 12px;
    background: var(--surface); border: 1px solid #dbe3ec; border-radius: 8px;
    color: var(--brand);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .total .amt::before { content: '$'; opacity: .6; }
  .total.clickable { cursor: pointer; }
  .total.clickable:hover .amt { border-color: var(--brand); }
  /* active = the left pane is currently flipped to invoices */
  .total.is-active .amt { background: var(--brand); color: #fff; border-color: var(--brand); }
  .total.is-active .amt::before { opacity: .8; }

  /* Left pane flips between jobs and invoices (toggled by the $ total) */
  .billing-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 12px; display: none; }
  body.show-invoices #jobList,
  body.show-invoices .list-sub,
  body.show-invoices .list-foot { display: none; }
  body.show-invoices .billing-list { display: block; }
  .bill-entry.active { border-color: var(--brand); box-shadow: inset 3px 0 0 var(--brand); }

  /* ── Billing pane ───────────────────────────────── */
  .billing-pane { flex: 1; display: none; flex-direction: column; min-width: 0; }
  body.show-billing .billing-pane { display: flex; }
  body.show-billing .chat-pane { display: none; }
  .billing-body { flex: 1; overflow: auto; padding: 16px; }

  /* Billing list: draft + issued entries */
  .bill-section-h {
    font-size: 12px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); font-weight: 700; margin: 8px 2px 8px;
  }
  .bill-section-h:first-child { margin-top: 2px; }
  .bill-entry {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    padding: 14px; margin-bottom: 8px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--surface); cursor: pointer; font: inherit;
  }
  .bill-entry:hover { border-color: var(--brand); }
  .bill-entry .main { flex: 1; min-width: 0; }
  .bill-entry .ttl { font-weight: 600; font-size: 15px; }
  .bill-entry .sub { color: var(--muted); font-size: 13px; margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bill-entry .sum {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-weight: 700; color: var(--brand); white-space: nowrap;
  }
  .bill-entry .badge {
    font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .badge.st-sent { background: #fdeede; color: #a85513; }
  .badge.st-paid { background: #e2f3e6; color: #2f7a45; }

  /* Invoice document — mirrors the real Robots & Co. A4 tax invoice.
     Draft = editable (number + due + line removal); issued = read-only. */
  .inv-doc { max-width: 760px; margin: 0 auto; }
  .inv-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .inv-actions button {
    font: inherit; font-size: 14px; font-weight: 600; padding: 10px 16px;
    border-radius: 8px; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--ink);
  }
  .inv-actions .primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .inv-actions .primary:disabled { opacity: .5; cursor: default; }
  .inv-actions .danger { color: #a33; margin-left: auto; }

  .inv-paper {
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    padding: 44px 46px; color: #222; min-height: 960px;
    display: flex; flex-direction: column;
    font: 13px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .inv-head { display: flex; justify-content: space-between; gap: 28px; align-items: flex-start; }
  .inv-from { max-width: 58%; }
  .inv-logo { max-width: 280px; max-height: 150px; display: block; margin-bottom: 14px; }
  .inv-from-name { font-size: 23px; font-weight: 700; color: var(--brand); margin-bottom: 12px; }
  .inv-from-meta { font-size: 12.5px; color: #333; }
  .inv-from-meta div { margin-bottom: 2px; }
  .inv-to { text-align: right; min-width: 230px; }
  .inv-title { font-size: 20px; font-weight: 700; color: #222; margin-bottom: 16px; white-space: nowrap; }
  .inv-title input {
    font: inherit; font-size: 20px; font-weight: 700; width: 132px; text-align: right;
    border: 0; border-bottom: 1px dashed #bbb; background: transparent; color: inherit; padding: 0 0 1px;
  }
  .inv-to div { margin-bottom: 2px; }
  .inv-to .att { color: #555; }
  .inv-to .inv-date { margin-top: 10px; }

  .inv-rule { border: 0; border-top: 1px solid #dcdcdc; margin: 22px 0 0; }
  .inv-items { width: 100%; border-collapse: collapse; }
  .inv-items th {
    font-style: italic; font-weight: 400; color: #8a8a8a; font-size: 12.5px;
    text-align: left; padding: 12px 4px;
  }
  .inv-items th.r, .inv-items td.r { text-align: right; }
  .inv-items td { padding: 8px 4px; font-size: 13px; vertical-align: top; }
  .inv-items td.r { font-variant-numeric: tabular-nums; }
  .inv-items thead th { border-bottom: 1px solid #dcdcdc; }
  .inv-items th:nth-child(2), .inv-items td:nth-child(2) { width: 150px; }
  .inv-items th:nth-child(3), .inv-items td:nth-child(3) { width: 150px; }
  .inv-items .rm-cell { width: 26px; padding-left: 8px; }
  .inv-items .rm { border: 0; background: none; color: #b33; cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; }
  .inv-items input.li-desc, .inv-items input.li-amt {
    font: inherit; font-size: 13px; border: 0; border-bottom: 1px dashed #cdcdcd;
    background: transparent; color: inherit; padding: 1px 0; width: 100%;
  }
  .inv-items input.li-amt { text-align: right; font-variant-numeric: tabular-nums; }
  .inv-items input.li-desc:focus, .inv-items input.li-amt:focus { outline: none; border-bottom-color: var(--brand); }
  .inv-addline {
    margin: 12px 0 0; border: 1px dashed #cdcdcd; background: transparent; color: #777;
    border-radius: 5px; padding: 6px 12px; cursor: pointer; font: inherit; font-size: 12.5px;
  }
  .inv-addline:hover { color: var(--brand); border-color: var(--brand); }

  .inv-spacer { flex: 1; min-height: 36px; }

  .inv-foot {
    display: flex; justify-content: space-between; gap: 28px;
    border: 1px solid #dcdcdc; border-radius: 4px; padding: 20px 24px;
    min-height: 122px; font-size: 12.5px;
  }
  .inv-foot-left, .inv-foot-right { display: flex; flex-direction: column; justify-content: space-between; }
  .inv-foot .fr, .inv-foot .tr { display: flex; }
  .inv-foot-left { min-width: 240px; }
  .inv-foot-left .fr { gap: 8px; }
  .inv-foot-left .k { color: #555; min-width: 42px; }
  .inv-foot-left .inv-due input {
    font: inherit; font-size: 12.5px; border: 0; border-bottom: 1px dashed #bbb;
    background: transparent; color: inherit; padding: 0;
  }
  .inv-foot-right { text-align: right; min-width: 250px; }
  .inv-foot-right .tr { justify-content: flex-end; gap: 18px; }
  .inv-foot-right .k { color: #555; }
  .inv-foot-right .v { min-width: 84px; text-align: right; font-variant-numeric: tabular-nums; }
  .inv-foot-right .tr.total .k, .inv-foot-right .tr.total .v { font-weight: 700; }
  .inv-foot-right .tr.balance .v { color: #c0291f; font-weight: 700; }

  /* Full-page A4 preview — what the printed invoice looks like at print size.
     The page is rendered at true A4 (794×1123px = 210×297mm @96dpi) and scaled
     to fit the viewport via JS. */
  .inv-preview-overlay {
    position: fixed; inset: 0; z-index: 50; display: none; flex-direction: column;
    background: rgba(24, 21, 17, 0.62);
  }
  .inv-preview-overlay.open { display: flex; }
  .inv-preview-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px calc(10px + var(--safe-b)); padding-top: max(10px, var(--safe-t));
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .inv-preview-label { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; }
  .inv-preview-close {
    font: inherit; font-size: 14px; font-weight: 600; padding: 8px 14px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--surface);
    color: var(--ink); cursor: pointer;
  }
  .inv-preview-scroll { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
    display: flex; align-items: flex-start; justify-content: center; padding: 16px; }
  .inv-preview-stage { position: relative; flex: none; }
  .inv-preview-page {
    width: 794px; height: 1123px; min-height: 0;
    border: 0; border-radius: 0; box-shadow: 0 6px 28px rgba(0,0,0,0.35);
    transform-origin: top left;
  }

  /* + Job → client picker (lives in the left column footer) */
  .newjob-picker { width: 100%; font-size: 15px; padding: 12px; cursor: pointer; }

  /* ── Right: chat ────────────────────────────────── */
  .chat-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); min-height: 56px;
  }
  .chat-head .back {
    display: none; border: 0; background: none; font-size: 26px;
    color: var(--brand); cursor: pointer; padding: 0 6px 0 0; line-height: 1;
  }
  .chat-head .ttl { font-size: 16px; font-weight: 600; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-head .ttl-badge {
    flex: none; font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .chat-head .ttl-badge[hidden] { display: none; }
  .chat-head .hours {
    font-size: 13px; color: var(--muted); white-space: nowrap;
    font-variant-numeric: tabular-nums; font-feature-settings: "tnum";
  }
  .chat-head .hours.running { color: #2f7a45; font-weight: 700; }
  .chat-head .hours.running::before {
    content: ''; display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: #2f7a45; margin-right: 5px; vertical-align: middle;
    animation: timerpulse 1.2s ease-in-out infinite;
  }
  @keyframes timerpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

  .turns { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px; }
  .empty {
    height: 100%; display: grid; place-items: center;
    color: var(--muted); font-size: 15px; text-align: center; padding: 0 32px;
  }

  .turn { display: flex; margin: 0 0 12px; }
  .turn.user { justify-content: flex-end; }
  .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 16px;
    font-size: 15px; line-height: 1.45; word-wrap: break-word; overflow-wrap: anywhere;
  }
  .turn.user .bubble { background: var(--user-bubble); color: var(--user-ink); border-bottom-right-radius: 5px; }
  .turn.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  .bubble :first-child { margin-top: 0; } .bubble :last-child { margin-bottom: 0; }
  .bubble pre { background: #f3efe7; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
  .turn.user .bubble pre { background: rgba(255,255,255,0.15); }
  .bubble code { font-family: ui-monospace, Menlo, monospace; font-size: 0.9em; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 2px; color: var(--muted); font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* composer */
  .composer { display: flex; gap: 8px; align-items: flex-end;
    padding: 10px 12px calc(10px + var(--safe-b)); border-top: 1px solid var(--border); background: var(--surface); }
  .composer textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 14px; font: inherit; font-size: 15px; max-height: 140px;
    background: var(--bg); color: var(--ink);
  }
  .composer textarea:focus { outline: none; border-color: var(--brand); }
  .composer button {
    border: 0; border-radius: 12px; background: var(--accent); color: var(--bg);
    font-size: 15px; font-weight: 600; padding: 0 18px; height: 44px; cursor: pointer;
  }
  .composer button:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── Responsive: collapse to one pane ───────────── */
  @media (max-width: 720px) {
    :root { --list-w: 100%; }
    .list-pane { width: 100%; min-width: 0; border-right: 0; }
    .chat-pane { position: fixed; inset: 0; background: var(--bg);
      transform: translateX(100%); transition: transform 0.22s ease; z-index: 5; }
    body.show-chat .chat-pane { transform: translateX(0); }
    .chat-head .back { display: block; }

    .billing-pane { display: flex; position: fixed; inset: 0; background: var(--bg);
      transform: translateX(100%); transition: transform 0.22s ease; z-index: 6; }
    body.show-billing .billing-pane { transform: translateX(0); }
    body.show-billing .chat-pane { display: flex; }   /* don't fight the overlay on mobile */
    .inv-paper { padding: 22px 20px; min-height: 0; }
    .inv-head { flex-direction: column; gap: 16px; }
    .inv-from { max-width: none; }
    .inv-to { text-align: left; min-width: 0; }
    .inv-title { white-space: normal; }
    .inv-title input { text-align: left; }
    .inv-foot { flex-direction: column; gap: 18px; }
    .inv-foot-left, .inv-foot-right { min-width: 0; text-align: left; }
    .inv-foot-right .tr { justify-content: space-between; gap: 18px; }
    .inv-actions .danger { margin-left: 0; }

    /* bigger chips + menus = easier taps on a phone */
    .chip { font-size: 15px; padding: 6px 14px; }
    .chip.pick::after { font-size: 12px; margin-left: 6px; }
    .job-row .meta { gap: 10px; font-size: 13px; }
    .chip-menu { min-width: 260px; padding: 8px; gap: 4px; }
    .chip-menu-item { font-size: 17px; padding: 15px 16px; }
    .job-menu-btn { font-size: 28px; padding: 6px 12px; }
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="list-pane">
      <div class="list-head">
        <button class="logo" id="logoReset" type="button" title="Reload — clears cached copies for a clean test">R</button>
        <h1>Runn</h1>
        <button class="total clickable" id="billingBtn" type="button" title="Invoices — tap to flip this list to billing">
          <span class="amt" id="valueTotal">0.00</span>
        </button>
      </div>
      <div class="list-flip" id="listFlip">
        <div class="list-sub">
          <button class="filter-chip chip client pick" id="clientFilterChip" type="button" aria-label="Filter by client">All</button>
          <button class="filter-chip chip pick due-filter" id="dueFilterChip" type="button" aria-label="Filter by due date">Any</button>
          <button class="filter-chip chip pick" id="statusFilterChip" type="button" aria-label="Filter by status">open</button>
        </div>
        <div class="job-list" id="jobList"></div>
        <div class="billing-list" id="billingList"></div>
        <div class="list-foot">
          <button class="btn-newjob" id="newJobBtn">+ Job</button>
          <select class="client-filter newjob-picker" id="newJobPicker" aria-label="Pick a client for the new job" hidden></select>
        </div>
      </div>
    </aside>

    <main class="chat-pane">
      <div class="chat-head">
        <button class="back" id="backBtn" aria-label="Back">‹</button>
        <span class="ttl" id="chatTitle"></span>
        <span class="chip client" id="chatClient" hidden></span>
        <span class="chip" id="chatStatus" hidden></span>
        <span class="due-chip" id="chatDue" hidden>
          <button type="button" class="due-set" id="chatDueBtn"></button>
          <button type="button" class="due-clear" id="chatDueClear" aria-label="Clear due date" hidden>×</button>
          <input type="date" id="chatDueInput" class="due-input" aria-hidden="true" tabindex="-1">
        </span>
        <span class="hours" id="chatHours"></span>
        <button class="job-menu-btn" id="jobMenuBtn" type="button" aria-label="Job actions" hidden>⋯</button>
      </div>
      <div class="turns" id="turns">
        <div class="empty" id="emptyState">Select a job, or start a new one.</div>
      </div>
      <form class="composer" id="composer">
        <textarea id="msgInput" rows="1" placeholder="Select a job, or start a new one." disabled></textarea>
        <button type="submit" id="sendBtn" disabled>Send</button>
      </form>
    </main>

    <section class="billing-pane" id="billingPane">
      <div class="chat-head billing-head">
        <button class="back" id="billingBack" type="button" aria-label="Back">‹</button>
        <span class="ttl" id="billingTitle">Billing</span>
        <span class="ttl-badge badge" id="billingBadge" hidden></span>
      </div>
      <div class="billing-body" id="billingBody"></div>
    </section>
  </div>
  <div class="chip-menu" id="chipMenu" hidden></div>
  <div class="chip-menu" id="jobMenu" hidden></div>
  <div class="chip-menu" id="clientMenu" hidden></div>
  <div class="chip-menu" id="clientFilterMenu" hidden></div>
  <div class="chip-menu" id="dueFilterMenu" hidden></div>
  <div class="chip-menu" id="statusFilterMenu" hidden></div>

<script>
'use strict';
(function () {
  const DRAFT = '__draft__';   // a not-yet-persisted new job (created on first send)
  const state = {
    jobs: new Map(),       // id -> job
    clients: new Map(),    // id -> client
    currentId: null,
    sending: false,
    filterClient: '',      // '' = all clients
    picking: false,        // choosing a client for a new job
    draftClientId: null,   // client chosen for the not-yet-saved draft
    invoicesPane: false,   // left pane flipped from jobs → invoices (tap the $ total)
    invoices: new Map(),   // id -> issued invoice record
    billingSel: null,      // null = list; {kind:'draft',clientId} | {kind:'invoice',id}
    editing: null,         // working copy of the draft being composed
    settings: {},          // business/bank/GST defaults for invoice snapshots
    statusFilter: 'open',  // 'open' = active group (open/doing/review/blocked/hold); a status; or 'all'
    dueFilter: 'all',      // 'all' | 'overdue' | 'today' | 'thisweek' | 'none'
  };

  const $ = (id) => document.getElementById(id);
  const jobListEl = $('jobList');
  const turnsEl = $('turns');
  const msgInput = $('msgInput');
  const sendBtn = $('sendBtn');

  marked.setOptions({ breaks: true, gfm: true });
  const mdToHtml = (s) => DOMPurify.sanitize(marked.parse(s || ''));

  const clientName = (id) => (id && state.clients.get(id)?.name) || null;
  const clientOf = (id) => (id ? state.clients.get(id) : null);
  // Outstanding = done work not yet invoiced. Only 'done' billable jobs with a
  // rate and hours count toward the running $ total and the Outstanding tab.
  function jobValue(j) {
    const c = clientOf(j.client_id);
    if (!c || c.non_billable || !c.rate_per_hour) return 0;
    if (j.status !== 'done') return 0;
    return (Number(j.hours) || 0) * Number(c.rate_per_hour);
  }
  const fmtMoney = (n) => '$' + Math.round(n).toLocaleString();
  const money2 = (n) => (Number(n) || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const money = (n) => '$' + money2(n);
  // A discount line is just a negative amount; render it as -$150.00, not $-150.00.
  const moneySigned = (sym, n) => { n = Number(n) || 0; return n < 0 ? `-${sym}${money2(-n)}` : `${sym}${money2(n)}`; };
  const round2 = (n) => Math.round((Number(n) || 0) * 100) / 100;
  const today = () => new Date().toISOString().slice(0, 10);
  function addDays(iso, days) {
    const d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  }
  // Calendar-week bounds for "this week": the current Sunday→Saturday span.
  // getDay() is 0=Sun..6=Sat, so subtracting it lands on Sunday and adding the
  // complement lands on Saturday. Same local-midnight parse the buckets use.
  const startOfWeekIso = () => addDays(today(), -new Date(today() + 'T00:00:00').getDay());
  const endOfWeekIso = () => addDays(today(), 6 - new Date(today() + 'T00:00:00').getDay());
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    if (isNaN(d)) return iso;
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${dd}/${mm}/${d.getFullYear()}`;
  }
  // Invoice dates drop the leading zero on the day (e.g. 1/06/2026) to match the
  // real Robots & Co. template.
  function fmtDateInv(iso) {
    if (!iso) return '';
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    if (isNaN(d)) return iso;
    return `${d.getDate()}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
  }
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
    (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const titleOf = (j) => j.title || firstUserText(j) || null;
  function firstUserText(j) {
    const t = (j.turns || []).find((x) => x.role === 'user' && x.text);
    return t ? t.text.replace(/\s+/g, ' ').slice(0, 80) : null;
  }
  // A job's due date for display. overdue = past and the job isn't wrapped up.
  function dueInfo(j) {
    const d = j && j.due_at;
    if (!d) return { set: false, label: '', overdue: false };
    const overdue = d < today() && !['done', 'invoiced', 'paid'].includes(j.status);
    return { set: true, label: fmtDate(d), overdue };
  }
  // Due bucket for the labeled list dividers (overdue / today / tomorrow / this
  // week / later / no due). Wrapped-up jobs (done/invoiced/paid) never read as
  // overdue — their due date is moot — so a past-due finished job sinks to the
  // no-due tail rather than shouting red.
  function dueBucket(j) {
    const d = j && j.due_at;
    if (!d) return { rank: 0, key: 'none', label: 'no due' };
    const wrapped = ['done', 'invoiced', 'paid'].includes(j.status);
    const diff = Math.round((new Date(d + 'T00:00:00') - new Date(today() + 'T00:00:00')) / 86400000);
    if (diff < 0)   return wrapped ? { rank: 0, key: 'none', label: 'no due' } : { rank: 5, key: 'overdue', label: 'overdue' };
    if (diff === 0) return { rank: 4, key: 'today',    label: 'today' };
    if (diff === 1) return { rank: 3, key: 'tomorrow', label: 'tomorrow' };
    if (d <= endOfWeekIso()) return { rank: 2, key: 'thisweek', label: 'this week' };
    return { rank: 1, key: 'later', label: 'later' };
  }
  function dayLabel(iso) {
    return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── List rendering ──────────────────────────────
  function visibleJobs() {
    let jobs = [...state.jobs.values()].filter((j) => !j.archived);
    if (state.filterClient) jobs = jobs.filter((j) => j.client_id === state.filterClient);
    return jobs.sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)));
  }
  function renderTotal(jobs) {
    const total = jobs.reduce((s, j) => s + jobValue(j), 0);
    $('valueTotal').textContent = total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  // The 'open' filter is a group: every status that isn't wrapped up. The
  // picker also offers each status individually plus 'all'.
  const ACTIVE_STATUSES = ['open', 'doing', 'review', 'blocked', 'hold'];
  const STATUS_FILTERS = ['open', 'doing', 'review', 'blocked', 'hold', 'done', 'invoiced', 'paid', 'all'];
  function matchesStatusFilter(j) {
    const sf = state.statusFilter;
    if (sf === 'all') return true;
    if (sf === 'open') return ACTIVE_STATUSES.includes(j.status);
    return j.status === sf;
  }
  // Due-bucket filter. 'thisweek' is the next-7-days run (today → this week).
  const DUE_FILTERS = ['overdue', 'today', 'thisweek', 'later', 'none', 'all'];
  // 'tomorrow' isn't in the picker — it's only reachable by clicking the
  // "tomorrow" list divider — but it still needs a chip label.
  const DUE_LABELS = { all: 'Any', overdue: 'Overdue', today: 'Today', tomorrow: 'Tomorrow', thisweek: 'This week', later: 'Later', none: 'No due' };
  function matchesDueFilter(j) {
    const df = state.dueFilter;
    if (df === 'all') return true;
    const key = dueBucket(j).key;
    // "This week" filters by the literal Sunday→Saturday calendar week, so it
    // also catches earlier-this-week days that have already gone overdue.
    if (df === 'thisweek') return !!j.due_at && j.due_at >= startOfWeekIso() && j.due_at <= endOfWeekIso();
    return key === df;
  }
  // Repaint the two filter chips from state (label + colour).
  function renderFilterOptions() {
    const c = state.filterClient ? state.clients.get(state.filterClient) : null;
    if (state.filterClient && !c) state.filterClient = '';   // client vanished → fall back to All
    $('clientFilterChip').textContent = c ? c.name : 'All';
    const sc = $('statusFilterChip');
    const sf = state.statusFilter;
    sc.className = 'filter-chip chip pick' + (sf === 'all' ? '' : ' st-' + sf);
    sc.textContent = sf === 'all' ? 'All' : sf;
    const dc = $('dueFilterChip');
    const df = state.dueFilter;
    dc.className = 'filter-chip chip pick due-filter' + (df === 'overdue' ? ' is-overdue' : df === 'today' ? ' is-today' : '');
    dc.textContent = DUE_LABELS[df] || 'Any';
  }
  function renderList() {
    const base = visibleJobs();
    renderTotal(base);                       // $ total always sums the full set (incl. done)
    const jobs = base.filter((j) => matchesStatusFilter(j) && matchesDueFilter(j));
    // Order by due urgency (overdue → today → … → no due) so the labeled
    // dividers group cleanly; ties fall back to most-recently-touched.
    jobs.sort((a, b) => (dueBucket(b).rank - dueBucket(a).rank)
      || String(b.updated_at).localeCompare(String(a.updated_at)));
    jobListEl.innerHTML = '';
    if (!jobs.length) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.style.padding = '40px 24px';
      e.textContent = base.length ? 'No jobs match this filter.'
                    : state.filterClient ? 'No jobs for this client yet.' : 'No jobs yet — hit + Job to start.';
      jobListEl.appendChild(e);
      return;
    }
    const buckets = jobs.map(dueBucket);
    // Show dividers when there's more than one bucket, OR when a due filter is
    // active — so the lone divider stays as the click-to-clear toggle.
    const showDividers = new Set(buckets.map((b) => b.key)).size > 1 || state.dueFilter !== 'all';
    let prevKey = null;
    jobs.forEach((j, i) => {
      const b = buckets[i];
      if (showDividers && b.key !== prevKey) {
        const sep = document.createElement('div');
        sep.className = 'list-divider';
        sep.dataset.bucket = b.key;
        const lbl = document.createElement('button');
        lbl.type = 'button';
        lbl.className = 'divider-label' + (state.dueFilter === b.key ? ' is-active' : '');
        lbl.textContent = b.label;
        lbl.addEventListener('click', () => {       // quick filter: toggle this bucket
          state.dueFilter = (state.dueFilter === b.key) ? 'all' : b.key;
          renderFilterOptions();
          renderList();
        });
        sep.appendChild(lbl);
        jobListEl.appendChild(sep);
      }
      prevKey = b.key;

      const row = document.createElement('div');
      row.className = 'job-row' + (j.id === state.currentId ? ' active' : '')
        + (b.key === 'overdue' ? ' due-overdue' : b.key === 'today' ? ' due-today' : '');
      row.dataset.id = j.id;

      const ttl = titleOf(j);
      const title = document.createElement('div');
      title.className = 'title' + (ttl ? '' : ' untitled');
      title.textContent = ttl || 'Untitled job';
      row.appendChild(title);

      // Three justified slots: client left, due centre, status right. Empty
      // placeholders keep the grid columns stable when a job lacks one.
      const meta = document.createElement('div');
      meta.className = 'meta';
      const cEl = document.createElement('span');
      cEl.className = 'meta-client';
      const cn = clientName(j.client_id);
      if (cn) {
        cEl.classList.add('chip', 'client', 'tap');
        cEl.textContent = cn;
        cEl.title = 'Filter by ' + cn;
        cEl.addEventListener('click', (ev) => {     // quick filter: toggle this client
          ev.stopPropagation();                     // don't open the job row
          state.filterClient = (state.filterClient === j.client_id) ? '' : j.client_id;
          renderFilterOptions();
          renderList();
        });
      }
      meta.appendChild(cEl);
      const dEl = document.createElement('span');
      dEl.className = 'meta-due';
      const di = dueInfo(j);
      if (di.set) { dEl.classList.add('due'); if (di.overdue) dEl.classList.add('overdue'); dEl.textContent = di.label; }
      meta.appendChild(dEl);
      const sEl = statusChip(j.status);   // static — no jobId, so not a button
      sEl.classList.add('meta-status');
      meta.appendChild(sEl);
      row.appendChild(meta);

      row.addEventListener('click', () => openJob(j.id));
      jobListEl.appendChild(row);
    });
  }

  function statusChip(status, jobId) {
    const c = document.createElement('span');
    const st = status || 'open';
    c.className = 'chip st-' + st + (jobId ? ' pick' : '');
    c.textContent = st;
    if (jobId) {
      c.addEventListener('click', (ev) => {
        ev.stopPropagation();          // don't open the job row
        openChipMenu(c, jobId, st);
      });
    }
    return c;
  }

  // ── Status picker (selectable chip → dropdown) ──
  const STATUS_ORDER = ['open', 'doing', 'review', 'blocked', 'hold', 'done', 'invoiced', 'paid'];
  let chipMenuJobId = null;
  function openChipMenu(anchorEl, jobId, current) {
    const menu = $('chipMenu');
    chipMenuJobId = jobId;
    menu.innerHTML = '';
    for (const st of STATUS_ORDER) {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (st === current ? ' is-current' : '');
      item.dataset.status = st;
      item.appendChild(statusChip(st));   // static colored chip (no jobId)
      menu.appendChild(item);
    }
    menu.hidden = false;
    const r = anchorEl.getBoundingClientRect();
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    let left = r.left;
    let top = r.bottom + 4;
    if (left + mw > window.innerWidth - 8) left = window.innerWidth - 8 - mw;
    if (top + mh > window.innerHeight - 8) top = r.top - 4 - mh;  // flip above if no room below
    menu.style.left = Math.max(8, left) + 'px';
    menu.style.top = Math.max(8, top) + 'px';
  }
  function closeChipMenu() { $('chipMenu').hidden = true; chipMenuJobId = null; }
  async function setJobStatus(id, status) {
    const j = await patchJson('/jobs/' + id, { status });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }
  async function setJobDue(id, due_at) {
    const j = await patchJson('/jobs/' + id, { due_at: due_at || null });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }
  // Paint the header due chip for the open job: a pill that reads "Set due" when
  // empty or "Due <date>" when set, goes red when overdue, and shows a clear (×).
  function renderDueChip(j) {
    const chip = $('chatDue'), btn = $('chatDueBtn'), clr = $('chatDueClear');
    const di = dueInfo(j);
    chip.classList.toggle('overdue', di.overdue);
    btn.classList.toggle('empty', !di.set);
    btn.textContent = di.set ? 'Due ' + di.label : 'Set due';
    clr.hidden = !di.set;
    chip.hidden = false;
  }

  // ── Job actions menu (archive / delete) ──
  function placeMenu(menu, anchorEl, align = 'left') {
    const r = anchorEl.getBoundingClientRect();
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    let left = align === 'right' ? r.right - mw : r.left;
    let top = r.bottom + 4;
    if (left + mw > window.innerWidth - 8) left = window.innerWidth - 8 - mw;
    if (top + mh > window.innerHeight - 8) top = r.top - 4 - mh;
    menu.style.left = Math.max(8, left) + 'px';
    menu.style.top = Math.max(8, top) + 'px';
  }
  function openJobMenu(anchorEl) {
    const menu = $('jobMenu');
    menu.innerHTML = '';
    const archive = document.createElement('button');
    archive.type = 'button';
    archive.className = 'chip-menu-item';
    archive.dataset.action = 'archive';
    archive.textContent = 'Archive job';
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'chip-menu-item danger';
    del.dataset.action = 'delete';
    del.textContent = 'Delete job';
    menu.appendChild(archive);
    menu.appendChild(del);
    menu.hidden = false;
    placeMenu(menu, anchorEl, 'right');
  }
  function closeJobMenu() { $('jobMenu').hidden = true; }

  // ── Client picker (click the client chip to re-assign the job) ──
  let clientMenuJobId = null;
  function openClientMenu(anchorEl, jobId, currentClientId) {
    const menu = $('clientMenu');
    clientMenuJobId = jobId;
    menu.innerHTML = '';
    const mk = (value, label, isCurrent) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (isCurrent ? ' is-current' : '');
      item.dataset.client = value;          // '' = Personal (no client)
      item.textContent = label;
      menu.appendChild(item);
    };
    mk('', 'Personal', !currentClientId);
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));

  async function setJobClient(id, clientId) {
    const j = await patchJson('/jobs/' + id, { client_id: clientId || null });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }
  async function archiveCurrentJob() {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    await patchJson('/jobs/' + id, { archived: true });
    state.jobs.delete(id);
    closeChat();
  }
  async function deleteCurrentJob() {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    const j = state.jobs.get(id);
    const name = (j && titleOf(j)) || 'this job';
    if (!confirm(`Delete ${name}? This removes the whole chat for good and can't be undone.`)) return;
    await delJson('/jobs/' + id);
    state.jobs.delete(id);
    closeChat();
  }

  // ── Active-work timer (v1 model) ────────────────
  // Time accrues only while a job's status is `doing` (the AI is working, or
  // it's set by hand). The server stamps doing_started_at on entering `doing`
  // and folds the elapsed time into the job on leaving — here we just paint a
  // live clock. timerSync() runs from renderChat, so it starts/stops the tick
  // as the open job changes or its status flips.
  const timer = { jobId: null, tickId: null };

  function jobSeconds(j) {
    if (!j) return 0;
    if (j.work_seconds != null) return Number(j.work_seconds) || 0;
    return Math.round((Number(j.hours) || 0) * 3600);   // back-fill from old jobs
  }
  function fmtDuration(totalSec) {
    const s = Math.max(0, Math.floor(totalSec));
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
    const pad = (n) => String(n).padStart(2, '0');
    return h ? `${h}:${pad(m)}:${pad(ss)}` : `${m}:${pad(ss)}`;
  }
  function jobRunning(j) { return !!(j && j.status === 'doing' && j.doing_started_at); }
  function liveSeconds(j) {
    let s = jobSeconds(j);
    if (jobRunning(j)) s += Math.max(0, (Date.now() - new Date(j.doing_started_at).getTime()) / 1000);
    return s;
  }
  function timerSync() {
    const id = (state.currentId && state.currentId !== DRAFT) ? state.currentId : null;
    timer.jobId = id;
    const running = jobRunning(id ? state.jobs.get(id) : null);
    if (running && !timer.tickId) timer.tickId = setInterval(renderTimerDisplay, 1000);
    if (!running && timer.tickId) { clearInterval(timer.tickId); timer.tickId = null; }
    renderTimerDisplay();
  }
  function renderTimerDisplay() {
    const el = $('chatHours');
    const j = timer.jobId ? state.jobs.get(timer.jobId) : null;
    if (!j) { el.textContent = ''; el.classList.remove('running'); return; }
    el.textContent = fmtDuration(liveSeconds(j));
    el.classList.toggle('running', jobRunning(j));
  }

  // ── Billing ─────────────────────────────────────
  // The $ total in the list header flips the LEFT pane between jobs and invoices.
  // The invoice list lives in the left pane; selecting an entry opens its document
  // in the main pane (a slide-over on mobile, the right column on desktop).
  const isMobile = () => window.matchMedia('(max-width: 720px)').matches;
  // Set true right before a programmatic history.back() so the resulting popstate
  // is swallowed (avoids the back from closePreview cascading into exitInvoices).
  let suppressPop = false;

  function toggleInvoices() {
    flipPane(() => {
      if (state.invoicesPane) exitInvoices();
      else enterInvoices();
    });
  }
  // Half-flip the list body out (edge-on), run `applyChange` while it's hidden,
  // then flip the new content back in. Honours reduced-motion (instant swap).
  function flipPane(applyChange) {
    const flip = $('listFlip');
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!flip || reduce) { applyChange(); return; }
    flip.classList.remove('flip-in');
    flip.classList.add('flip-out');
    const onOut = (e) => {
      if (e.target !== flip) return;
      flip.removeEventListener('animationend', onOut);
      applyChange();
      flip.classList.remove('flip-out');
      flip.classList.add('flip-in');
      const onIn = (ev) => {
        if (ev.target !== flip) return;
        flip.removeEventListener('animationend', onIn);
        flip.classList.remove('flip-in');
      };
      flip.addEventListener('animationend', onIn);
    };
    flip.addEventListener('animationend', onOut);
  }
  function enterInvoices() {
    state.invoicesPane = true;
    state.currentId = null;
    state.picking = false;
    state.billingSel = null;
    state.editing = null;
    resetNewJobPicker();
    document.body.classList.add('show-invoices');
    $('billingBtn').classList.add('is-active');
    if (isMobile()) {
      if (!(history.state && history.state.runnInvoices)) history.pushState({ runnInvoices: true }, '');
    } else {
      document.body.classList.add('show-billing');   // desktop: doc/placeholder fills the main column
    }
    renderList();
    renderBilling();
  }
  function exitInvoices(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    state.invoicesPane = false;
    state.billingSel = null;
    state.editing = null;
    document.body.classList.remove('show-invoices', 'show-billing');
    $('billingBtn').classList.remove('is-active');
    renderList();
    renderChat();
    if (!fromPop && history.state && history.state.runnInvoices) history.back();
  }
  // Open one invoice/draft document in the main pane.
  function openInvoiceDoc(sel) {
    state.billingSel = sel;
    document.body.classList.add('show-billing');
    // Mobile: push a history entry so the device back button returns to the
    // invoice LIST (closeBillingDoc) rather than exiting the pane to the jobs list.
    if (isMobile() && !(history.state && history.state.runnBillingDoc)) history.pushState({ runnBillingDoc: true }, '');
    renderBilling();
  }
  // Close the open document, returning to the invoice list (mobile slides back;
  // desktop falls to the placeholder).
  function closeBillingDoc(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    state.billingSel = null;
    state.editing = null;
    if (isMobile()) document.body.classList.remove('show-billing');
    renderBilling();
    if (!fromPop && history.state && history.state.runnBillingDoc) { suppressPop = true; history.back(); }
  }
  // Don't auto-rerender billing out from under an in-progress draft edit.
  function maybeRenderBilling() {
    if (!state.invoicesPane) return;
    if (state.billingSel && state.billingSel.kind === 'draft') return;
    renderBilling();
  }
  function billingGroups() {
    const groups = new Map();   // clientId -> { client, rows:[], total }
    for (const j of state.jobs.values()) {
      if (j.archived) continue;
      if (j.status !== 'done') continue;                       // only done-not-yet-invoiced work rolls up
      const c = clientOf(j.client_id);
      if (!c || c.non_billable || !c.rate_per_hour) continue;  // billable clients only
      const v = jobValue(j);    // 0 until hours are logged — the job still rolls up so you can set hours on the draft
      let g = groups.get(c.id);
      if (!g) { g = { client: c, rows: [], total: 0 }; groups.set(c.id, g); }
      g.rows.push({ job: j, hours: Number(j.hours) || 0, amount: v });
      g.total += v;
    }
    const out = [...groups.values()];
    out.forEach((g) => g.rows.sort((a, b) => String(a.job.done_at || a.job.updated_at).localeCompare(String(b.job.done_at || b.job.updated_at))));
    return out.sort((a, b) => b.total - a.total);
  }
  // Two surfaces: the list (left pane) and the open document (main pane).
  function renderBilling() {
    if (!state.invoicesPane) return;
    renderBillingList($('billingList'));
    renderBillingDoc();
  }
  // The status pill beside the billing-pane title (issued docs only).
  function setBillingBadge(status) {
    const b = $('billingBadge');
    if (!status) { b.hidden = true; b.className = 'ttl-badge badge'; b.textContent = ''; return; }
    b.hidden = false;
    b.className = 'ttl-badge badge st-' + status;
    b.textContent = status;
  }
  function renderBillingDoc() {
    const body = $('billingBody');
    const titleEl = $('billingTitle');
    body.innerHTML = '';
    if (state.billingSel && state.billingSel.kind === 'draft') return renderDraftDoc(body, titleEl);
    if (state.billingSel && state.billingSel.kind === 'invoice') return renderIssuedDoc(body, titleEl);
    setBillingBadge(null);
    titleEl.textContent = 'Billing';
    body.innerHTML = '<div class="empty">Select a draft or an invoice to open it.</div>';
  }

  function renderBillingList(body) {
    body.innerHTML = '';   // rebuild from scratch — otherwise repeat renders stack duplicate sections
    const groups = billingGroups();
    const invs = [...state.invoices.values()].sort((a, b) => String(b.issued_at).localeCompare(String(a.issued_at)));
    if (!groups.length && !invs.length) {
      body.innerHTML = '<div class="empty">Nothing to bill yet. Mark a job “done” and it lands here as a draft.</div>';
      return;
    }
    if (groups.length) {
      const h = document.createElement('div'); h.className = 'bill-section-h'; h.textContent = 'Drafts';
      body.appendChild(h);
      for (const g of groups) {
        const n = g.rows.length;
        body.appendChild(billEntry({
          title: g.client.name || 'Client',
          sub: `${n} ${n === 1 ? 'item' : 'items'} · not yet invoiced`,
          sum: money(g.total),
          active: !!(state.billingSel && state.billingSel.kind === 'draft' && state.billingSel.clientId === g.client.id),
          onClick: () => openDraft(g.client.id),
        }));
      }
    }
    const ih = document.createElement('div'); ih.className = 'bill-section-h'; ih.textContent = 'Invoices';
    body.appendChild(ih);
    if (!invs.length) {
      const e = document.createElement('div'); e.className = 'empty'; e.style.padding = '20px 8px';
      e.textContent = 'No issued invoices yet.';
      body.appendChild(e);
    } else {
      for (const inv of invs) {
        const company = inv.snapshot?.to?.company || clientName(inv.client_id) || '';
        body.appendChild(billEntry({
          title: '#' + inv.id,
          sub: `${company} · ${fmtDate(inv.issued_at)}`,
          badge: inv.status,
          sum: money(inv.total),
          active: !!(state.billingSel && state.billingSel.kind === 'invoice' && state.billingSel.id === inv.id),
          onClick: () => openInvoiceDoc({ kind: 'invoice', id: inv.id }),
        }));
      }
    }
  }

  function billEntry({ title, sub, sum, badge, active, onClick }) {
    const e = document.createElement('button'); e.type = 'button'; e.className = 'bill-entry' + (active ? ' active' : '');
    const main = document.createElement('div'); main.className = 'main';
    const t = document.createElement('div'); t.className = 'ttl'; t.textContent = title;
    const s = document.createElement('div'); s.className = 'sub'; s.textContent = sub;
    main.append(t, s);
    e.appendChild(main);
    if (badge) { const b = document.createElement('span'); b.className = 'badge st-' + badge; b.textContent = badge; e.appendChild(b); }
    const m = document.createElement('div'); m.className = 'sum'; m.textContent = sum; e.appendChild(m);
    e.addEventListener('click', onClick);
    return e;
  }

  // The user's invoice-number convention: client code + 2-digit year + 2-digit
  // month, e.g. LTHCS + 26 + 06 = LTHCS2606. The code is the client's
  // invoice_prefix (falls back to its name). Still hand-editable on the draft.
  function invoiceNumberFor(client, iso) {
    const code = String((client && (client.invoice_prefix || client.name)) || '').trim();
    const d = new Date(iso && iso.length === 10 ? iso + 'T00:00:00' : (iso || Date.now()));
    const yy = String(d.getFullYear()).slice(-2);
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${code}${yy}${mm}`;
  }

  // Build the working copy for a client's live draft and open the editable doc.
  function openDraft(clientId) {
    const group = billingGroups().find((g) => g.client.id === clientId);
    if (!group) { state.billingSel = null; state.editing = null; return renderBilling(); }
    const s = state.settings || {};
    const c = group.client;
    const gstRate = (typeof c.gst_rate === 'number') ? c.gst_rate
                  : (typeof s.default_gst_rate === 'number') ? s.default_gst_rate : 0;
    const issued = today();
    state.editing = {
      clientId, client: c, gstRate,
      number: invoiceNumberFor(c, issued),       // <CODE><YY><MM>, e.g. LTHCS2606; hand-editable
      issued, due: addDays(issued, s.default_due_days || 14),
      discount: 0, notes: '',
      items: group.rows.map((r) => ({
        job_id: r.job.id,
        description: titleOf(r.job) || 'Work',
        date: (r.job.done_at || r.job.updated_at || '').slice(0, 10) || issued,
        hours: r.hours,
        amount: round2(r.amount),
      })),
    };
    openInvoiceDoc({ kind: 'draft', clientId });
  }

  function calcTotals(items, discountRaw, gstRate) {
    const subtotal = round2(items.reduce((acc, it) => acc + (Number(it.amount) || 0), 0));
    const discount = Math.min(subtotal, Math.max(0, round2(discountRaw)));
    const taxable = round2(subtotal - discount);
    const gst = round2(taxable * (Number(gstRate) || 0));
    const total = round2(taxable + gst);
    return { subtotal, discount, taxable, gst, total };
  }

  // Inner HTML of .inv-paper, matching the real Robots & Co. A4 tax invoice:
  // logo + address top-left, "Tax Invoice <no>" + Att block top-right, an
  // italic-headed items table, then a bottom-pinned footer (bank left, totals
  // right, Balance in red). editable=true → draft (number + due inputs, per-line
  // remove); editable=false → issued (read-only, frozen totals).
  function invPaperHtml(o) {
    const sym = o.sym || '$';
    const t = o.precomputed
      ? { subtotal: o.precomputed.subtotal, gst: o.precomputed.gst, total: o.precomputed.total }
      : calcTotals(o.items, 0, o.gstRate);
    const paid = Number(o.paid) || 0;
    const balance = (o.balance != null) ? Number(o.balance) : round2(t.total - paid);

    const fromLines = (o.from.lines || []).map((l) => `<div>${esc(l)}</div>`).join('');
    const brand = o.from.logo
      ? `<img class="inv-logo" src="${esc(o.from.logo)}" alt="${esc(o.from.name)}"><div class="inv-from-name" hidden>${esc(o.from.name)}</div>`
      : `<div class="inv-from-name">${esc(o.from.name)}</div>`;
    const title = o.editable
      ? `Tax Invoice <input id="invNum" value="${esc(o.number)}" spellcheck="false">`
      : `Tax Invoice ${esc(o.number)}`;
    const toLines = (o.to.lines || []).map((l) => `<div>${esc(l)}</div>`).join('');

    const rows = o.items.map((it, i) => o.editable ? `<tr>
        <td><input class="li-desc" type="text" data-i="${i}" value="${esc(it.description)}" placeholder="Description"></td>
        <td>${esc(fmtDateInv(it.date))}</td>
        <td class="r"><input class="li-amt" type="number" step="0.01" data-i="${i}" value="${esc(it.amount)}"></td>
        <td class="rm-cell"><button class="rm" type="button" data-i="${i}" title="Remove line">×</button></td>
      </tr>` : `<tr>
        <td>${esc(it.description)}</td>
        <td>${esc(fmtDateInv(it.date))}</td>
        <td class="r">${moneySigned(sym, it.amount)}</td>
      </tr>`).join('');

    const due = o.editable
      ? `<input id="invDue" type="date" value="${esc(o.due)}">`
      : esc(fmtDateInv(o.due));
    const bank = o.bank || {};
    const bankRow = (k, v) => v ? `<div class="fr"><span class="k">${k}</span><span class="v">${esc(v)}</span></div>` : '';

    return `
      <div class="inv-head">
        <div class="inv-from">
          ${brand}
          <div class="inv-from-meta">${fromLines}${o.from.abn ? `<div>${esc(o.from.abn)}</div>` : ''}</div>
        </div>
        <div class="inv-to">
          <div class="inv-title">${title}</div>
          <div class="att">Att:</div>
          ${o.to.contact ? `<div>${esc(o.to.contact)}</div>` : ''}
          ${o.to.company ? `<div>${esc(o.to.company)}</div>` : ''}
          ${toLines}
          <div class="inv-date">${esc(fmtDateInv(o.issued))}</div>
        </div>
      </div>
      <hr class="inv-rule">
      <table class="inv-items">
        <thead><tr>
          <th>Item Description</th><th>Date</th><th class="r">Amount ExGST</th>${o.editable ? '<th class="rm-cell"></th>' : ''}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <hr class="inv-rule">
      ${o.editable ? `<button type="button" class="inv-addline" id="invAddLine">+ Add line</button>` : ''}
      <div class="inv-spacer"></div>
      <div class="inv-foot">
        <div class="inv-foot-left">
          <div class="fr inv-due"><span class="k">Due:</span><span class="v">${due}</span></div>
          ${bankRow('Bank:', bank.bank)}
          ${bankRow('Name:', bank.name)}
          ${bankRow('BSB:', bank.bsb)}
          ${bankRow('Acc:', bank.acc)}
        </div>
        <div class="inv-foot-right">${footRightInner(t, paid, balance, sym)}</div>
      </div>`;
  }

  // The totals column (Sub Total / GST / Total / Paid / Balance). Shared by
  // invPaperHtml and the live draft recompute so they always agree.
  function footRightInner(t, paid, balance, sym) {
    return `
      <div class="tr"><span class="k">Sub Total Ex GST:</span><span class="v">${moneySigned(sym, t.subtotal)}</span></div>
      <div class="tr"><span class="k">GST:</span><span class="v">${moneySigned(sym, t.gst)}</span></div>
      <div class="tr total"><span class="k">Total Inc GST:</span><span class="v">${moneySigned(sym, t.total)}</span></div>
      <div class="tr"><span class="k">Paid:</span><span class="v">${paid > 0 ? sym + money2(paid) : ''}</span></div>
      <div class="tr balance"><span class="k">Balance:</span><span class="v">${moneySigned(sym, balance)}</span></div>`;
  }

  // The logo path may 404 (asset not yet present) — fall back to the business
  // name text so the header is never blank.
  function wireLogoFallback(paper) {
    const img = paper.querySelector('.inv-logo');
    if (!img) return;
    img.addEventListener('error', () => {
      img.style.display = 'none';
      const nm = paper.querySelector('.inv-from-name');
      if (nm) nm.hidden = false;
    });
  }

  function fromSnapshot(s) {
    return { name: s.business_name || '', logo: s.logo_path || '', lines: s.business_address_lines || [], abn: s.business_abn_acn || '' };
  }
  function toSnapshot(c) {
    return { company: c.company || c.name || '', contact: c.contact || '', lines: c.address_lines || [] };
  }

  // Build the invPaperHtml options for a live draft / an issued invoice. Shared
  // by the editable doc, the read-only A4 preview, and the print/PDF output.
  function draftPaperOpts(ed, s, editable) {
    return {
      from: fromSnapshot(s), to: toSnapshot(ed.client), bank: s.bank, editable,
      number: ed.number, issued: ed.issued, due: ed.due,
      items: ed.items, gstRate: ed.gstRate, sym: s.currency_symbol || '$',
    };
  }
  function invoicePaperOpts(inv, editable) {
    const snap = inv.snapshot || {};
    return {
      from: { name: snap.from?.name, logo: snap.from?.logo_path, lines: snap.from?.address_lines || [], abn: snap.from?.abn_acn },
      to: { company: snap.to?.company, contact: snap.to?.contact, lines: snap.to?.address_lines || [] },
      bank: snap.bank,
      number: inv.id, issued: inv.issued_at, due: inv.due_at,
      items: inv.items, gstRate: inv.gst_rate,
      precomputed: { subtotal: inv.subtotal, gst: inv.gst, total: inv.total },
      paid: inv.paid, balance: inv.balance, sym: snap.currency_symbol || '$', editable,
    };
  }

  function renderDraftDoc(body, titleEl) {
    const ed = state.editing;
    if (!ed) { state.billingSel = null; return renderBilling(); }
    setBillingBadge(null);
    titleEl.textContent = 'New invoice — ' + (ed.client.name || '');
    const s = state.settings || {};

    const wrap = document.createElement('div'); wrap.className = 'inv-doc';
    const actions = document.createElement('div'); actions.className = 'inv-actions';
    const issueBtn = document.createElement('button'); issueBtn.type = 'button'; issueBtn.className = 'primary'; issueBtn.textContent = 'Issue invoice';
    const previewBtn = document.createElement('button'); previewBtn.type = 'button'; previewBtn.textContent = 'Preview';
    previewBtn.addEventListener('click', () => openPreview(draftPaperOpts(ed, s, false)));
    actions.append(issueBtn, previewBtn);
    wrap.appendChild(actions);

    const paper = document.createElement('div'); paper.className = 'inv-paper';
    paper.innerHTML = invPaperHtml(draftPaperOpts(ed, s, true));
    wrap.appendChild(paper);
    body.appendChild(wrap);
    wireLogoFallback(paper);

    const sym = s.currency_symbol || '$';
    const refreshTotals = () => {
      const t = calcTotals(ed.items, 0, ed.gstRate);
      const fr = paper.querySelector('.inv-foot-right');
      if (fr) fr.innerHTML = footRightInner(t, 0, t.total, sym);
    };

    paper.querySelectorAll('.inv-items .rm').forEach((btn) => {
      btn.addEventListener('click', () => {
        ed.items.splice(Number(btn.dataset.i), 1);
        if (!ed.items.length) { state.billingSel = null; state.editing = null; }
        renderBilling();   // trimming the last line drops the draft back to the list
      });
    });
    paper.querySelectorAll('.inv-items input.li-desc').forEach((inp) => {
      inp.addEventListener('input', () => { ed.items[Number(inp.dataset.i)].description = inp.value; });
    });
    paper.querySelectorAll('.inv-items input.li-amt').forEach((inp) => {
      inp.addEventListener('input', () => {
        ed.items[Number(inp.dataset.i)].amount = round2(inp.value);
        refreshTotals();
      });
    });
    const addBtn = paper.querySelector('#invAddLine');
    if (addBtn) addBtn.addEventListener('click', () => {
      ed.items.push({ job_id: null, description: '', date: today(), amount: 0 });
      renderBilling();
      const descs = document.querySelectorAll('.inv-items input.li-desc');
      if (descs.length) descs[descs.length - 1].focus();
    });
    const num = paper.querySelector('#invNum');
    const due = paper.querySelector('#invDue');
    num.addEventListener('input', () => { ed.number = num.value.trim(); });
    due.addEventListener('input', () => { ed.due = due.value; });
    issueBtn.addEventListener('click', () => issueInvoice(issueBtn));
  }

  async function issueInvoice(btn) {
    const ed = state.editing;
    if (!ed) return;
    const id = (ed.number || '').trim();
    if (!id) { alert('Give the invoice a number first.'); return; }
    if (!ed.items.length) { alert('There are no line items to invoice.'); return; }
    btn.disabled = true;
    try {
      const inv = await postJson('/invoices', {
        id, client_id: ed.clientId,
        items: ed.items.map((it) => ({ job_id: it.job_id, description: it.description, date: it.date, amount: it.amount })),
        discount: Number(ed.discount) || 0,
        gst_rate: ed.gstRate,
        notes: ed.notes || '',
        issued_at: ed.issued, due_at: ed.due,
      });
      state.invoices.set(inv.id, inv);
      state.editing = null;
      state.billingSel = { kind: 'invoice', id: inv.id };   // land on the issued doc
      renderBilling();
    } catch (e) {
      alert('Could not issue: ' + e.message);
      btn.disabled = false;
    }
  }

  function renderIssuedDoc(body, titleEl) {
    const inv = state.invoices.get(state.billingSel.id);
    if (!inv) { state.billingSel = null; return renderBilling(); }
    titleEl.textContent = '#' + inv.id;
    setBillingBadge(inv.status);

    const wrap = document.createElement('div'); wrap.className = 'inv-doc';
    const actions = document.createElement('div'); actions.className = 'inv-actions';
    if (inv.status !== 'paid') {
      const paid = document.createElement('button'); paid.type = 'button'; paid.className = 'primary'; paid.textContent = 'Mark paid';
      paid.addEventListener('click', () => markPaid(inv.id, paid));
      actions.appendChild(paid);
    }
    const previewBtn = document.createElement('button'); previewBtn.type = 'button'; previewBtn.textContent = 'Preview';
    previewBtn.addEventListener('click', () => openPreview(invoicePaperOpts(inv, false)));
    actions.appendChild(previewBtn);
    const print = document.createElement('button'); print.type = 'button'; print.textContent = 'Print / PDF';
    print.addEventListener('click', () => printInvoice(inv));
    actions.appendChild(print);
    const voidBtn = document.createElement('button'); voidBtn.type = 'button'; voidBtn.className = 'danger'; voidBtn.textContent = 'Void';
    voidBtn.addEventListener('click', () => voidInvoice(inv.id, voidBtn));
    actions.appendChild(voidBtn);
    wrap.appendChild(actions);

    const paper = document.createElement('div'); paper.className = 'inv-paper';
    paper.innerHTML = invPaperHtml(invoicePaperOpts(inv, false));
    wrap.appendChild(paper);
    body.appendChild(wrap);
    wireLogoFallback(paper);
  }

  async function markPaid(id, btn) {
    btn.disabled = true;
    try {
      const inv = await patchJson('/invoices/' + id, { status: 'paid' });
      state.invoices.set(inv.id, inv);
      renderBilling();
    } catch (e) { alert('Could not mark paid: ' + e.message); btn.disabled = false; }
  }

  async function voidInvoice(id, btn) {
    if (!confirm(`Void invoice #${id}? Its jobs go back to “done” and roll into the next draft.`)) return;
    btn.disabled = true;
    try {
      await delJson('/invoices/' + id);
      state.invoices.delete(id);
      closeBillingDoc();
    } catch (e) { alert('Could not void: ' + e.message); btn.disabled = false; }
  }

  function printInvoice(inv) {
    const w = window.open('', '_blank');
    if (!w) { alert('Allow pop-ups to print or save the PDF.'); return; }
    w.document.write(invPrintHtml(inv));
    w.document.close();
    w.focus();
    setTimeout(() => { try { w.print(); } catch {} }, 250);
  }

  // Full-page A4 preview: render the read-only invoice at true A4 size and scale
  // it to fit the viewport, so you see the printed page without leaving the app.
  function openPreview(opts) {
    let overlay = $('invPreview');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'invPreview';
      overlay.className = 'inv-preview-overlay';
      overlay.innerHTML = `
        <div class="inv-preview-bar">
          <span class="inv-preview-label">A4 preview</span>
          <button type="button" class="inv-preview-close">Close</button>
        </div>
        <div class="inv-preview-scroll"><div class="inv-preview-stage"><div class="inv-paper inv-preview-page"></div></div></div>`;
      document.body.appendChild(overlay);
      overlay.querySelector('.inv-preview-close').addEventListener('click', closePreview);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closePreview(); });
    }
    const page = overlay.querySelector('.inv-preview-page');
    page.innerHTML = invPaperHtml(opts);
    wireLogoFallback(page);
    overlay.classList.add('open');
    // Mobile: push a history entry so the device back button closes the preview
    // (returning to the draft) instead of leaving the doc — see popstate handler.
    if (isMobile() && !(history.state && history.state.runnPreview)) history.pushState({ runnPreview: true }, '');
    scalePreview();
  }
  function closePreview(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    const overlay = $('invPreview');
    if (overlay) overlay.classList.remove('open');
    // Consume the pushed entry unless the browser already did (device back).
    if (!fromPop && history.state && history.state.runnPreview) { suppressPop = true; history.back(); }
  }
  // The page is a fixed 794×1123 (A4 @96dpi); fit it to the available area by
  // scaling, and size the stage to the scaled box so scrolling/centring is sane.
  function scalePreview() {
    const overlay = $('invPreview');
    if (!overlay || !overlay.classList.contains('open')) return;
    const scroll = overlay.querySelector('.inv-preview-scroll');
    const stage = overlay.querySelector('.inv-preview-stage');
    const page = overlay.querySelector('.inv-preview-page');
    const s = Math.min((scroll.clientWidth - 32) / 794, (scroll.clientHeight - 32) / 1123, 1);
    page.style.transform = `scale(${s})`;
    stage.style.width = (794 * s) + 'px';
    stage.style.height = (1123 * s) + 'px';
  }

  // ── Chat rendering ──────────────────────────────
  // On mobile the chat is a slide-over. Push a history entry when it opens so
  // the device back button returns to the list instead of leaving the app.
  function enterChatView() {
    document.body.classList.add('show-chat');
    if (window.matchMedia('(max-width: 720px)').matches &&
        !(history.state && history.state.runnChat)) {
      history.pushState({ runnChat: true }, '');
    }
  }
  function openJob(id) {
    if (state.invoicesPane) {
      state.invoicesPane = false;
      state.billingSel = null;
      state.editing = null;
      document.body.classList.remove('show-invoices', 'show-billing');
      $('billingBtn').classList.remove('is-active');
    }
    state.currentId = id;
    state.picking = false;
    resetNewJobPicker();
    enterChatView();
    renderList();
    renderChat();
    if (window.matchMedia('(min-width: 721px)').matches) msgInput.focus();
  }
  function startNewJob() {
    state.picking = true;
    state.draftClientId = null;
    state.currentId = null;
    const sel = $('newJobPicker');
    sel.innerHTML = '';
    const ph = document.createElement('option');
    ph.value = ''; ph.textContent = 'New job for…'; ph.disabled = true; ph.selected = true;
    sel.appendChild(ph);
    const personal = document.createElement('option');
    personal.value = '__personal__'; personal.textContent = 'Personal';
    sel.appendChild(personal);
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    for (const c of clients) {

  function resetNewJobPicker() {
    const sel = $('newJobPicker');

    sel.value = '';

  }
  function beginDraft(clientId) {
    state.picking = false;
    state.draftClientId = clientId;
    state.currentId = DRAFT;
    resetNewJobPicker();
    enterChatView();
    renderList();
    renderChat();
    msgInput.focus();
