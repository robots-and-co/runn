<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Runn</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#b85c1f">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Runn">
<script src="/vendor/drag-drop-touch.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper:   #f8f5ef;
    --paper-2: #f1ece3;
    --paper-3: #e7e0d2;
    --ink:     #2a2620;
    --ink-2:   #5a544a;
    --ink-3:   #8c8578;
    --line:    #d5cdbb;
    --accent:  #b85c1f;
    --accent-soft: #f4dfd0;
  }

  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    background: var(--paper-2);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    -webkit-text-size-adjust: 100%;
  }

  /* ── Header ──────────────────────────────────────────────── */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px; height: 56px;
    background: var(--paper); border-bottom: 1px solid var(--line);
    flex-shrink: 0; position: sticky; top: 0; z-index: 10;
  }
  .header-logo {
    font-size: 15px; font-weight: 700; color: var(--ink);
    cursor: pointer; user-select: none;
    padding: 8px 10px; margin: -8px -10px;  /* enlarge tap target without changing layout */
    border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
    transition: background .12s;
  }
  .header-logo:hover, .header-logo:active { background: var(--paper-3); }
  .header-board {
    font-size: 15px; color: var(--ink-3);
    display: flex; align-items: center; gap: 8px;
  }
  .header-board::before { content: '/'; color: var(--line); }
  .header-sep { flex: 1; }
  .header-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none;
    color: var(--ink-3); border-radius: 8px; cursor: pointer;
    font-size: 20px; transition: background .1s, color .1s;
  }
  .header-btn:hover { background: var(--paper-3); color: var(--ink); }
  .ws-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--ink-3); transition: background .15s;
    flex-shrink: 0;
  }
  .ws-dot.live { background: #3a7d44; }

  .header-toggle {
    display: flex; align-items: center; gap: 4px;
    height: 36px; padding: 0 10px;
    background: none; border: 1px solid var(--line);
    border-radius: 8px; color: var(--ink-3);
    font-size: 13px; font-family: inherit;
    cursor: pointer; user-select: none;
    transition: background .12s, color .12s, opacity .12s;
  }
  .header-toggle:hover { color: var(--ink); }
  .header-toggle.off { opacity: .5; text-decoration: line-through; }

  /* ── Scroll area ─────────────────────────────────────────── */
  .main { flex: 1; overflow-y: auto; padding: 14px 14px 8px; }

  /* ── Board ───────────────────────────────────────────────── */
  .board { width: 100%; max-width: 600px; margin: 0 auto; }
  .items { display: flex; flex-direction: column-reverse; gap: 6px; }

  /* ── Card ────────────────────────────────────────────────── */
  .card {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 12px;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 8px; cursor: pointer; position: relative;
  }
  .card.active { border-color: var(--ink-3); box-shadow: 0 0 0 1px var(--ink-3); }

  /* Gentle urgency washes — soft left-to-paper gradient + tinted lift */
  .card.urgency-high {
    background: linear-gradient(to right, var(--accent-soft) 0%, var(--paper) 32%);
    box-shadow: 0 1px 4px rgba(184, 92, 31, 0.10);
  }
  .card.urgency-overdue {
    background: linear-gradient(to right, #fde8de 0%, var(--paper) 32%);
    box-shadow: 0 1px 4px rgba(184, 79, 31, 0.14);
  }
  /* If the card is also the active (open) one, keep the active ring on top */
  .card.urgency-high.active, .card.urgency-overdue.active {
    box-shadow: 0 0 0 1px var(--ink-3), 0 1px 4px rgba(184, 79, 31, 0.14);
  }

  .card.drop-before::before, .card.drop-after::after {
    content: ''; position: absolute;
    left: 0; right: 0; height: 2px;
    background: var(--accent); border-radius: 2px; pointer-events: none;
  }
  .card.drop-before::before { top: -4px; }
  .card.drop-after::after   { bottom: -4px; }
  .card.drop-nest { border-color: var(--accent); background: var(--accent-soft); }
  .card.dragging  { opacity: .4; }
  .card.flash { animation: flash .6s ease-out; }
  @keyframes flash {
    0%   { background: var(--accent-soft); }
    100% { background: var(--paper); }
  }
  .card .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: transparent; transition: background .15s;
    flex-shrink: 0;
  }
  .card .pulse.live {
    background: #3a7d44;
    animation: pulse 1.2s ease-out;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(58, 125, 68, .55); }
    100% { box-shadow: 0 0 0 8px rgba(58, 125, 68, 0); }
  }

  .card-body { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .card-row1 { display: flex; align-items: center; gap: 8px; }
  .card-row2 { display: flex; align-items: center; gap: 6px; }

  .card-title {
    flex: 1; font-size: 15px; color: var(--ink); line-height: 1.35;
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card.done .card-title { text-decoration: line-through; color: var(--ink-3); }

  .chevron {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; flex-shrink: 0;
    transition: transform .18s;
  }
  .chevron::before {
    content: ''; display: block; width: 11px; height: 11px;
    border-top: 2.5px solid var(--line); border-left: 2.5px solid var(--line);
    transform: rotate(45deg) translate(2px, 2px);
    transition: border-color .12s;
  }
  .chevron:hover::before { border-color: var(--ink-3); }
  .card.collapsed .chevron { transform: rotate(90deg); }
  .card:not([data-has-children]) .chevron { visibility: hidden; pointer-events: none; }

  .card-controls {
    display: flex; flex-direction: row; align-items: center;
    align-self: stretch; gap: 2px;
  }
  .handle {
    color: var(--line); cursor: grab; font-size: 18px;
    user-select: none; flex-shrink: 0;
    padding: 4px 8px;          /* larger tap target on mobile */
    touch-action: none;        /* let the polyfill own the touch gesture */
  }
  .handle:active { cursor: grabbing; }

  .card-add-step {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; color: var(--line);
    cursor: pointer; border-radius: 4px; flex-shrink: 0;
    font-size: 18px; line-height: 1; font-family: inherit;
    transition: background .12s, color .12s;
  }
  .card-add-step:hover { color: var(--ink-3); background: var(--paper-3); }

  .inline-step-input {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: var(--paper);
    border: 1px dashed var(--accent);
    border-radius: 8px;
  }
  .inline-step-input input {
    flex: 1; font-family: inherit; font-size: 15px;
    background: none; border: none; outline: none;
    color: var(--ink); min-width: 0;
  }
  .inline-step-input input::placeholder { color: var(--ink-3); }

  .chip {
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; white-space: nowrap; flex-shrink: 0;
    border: none; cursor: pointer; font-family: inherit;
  }
  .chip:hover { filter: brightness(0.96); }
  .chip-todo    { background: var(--paper-3);     color: var(--ink-3); }
  .chip-doing   { background: var(--accent-soft); color: var(--accent); }
  .chip-done    { background: #dff0e2;            color: #3a7d44; }
  .chip-blocked { background: #fde8de;            color: #b84f1f; }

  .badge-ext {
    font-size: 10px; font-weight: 600; padding: 1px 6px;
    border-radius: 3px; white-space: nowrap; flex-shrink: 0;
    background: #ebe6dc; color: var(--ink-3);
    border: 1px dashed var(--ink-3);
    letter-spacing: .03em; text-transform: uppercase;
  }
  .badge-ext::before { content: '↗ '; }

  .due-chip {
    font-size: 10px; font-weight: 600; padding: 1px 6px;
    border-radius: 3px; white-space: nowrap; flex-shrink: 0;
    text-transform: uppercase; letter-spacing: .03em;
  }
  .due-chip.future  { background: var(--paper-3); color: var(--ink-3); }
  .due-chip.today   { background: var(--accent-soft); color: var(--accent); }
  .due-chip.overdue { background: #fde8de; color: #b84f1f; }

  /* Tag chips on board cards — bg/color set inline per-tag (hash → hue) */
  .tag-chip {
    font-size: 11px; padding: 2px 7px;
    border-radius: 3px; white-space: nowrap; flex-shrink: 0;
    cursor: pointer; border: none; font-family: inherit;
    transition: filter .12s, box-shadow .12s;
  }
  .tag-chip::before { content: '#'; opacity: .55; }
  .tag-chip:hover  { filter: brightness(0.96); }
  .tag-chip.active { box-shadow: inset 0 0 0 1.5px currentColor; font-weight: 600; }

  /* Filter strip above the board */
  .filter-strip {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; flex-wrap: wrap;
    background: var(--paper); border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    font-size: 12px; color: var(--ink-3);
  }
  .filter-strip[hidden] { display: none; }
  .filter-strip-label {
    font-weight: 600; text-transform: uppercase; letter-spacing: .03em;
  }
  .filter-tag {
    font-size: 11px; padding: 2px 4px 2px 7px;
    border-radius: 3px;
    display: inline-flex; align-items: center; gap: 2px;
    font-family: inherit;
    box-shadow: inset 0 0 0 1.5px currentColor;
    font-weight: 600;
  }
  .filter-tag::before { content: '#'; opacity: .55; }
  .filter-tag button {
    background: none; border: none; color: inherit;
    cursor: pointer; padding: 0 2px; font-size: 14px; line-height: 1;
    opacity: .55;
  }
  .filter-tag button:hover { opacity: 1; }
  .filter-clear {
    background: none; border: none; cursor: pointer;
    font-family: inherit; font-size: 12px; color: var(--ink-3);
    text-decoration: underline; margin-left: auto;
  }
  .filter-clear:hover { color: var(--ink); }

  /* Sidebar tag editor */
  .chat-tags {
    flex-shrink: 0; position: relative;
    display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
    padding: 6px 8px;
    background: var(--paper); border: 1px solid var(--line); border-radius: 6px;
    min-height: 38px;
    transition: border-color .15s;
  }
  .chat-tags:focus-within { border-color: var(--accent); }

  .chat-tags-dropdown {
    position: absolute;
    top: calc(100% + 4px); left: 0; right: 0;
    background: var(--paper);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 6px;
    display: flex; flex-wrap: wrap; gap: 4px;
    z-index: 5;
    max-height: 200px; overflow-y: auto;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
  }
  .chat-tags-suggestion {
    font-size: 11px; padding: 2px 7px;
    border-radius: 3px; white-space: nowrap;
    border: none; cursor: pointer; font-family: inherit;
    transition: filter .12s;
  }
  .chat-tags-suggestion::before { content: '#'; opacity: .55; }
  .chat-tags-suggestion:hover { filter: brightness(0.95); }
  .chat-tags-dropdown:empty,
  .chat-tags-dropdown[hidden] { display: none; }
  .chat-tags-input {
    flex: 1; min-width: 80px;
    font-family: inherit; font-size: 13px;
    background: none; border: none; outline: none; color: var(--ink);
    padding: 4px 2px;
  }
  .chat-tags-input::placeholder { color: var(--ink-3); }
  .chat-tag-pill {
    font-size: 11px; padding: 2px 2px 2px 7px;
    border-radius: 3px;
    display: inline-flex; align-items: center; gap: 2px;
    font-family: inherit;
  }
  .chat-tag-pill::before { content: '#'; opacity: .55; }
  .chat-tag-pill button {
    background: none; border: none; color: inherit;
    cursor: pointer; padding: 0 4px; font-size: 14px; line-height: 1;
    opacity: .55;
  }
  .chat-tag-pill button:hover { opacity: 1; }

  .detail-btn {
    font-size: 13px; padding: 6px 12px;
    background: none; border: 1px solid var(--line);
    border-radius: 6px; color: var(--ink-2); cursor: pointer;
    font-family: inherit;
    transition: background .12s, color .12s, border-color .12s;
  }
  .detail-btn:hover { color: var(--ink); border-color: var(--ink-3); background: var(--paper); }
  .detail-btn:disabled { opacity: .5; cursor: wait; }
  .detail-btn.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .detail-btn.primary:hover { filter: brightness(0.95); color: #fff; }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--ink-3); font-size: 14px; line-height: 1.6;
  }
  .empty-state code {
    font-family: ui-monospace, "SF Mono", monospace;
    background: var(--paper-3); padding: 2px 6px;
    border-radius: 4px; color: var(--ink);
  }

  /* ── Chat panel ──────────────────────────────────────────── */
  .chat-backdrop {
    position: fixed; inset: 0;
    background: rgba(42, 38, 32, .35);
    z-index: 20; opacity: 0; pointer-events: none;
    transition: opacity .18s ease;
  }
  .chat-backdrop.open { opacity: 1; pointer-events: auto; }

  .chat-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 520px; max-width: 100vw;
    background: var(--paper-2);
    border-left: 1px solid var(--line);
    box-shadow: -4px 0 24px rgba(0,0,0,.08);
    z-index: 21; display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .22s ease;
  }
  .chat-panel.open { transform: translateX(0); }
  @media (max-width: 700px) {
    .chat-panel { width: 100vw; border-left: none; box-shadow: none; }
  }

  .chat-header {
    flex-shrink: 0; display: flex; align-items: center; gap: 8px;
    padding: 0 8px 0 4px; height: 56px;
    background: var(--paper); border-bottom: 1px solid var(--line);
  }
  .chat-back {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; color: var(--ink-2);
    cursor: pointer; border-radius: 8px; font-size: 22px;
  }
  .chat-back:hover { background: var(--paper-3); color: var(--ink); }
  .chat-title-input {
    flex: 1; font-size: 15px; font-weight: 600; color: var(--ink);
    background: none; border: none; outline: none;
    font-family: inherit; padding: 6px 4px; min-width: 0;
  }
  .chat-title-input:focus {
    background: var(--paper-2); border-radius: 4px;
  }
  .chat-archive {
    font-size: 12px; padding: 6px 10px;
    background: none; border: 1px solid var(--line);
    border-radius: 6px; color: var(--ink-3); cursor: pointer;
    font-family: inherit;
  }
  .chat-archive:hover { color: var(--ink); border-color: var(--ink-3); }

  .chat-toolbar {
    flex-shrink: 0; display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: var(--paper);
    border-bottom: 1px solid var(--line);
    font-size: 12px; color: var(--ink-3);
  }
  .chat-toolbar .chip { cursor: pointer; }
  .chat-due-wrap {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--ink-3);
  }
  .chat-due, .chat-due-time {
    font-family: inherit; font-size: 12px;
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 4px; padding: 3px 6px; color: var(--ink-2);
    outline: none; min-width: 0;
  }
  .chat-due:focus, .chat-due-time:focus { border-color: var(--accent); }
  .chat-due-time { max-width: 90px; }
  .chat-due-time:disabled { opacity: .4; cursor: not-allowed; }

  .chat-hours-wrap {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--ink-3);
  }
  .chat-hours {
    font-family: inherit; font-size: 12px;
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 4px; padding: 3px 6px; color: var(--ink-2);
    outline: none; width: 60px;
  }
  .chat-hours:focus { border-color: var(--accent); }

  .chat-billing {
    font-size: 10px; font-weight: 600; padding: 3px 8px;
    border: none; border-radius: 4px; cursor: pointer;
    font-family: inherit; letter-spacing: .03em; text-transform: uppercase;
    background: var(--paper-3); color: var(--ink-3);
    transition: filter .12s;
  }
  .chat-billing:hover { filter: brightness(0.95); }
  .chat-billing.unbilled { background: var(--paper-3);    color: var(--ink-3); }
  .chat-billing.invoiced { background: #f4dfd0;           color: #b85c1f; }
  .chat-billing.paid     { background: #dff0e2;           color: #3a7d44; }

  /* Hours chip on board cards */
  .hours-chip {
    font-size: 10px; font-weight: 600; padding: 1px 6px;
    border-radius: 3px; white-space: nowrap; flex-shrink: 0;
    background: var(--paper-3); color: var(--ink-3);
    border: 1px solid transparent;
    font-family: ui-monospace, monospace;
  }
  .hours-chip.outstanding {
    background: var(--paper);
    color: var(--accent);
    border-color: var(--accent-soft);
  }
  .hours-chip.invoiced {
    background: #f4dfd0; color: #b85c1f;
  }
  .hours-chip.paid {
    background: #dff0e2; color: #3a7d44;
  }
  .hours-chip.rollup::before {
    content: 'Σ '; opacity: .6;
  }

  /* Header outstanding total */
  .header-outstanding {
    display: flex; align-items: center;
    height: 36px; padding: 0 10px;
    background: none; border: 1px solid var(--accent-soft);
    border-radius: 8px; color: var(--accent);
    font-size: 13px; font-weight: 600;
    font-family: ui-monospace, monospace;
    cursor: pointer; user-select: none;
    transition: background .12s;
  }
  .header-outstanding:hover { background: var(--accent-soft); }
  .header-outstanding[hidden] { display: none; }
  .header-outstanding::before { content: '$ '; opacity: .6; margin-right: 2px; }

  /* Billing panel — slides in from right like chat panel */
  .billing-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 520px; max-width: 100vw;
    background: var(--paper-2);
    border-left: 1px solid var(--line);
    box-shadow: -4px 0 24px rgba(0,0,0,.08);
    z-index: 21; display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .22s ease;
  }
  .billing-panel.open { transform: translateX(0); }
  @media (max-width: 700px) {
    .billing-panel { width: 100vw; border-left: none; box-shadow: none; }
  }
  .billing-header {
    flex-shrink: 0; display: flex; align-items: center; gap: 8px;
    padding: 0 8px 0 4px; height: 56px;
    background: var(--paper); border-bottom: 1px solid var(--line);
  }
  .billing-title {
    flex: 1; font-size: 15px; font-weight: 600; color: var(--ink);
  }
  .billing-body {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .billing-group {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 8px; padding: 12px;
  }
  .billing-group-header {
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 8px; margin-bottom: 8px;
    border-bottom: 1px dashed var(--line);
  }
  .billing-group-tag {
    font-size: 13px; font-weight: 600;
  }
  .billing-group-total {
    font-family: ui-monospace, monospace;
    font-size: 13px; font-weight: 600; color: var(--accent);
    margin-left: auto;
  }
  .billing-group-actions {
    display: flex; gap: 6px;
    margin-top: 10px; padding-top: 8px;
    border-top: 1px dashed var(--line);
  }
  .billing-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 4px;
    font-size: 13px; color: var(--ink);
  }
  .billing-item-title {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: pointer;
  }
  .billing-item-title:hover { text-decoration: underline; }
  .billing-item-hours {
    font-family: ui-monospace, monospace;
    color: var(--ink-3); font-size: 12px;
  }
  .billing-empty {
    text-align: center; padding: 40px 20px;
    color: var(--ink-3); font-size: 14px;
  }

  /* Tabs inside billing panel */
  .billing-tabs {
    display: flex; gap: 2px; padding: 4px;
    background: var(--paper-3); border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .billing-tab {
    flex: 1; border: none; background: none; cursor: pointer;
    padding: 8px 12px; font-family: inherit;
    font-size: 12px; font-weight: 600;
    color: var(--ink-3); border-radius: 6px;
    text-transform: uppercase; letter-spacing: .03em;
    transition: background .12s, color .12s;
  }
  .billing-tab:hover { color: var(--ink); }
  .billing-tab.active {
    background: var(--paper); color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.06);
  }

  .billing-header-actions { margin-left: auto; display: flex; gap: 4px; }
  .billing-icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; color: var(--ink-3);
    cursor: pointer; border-radius: 8px; font-size: 18px;
  }
  .billing-icon-btn:hover { background: var(--paper-3); color: var(--ink); }

  /* Edit-tag affordance in group header */
  .billing-group-edit {
    border: none; background: none; cursor: pointer;
    color: var(--ink-3); font-size: 12px; padding: 2px 4px;
  }
  .billing-group-edit:hover { color: var(--ink); }

  .billing-invoice-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 6px; cursor: pointer;
    font-size: 13px;
    transition: background .12s, border-color .12s;
  }
  .billing-invoice-row:hover { background: var(--paper-3); border-color: var(--ink-3); }
  .billing-invoice-id {
    font-family: ui-monospace, monospace; font-weight: 600;
    color: var(--ink);
  }
  .billing-invoice-meta { flex: 1; color: var(--ink-3); font-size: 12px; }
  .billing-invoice-total {
    font-family: ui-monospace, monospace; font-weight: 600;
    color: var(--accent);
  }
  .billing-invoice-status {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 3px; text-transform: uppercase; letter-spacing: .03em;
  }
  .billing-invoice-status.draft    { background: var(--paper-3); color: var(--ink-3); }
  .billing-invoice-status.sent     { background: #f4dfd0;        color: #b85c1f; }
  .billing-invoice-status.paid     { background: #dff0e2;        color: #3a7d44; }

  /* ── Modal dialog ────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(42, 38, 32, .5);
    z-index: 30; opacity: 0; pointer-events: none;
    transition: opacity .18s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }
  .modal {
    position: fixed; z-index: 31;
    top: 50%; left: 50%; transform: translate(-50%, -50%) scale(.96);
    width: 92vw; max-width: 600px; max-height: 90vh;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    opacity: 0; pointer-events: none;
    transition: opacity .18s, transform .18s;
    display: flex; flex-direction: column;
  }
  .modal.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
  @media (max-width: 700px) {
    .modal { width: 100vw; max-width: 100vw; max-height: 100vh; height: 100vh;
             top: 0; left: 0; transform: none; border-radius: 0; }
    .modal.open { transform: none; }
  }
  .modal-header {
    flex-shrink: 0; display: flex; align-items: center; gap: 8px;
    padding: 14px 16px; border-bottom: 1px solid var(--line);
  }
  .modal-title { flex: 1; font-size: 15px; font-weight: 600; color: var(--ink); }
  .modal-close {
    width: 32px; height: 32px;
    border: none; background: none; cursor: pointer;
    color: var(--ink-3); font-size: 18px; border-radius: 6px;
  }
  .modal-close:hover { background: var(--paper-3); color: var(--ink); }
  .modal-body {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .modal-footer {
    flex-shrink: 0; display: flex; gap: 8px; justify-content: flex-end;
    padding: 12px 16px; border-top: 1px solid var(--line);
    background: var(--paper-2);
  }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field label {
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: .03em;
  }
  .form-field input, .form-field textarea, .form-field select {
    font-family: inherit; font-size: 14px; color: var(--ink);
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 10px; outline: none;
  }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
    border-color: var(--accent);
  }
  .form-field textarea { resize: vertical; min-height: 60px; line-height: 1.4; }
  .form-field-row { display: flex; gap: 8px; }
  .form-field-row > .form-field { flex: 1; }
  .form-help { font-size: 11px; color: var(--ink-3); margin-top: -2px; }

  /* Invoice composer line items table */
  .composer-items {
    display: flex; flex-direction: column; gap: 4px;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--paper-2); padding: 6px;
  }
  .composer-item {
    display: grid;
    grid-template-columns: 1fr 100px 90px 30px;
    gap: 4px; align-items: center;
  }
  .composer-item input {
    font-family: inherit; font-size: 12px; color: var(--ink);
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 4px; padding: 5px 7px; outline: none;
  }
  .composer-item input:focus { border-color: var(--accent); }
  .composer-item .rm {
    border: none; background: none; cursor: pointer;
    color: var(--ink-3); font-size: 16px;
  }
  .composer-item .rm:hover { color: var(--accent); }
  .composer-totals {
    display: flex; flex-direction: column; gap: 4px;
    align-items: flex-end; padding: 8px 12px;
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 6px;
    font-family: ui-monospace, monospace; font-size: 13px;
  }
  .composer-totals-row { display: flex; gap: 16px; }
  .composer-totals-label { color: var(--ink-3); }
  .composer-totals-row.total { font-weight: 700; color: var(--accent); font-size: 14px; }

  /* ── Invoice preview page (full route at /invoices/:id) ── */
  .invoice-page {
    display: none;
    min-height: 100vh;
    background: var(--paper-2);
    padding: 20px;
    overflow-y: auto;
  }
  body.invoice-route .header,
  body.invoice-route .main,
  body.invoice-route .footer,
  body.invoice-route .chat-panel,
  body.invoice-route .billing-panel,
  body.invoice-route .chat-backdrop { display: none !important; }
  body.invoice-route .invoice-page { display: block; }

  .invoice-doc-actions {
    width: 210mm; max-width: 100%; margin: 0 auto 16px;
    display: flex; gap: 8px; align-items: center;
  }
  .invoice-doc-actions .spacer { flex: 1; }
  .invoice-doc {
    /* A4 portrait */
    width: 210mm; max-width: 100%;
    min-height: 297mm;
    margin: 0 auto;
    background: white;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    padding: 18mm 20mm;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    color: #2a2620;
    font-size: 13px; line-height: 1.5;
    box-sizing: border-box;
    /* Flex column so the totals block can be pushed to the page bottom */
    display: flex; flex-direction: column;
  }
  .invoice-doc-header { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }
  .invoice-doc-logo {
    max-width: 180px; max-height: 110px; object-fit: contain;
  }
  .invoice-doc-from-meta {
    margin-top: 8px; font-size: 11px; color: #5a544a;
    line-height: 1.5;
  }
  .invoice-doc-right { text-align: right; }
  .invoice-doc-title {
    font-size: 18px; font-weight: 700; margin-bottom: 14px;
  }
  .invoice-doc-to {
    font-size: 12px; line-height: 1.5;
  }
  .invoice-doc-table {
    width: 100%; border-collapse: collapse;
    margin: 20px 0;
  }
  .invoice-doc-table th {
    text-align: left; font-weight: 400; font-style: italic;
    color: #8c8578; font-size: 12px;
    border-bottom: 1px solid #d5cdbb;
    padding: 8px 4px;
  }
  .invoice-doc-table th.right { text-align: right; }
  .invoice-doc-table td {
    padding: 12px 4px;
    border-bottom: 1px solid #f1ece3;
    font-size: 13px;
  }
  .invoice-doc-table td.right { text-align: right; font-family: ui-monospace, monospace; }
  .invoice-doc-table td.date  { color: #5a544a; }
  .invoice-doc-footer {
    margin-top: auto;
    border: 1px solid #d5cdbb; border-radius: 4px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
    padding: 16px 20px;
  }
  .invoice-doc-bank { font-size: 12px; line-height: 1.7; }
  .invoice-doc-bank-row { display: grid; grid-template-columns: 50px 1fr; gap: 8px; }
  .invoice-doc-bank-row .lbl { color: #8c8578; }
  .invoice-doc-totals { font-size: 13px; }
  .invoice-doc-totals-row {
    display: flex; justify-content: flex-end; gap: 16px;
    padding: 4px 0; line-height: 1.4;
  }
  .invoice-doc-totals-row .lbl { color: #8c8578; }
  .invoice-doc-totals-row .val {
    font-family: ui-monospace, monospace; min-width: 70px; text-align: right;
  }
  .invoice-doc-totals-row.balance .val.outstanding { color: #b84f1f; font-weight: 700; }

  @page { size: A4; margin: 0; }
  @media print {
    body { background: white !important; }
    .invoice-doc-actions { display: none !important; }
    .invoice-doc {
      box-shadow: none;
      width: 210mm; min-height: 297mm;
      padding: 18mm 20mm;
      margin: 0;
    }
    body.invoice-route .invoice-page { padding: 0; }
  }
  .chat-due-clear {
    background: none; border: none; cursor: pointer;
    color: var(--ink-3); font-size: 14px; padding: 0 2px;
    line-height: 1; opacity: .6;
  }
  .chat-due-clear:hover { opacity: 1; color: var(--accent); }
  .chat-meta-text {
    flex: 1; min-width: 0;
    font-family: ui-monospace, monospace; font-size: 11px;
    color: var(--ink-3); text-align: right;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .chat-body {
    flex: 1; overflow-y: auto;
    padding: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .chat-empty {
    text-align: center; padding: 40px 20px;
    color: var(--ink-3); font-size: 14px;
  }

  .chat-notes {
    flex-shrink: 0;
    width: 100%; min-height: 60px;
    font-family: inherit; font-size: 14px; color: var(--ink-2);
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 10px; resize: vertical; outline: none;
    line-height: 1.5;
  }
  .chat-notes:focus { border-color: var(--accent); }

  .chat-step-row {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
    background: var(--paper-2); border: 1px dashed var(--line);
    border-radius: 8px; padding: 4px 6px 4px 12px;
    transition: border-color .15s, background .15s;
  }
  .chat-step-row:focus-within {
    border-style: solid; border-color: var(--accent); background: var(--paper);
  }
  .chat-step-input {
    flex: 1; font-family: inherit; font-size: 14px;
    color: var(--ink); background: none; border: none; outline: none; min-width: 0;
    padding: 6px 0;
  }
  .chat-step-input::placeholder { color: var(--ink-3); }
  .chat-step-add {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: 6px; cursor: pointer;
    font-size: 16px; flex-shrink: 0;
    background: var(--accent); color: #fff;
    transition: opacity .12s;
  }
  .chat-step-add:disabled { opacity: .35; cursor: default; }

  .chat-steps {
    flex-shrink: 0;
    display: flex; flex-direction: column; gap: 4px;
  }
  .chat-steps:empty { display: none; }
  .chat-step {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 6px; cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .chat-step:hover { background: var(--paper-3); border-color: var(--ink-3); }
  .chat-step.active { border-color: var(--ink-3); box-shadow: 0 0 0 1px var(--ink-3); }
  .chat-step-title {
    flex: 1; font-size: 13px; color: var(--ink);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .chat-step.done .chat-step-title { text-decoration: line-through; color: var(--ink-3); }
  .chat-step .badge-ext { font-size: 9px; padding: 1px 4px; }

  .chat-aiify-zone {
    flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 30px 20px; text-align: center;
    background: var(--paper); border: 1px dashed var(--line); border-radius: 8px;
  }
  .chat-aiify-btn { font-size: 15px; padding: 10px 20px; }
  .chat-aiify-hint { font-size: 12px; color: var(--ink-3); }

  .chat-transcript {
    flex: 1; display: flex; flex-direction: column; gap: 12px;
    min-height: 0;
  }

  .chat-footer {
    flex-shrink: 0;
    padding: 10px 12px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--paper); border-top: 1px solid var(--line);
  }
  .chat-footer .footer-input-row {
    /* reuse the same styling as the board footer */
  }
  .chat-error {
    font-size: 12px; color: var(--accent);
    padding: 6px 4px 0; text-align: center;
  }

  .turn { display: flex; flex-direction: column; gap: 6px; max-width: 100%; }
  .turn-user {
    align-self: flex-end; max-width: 90%;
    background: var(--paper-3); color: var(--ink);
    padding: 10px 12px; border-radius: 12px 12px 2px 12px;
    white-space: pre-wrap; word-wrap: break-word;
    font-size: 14px; line-height: 1.5;
  }
  .turn-assistant {
    align-self: flex-start; max-width: 100%; width: 100%;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px 12px 12px 2px;
    padding: 10px 12px;
    font-size: 14px; line-height: 1.5;
    display: flex; flex-direction: column; gap: 8px;
  }
  .turn-system {
    align-self: center;
    font-size: 12px; color: var(--ink-3); font-style: italic;
    background: var(--paper-2);
    padding: 6px 12px; border-radius: 6px;
    max-width: 90%; text-align: center;
  }
  .turn-text { white-space: pre-wrap; word-wrap: break-word; }
  .turn-text:empty { display: none; }

  .group {
    border: 1.5px solid var(--line); border-radius: 10px;
    padding: 5px; display: flex; flex-direction: column-reverse;
    gap: 4px; background: var(--paper-3);
  }
  [data-indent="1"] { margin-left: 36px; }
  [data-indent="2"] { margin-left: 72px; }
  [data-indent="3"] { margin-left: 108px; }
  [data-indent="4"] { margin-left: 144px; }

  /* Standalone cards (no .group wrapper) get the same horizontal inset
     as cards inside a group, so chevron/plus/handle align in a column. */
  .items > .card { margin-left: 6px; margin-right: 6px; }

  /* ── Footer ──────────────────────────────────────────────── */
  .footer {
    flex-shrink: 0; padding: 10px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--paper); border-top: 1px solid var(--line);
  }
  .footer-input-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 12px; padding: 6px 8px 6px 10px;
    transition: border-color .15s;
  }
  .footer-input-row:focus-within { border-color: var(--accent); }

  /* Match the board's max-width on the bottom input so it doesn't run edge-to-edge on wide screens */
  .footer > .footer-input-row { max-width: 600px; margin: 0 auto; }
  .footer > .footer-error    { max-width: 600px; margin: 0 auto; }

  .mode-toggle {
    display: flex; background: var(--paper-3);
    border-radius: 7px; padding: 2px; gap: 2px; flex-shrink: 0;
  }
  .mode-btn {
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px; border: none; background: none;
    color: var(--ink-3); cursor: pointer;
    transition: background .12s, color .12s; font-family: inherit;
  }
  .mode-btn.active {
    background: var(--paper); color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .mode-btn.active.chat { color: #6b52b8; }

  .footer-input {
    flex: 1; font-family: inherit; font-size: 15px;
    color: var(--ink); background: none; border: none; outline: none; min-width: 0;
  }
  .footer-input::placeholder { color: var(--ink-3); }

  .footer-send {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: 9px; cursor: pointer;
    font-size: 16px; flex-shrink: 0;
    background: var(--accent); color: #fff;
    transition: opacity .12s;
  }
  .footer-send:disabled { opacity: .35; cursor: default; }

  .footer-input-row.chat-mode { border-color: #c8bcec; background: #f5f2fd; }
  .footer-input-row.chat-mode:focus-within { border-color: #6b52b8; }
  .footer-input-row.chat-mode .footer-send { background: #6b52b8; }
  .footer-input-row.busy .footer-send {
    background: var(--ink-3); cursor: wait;
  }
  .footer-error {
    font-size: 12px; color: var(--accent);
    padding: 6px 4px 0; text-align: center;
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo" onclick="location.reload()" title="Tap to refresh">
    <div class="ws-dot" id="wsDot" title="WS status"></div>
    Runn
  </div>
  <div class="header-sep"></div>
  <button class="header-outstanding" id="headerOutstanding" hidden title="Outstanding billable hours">0h</button>
  <button class="header-toggle" id="toggleDone" title="Show/hide done cards">✓ done</button>
  <button class="header-btn" id="btnMenu" title="Billing">⋯</button>
</header>

<main class="main">
  <div class="filter-strip" id="filterStrip" hidden></div>
  <div class="board">
    <div class="items" id="items"></div>
    <div class="empty-state" id="emptyState" hidden>
      No sessions yet.<br>
      Run <code>claude</code> in any terminal — a card will appear here.
    </div>
  </div>
</main>

<div class="chat-backdrop" id="chatBackdrop" onclick="closeChat()"></div>
<aside class="billing-panel" id="billingPanel" aria-hidden="true">
  <div class="billing-header">
    <button class="chat-back" onclick="closeBilling()" title="Close">←</button>
    <div class="billing-title">Billing</div>
    <div class="billing-header-actions">
      <button class="billing-icon-btn" id="btnAppSettings" title="App settings">⚙</button>
    </div>
  </div>
  <div class="billing-tabs">
    <button class="billing-tab active" data-tab="outstanding">Outstanding</button>
    <button class="billing-tab" data-tab="invoices">Invoices</button>
  </div>
  <div class="billing-body" id="billingBody"></div>
</aside>

<!-- App settings modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeAllModals()"></div>
<div class="modal" id="modalAppSettings" aria-hidden="true">
  <div class="modal-header">
    <div class="modal-title">App settings — invoicing</div>
    <button class="modal-close" onclick="closeAllModals()">×</button>
  </div>
  <div class="modal-body">
    <div class="form-field">
      <label>Business name</label>
      <input type="text" id="apsBusinessName" placeholder="Robots & Co">
    </div>
    <div class="form-field">
      <label>Business address (multi-line)</label>
      <textarea id="apsBusinessAddress" rows="2" placeholder="PO Box 302 Healesville, Vic 3777"></textarea>
    </div>
    <div class="form-field">
      <label>ABN / ACN</label>
      <input type="text" id="apsAbnAcn" placeholder="ABN: 12 345 678 901 - ACN ...">
    </div>
    <div class="form-field">
      <label>Logo path <span style="font-weight:400;text-transform:none;">(drop file in <code>~/runn-data/assets/</code>)</span></label>
      <input type="text" id="apsLogoPath" placeholder="/assets/logo.png">
    </div>
    <div class="form-field-row">
      <div class="form-field">
        <label>GST rate</label>
        <input type="number" id="apsGstRate" step="0.01" min="0" max="1" placeholder="0.10">
      </div>
      <div class="form-field">
        <label>Default due (days)</label>
        <input type="number" id="apsDueDays" min="0" placeholder="14">
      </div>
      <div class="form-field">
        <label>Currency symbol</label>
        <input type="text" id="apsCurrencySymbol" placeholder="$">
      </div>
    </div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:var(--ink-2);">Bank details (shown on invoices)</div>
    <div class="form-field-row">
      <div class="form-field">
        <label>Bank</label>
        <input type="text" id="apsBankName" placeholder="Westpac">
      </div>
      <div class="form-field">
        <label>Account name</label>
        <input type="text" id="apsAccName" placeholder="Robots & Co Pty Ltd">
      </div>
    </div>
    <div class="form-field-row">
      <div class="form-field">
        <label>BSB</label>
        <input type="text" id="apsBsb" placeholder="033-397">
      </div>
      <div class="form-field">
        <label>Account number</label>
        <input type="text" id="apsAccNum" placeholder="451328">
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="detail-btn" onclick="closeAllModals()">cancel</button>
    <button class="detail-btn primary" id="apsSave">save</button>
  </div>
</div>

<!-- Tag settings modal -->
<div class="modal" id="modalTagSettings" aria-hidden="true">
  <div class="modal-header">
    <div class="modal-title" id="tsTitle">Tag settings</div>
    <button class="modal-close" onclick="closeAllModals()">×</button>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────
const cards = new Map(); // id -> card json
const expandedCardIds = new Set(); // parents the user has explicitly expanded; everything else stays collapsed
let mode = 'add';
let showDone = localStorage.getItem('runn:showDone') !== '0'; // default true
const activeTags = new Set(JSON.parse(localStorage.getItem('runn:activeTags') || '[]'));

// Deterministic warm pastel from any tag string. djb2 hash → hue.
function tagColor(tag) {
  let h = 5381;
  for (let i = 0; i < tag.length; i++) h = ((h << 5) + h + tag.charCodeAt(i)) | 0;
  const hue = Math.abs(h) % 360;
  return { bg: `hsl(${hue} 38% 88%)`, fg: `hsl(${hue} 50% 26%)` };
}
function styleTag(el, tag) {
  const { bg, fg } = tagColor(tag);
  el.style.background = bg;
  el.style.color = fg;
}
const STATUS_CYCLE = { todo: 'doing', doing: 'done', done: 'todo', blocked: 'todo' };
const list = document.getElementById('items');
const emptyState = document.getElementById('emptyState');
const toggleDoneBtn = document.getElementById('toggleDone');

function applyDoneToggleClass() { toggleDoneBtn.classList.toggle('off', !showDone); }
applyDoneToggleClass();
toggleDoneBtn.addEventListener('click', () => {
  showDone = !showDone;
  localStorage.setItem('runn:showDone', showDone ? '1' : '0');
  applyDoneToggleClass();
  renderAll();
});

// ── API ──────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: {
      'accept': 'application/json',
      ...(body ? { 'content-type': 'application/json' } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${method} ${path}: ${res.status}`);
  return res.json();
}
const patchCard   = (id, patch) => api('PATCH', `/cards/${id}`, patch);
const archiveCard = (id)        => api('POST',  `/cards/${id}/archive`);
const sendMessage = (id, text)  => api('POST',  `/cards/${id}/message`, { text });
const aiifyCard   = (id)        => api('POST',  `/cards/${id}/ai-ify`);

// ── Hours rollup + outstanding totals ───────────────────────
function rolledUpHours(cardId) {
  const card = cards.get(cardId);
  if (!card) return 0;
  let total = (typeof card.hours === 'number') ? card.hours : 0;
  for (const c of cards.values()) {
    if (c.parent_id === cardId) total += rolledUpHours(c.id);
  }
  return total;
}
function fmtHours(h) {
  if (h == null || h === 0) return '';
  // Show 1h, 1.5h, 2h, 0.25h, etc.
  return (Math.round(h * 100) / 100) + 'h';
}
function outstandingTotal() {
  let t = 0;
  for (const c of cards.values()) {
    if (c.status === 'done' && (c.billing || 'unbilled') === 'unbilled' && typeof c.hours === 'number') {
      t += c.hours;
    }
  }
  return t;
}
function billingGroups() {
  // Group done + (unbilled OR invoiced) cards by primary tag (first tag), or '_untagged'
  const groups = new Map(); // tag → { unbilled: [cards], invoiced: [cards], hours: { unbilled, invoiced } }
  for (const c of cards.values()) {
    const b = c.billing || 'unbilled';
    if (c.status !== 'done' || b === 'paid') continue;
    if (typeof c.hours !== 'number' || c.hours === 0) continue;
    const tag = (c.tags && c.tags[0]) || '_untagged';
    if (!groups.has(tag)) groups.set(tag, { unbilled: [], invoiced: [], hours: { unbilled: 0, invoiced: 0 } });
    const g = groups.get(tag);
    g[b].push(c);
    g.hours[b] += c.hours;
  }
  return groups;
}

// ── Render ───────────────────────────────────────────────────
function depthOf(card) {
  let d = 0, c = card;
  while (c && c.parent_id) {
    c = cards.get(c.parent_id);
    if (!c) break;
    if (++d > 4) break;
  }
  return d;
}

function renderCard(card) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.cardId = card.id;
  el.innerHTML = `
    <div class="card-body">
      <div class="card-row1"><div class="card-title"></div><span class="pulse"></span></div>
      <div class="card-row2">
        <button class="chip"></button>
        <span class="badge-ext" hidden>ext</span>
        <span class="due-chip" hidden></span>
        <span class="hours-chip" hidden></span>
      </div>
    </div>
    <div class="card-controls">
      <button class="card-add-step" title="Add step" onclick="inlineAddStep(event, this)">+</button>
      <span class="chevron" onclick="toggleCollapse(event,this)"></span>
      <span class="handle" draggable="true" title="Drag to reorder">⠿</span>
    </div>`;
  applyCard(el, card);

  el.querySelector('.chip').addEventListener('click', e => {
    e.stopPropagation();
    const next = STATUS_CYCLE[card.status] || 'todo';
    patchCard(card.id, { status: next }).catch(err => console.error(err));
  });

  return el;
}

function applyCard(el, card) {
  el.querySelector('.card-title').textContent = card.title;
  const chip = el.querySelector('.chip');
  chip.className = `chip chip-${card.status}`;
  chip.textContent = card.status;
  el.classList.toggle('done', card.status === 'done');
  el.querySelector('.badge-ext').hidden = card.origin !== 'external';
  // Due chip
  const due = el.querySelector('.due-chip');
  if (card.due) {
    const dStatus = dueStatus(card.due);
    due.className = `due-chip ${dStatus}`;
    due.textContent = formatDue(card.due);
    due.hidden = false;
  } else {
    due.hidden = true;
  }
  el.classList.toggle('active', card.id === openCardId);
  // Gentle urgency treatment
  el.classList.remove('urgency-high', 'urgency-overdue');
  const u = urgencyOf(card);
  if (u) el.classList.add(`urgency-${u}`);
  // Hours chip — own or rolled-up (for parents)
  const hoursEl = el.querySelector('.hours-chip');
  let hasChildHours = false;
  for (const c of cards.values()) {
    if (c.parent_id === card.id && typeof c.hours === 'number' && c.hours > 0) { hasChildHours = true; break; }
  }
  const ownHours = (typeof card.hours === 'number') ? card.hours : 0;
  const displayHours = hasChildHours ? rolledUpHours(card.id) : ownHours;
  if (displayHours > 0) {
    hoursEl.hidden = false;
    hoursEl.textContent = fmtHours(displayHours);
    hoursEl.className = 'hours-chip';
    if (hasChildHours) hoursEl.classList.add('rollup');
    const b = card.billing || 'unbilled';
    if (card.status === 'done' && b === 'unbilled') hoursEl.classList.add('outstanding');
    else if (b === 'invoiced') hoursEl.classList.add('invoiced');
    else if (b === 'paid')     hoursEl.classList.add('paid');
  } else {
    hoursEl.hidden = true;
  }
  // Tag chips on the card
  const row2 = el.querySelector('.card-row2');
  for (const old of row2.querySelectorAll('.tag-chip')) old.remove();
  for (const tag of (card.tags || [])) {
    const btn = document.createElement('button');
    btn.className = 'tag-chip' + (activeTags.has(tag) ? ' active' : '');
    btn.textContent = tag;
    styleTag(btn, tag);
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      toggleTagFilter(tag);
    });
    row2.appendChild(btn);
  }
  const d = depthOf(card);
  if (d === 0) delete el.dataset.indent; else el.dataset.indent = String(d);
}

function splitDue(value) {
  if (!value) return { date: '', time: '' };
  const [d, t = ''] = String(value).split('T');
  return { date: d || '', time: t.slice(0, 5) };
}
function joinDue(date, time) {
  if (!date) return null;
  return time ? `${date}T${time}` : date;
}
function formatDue(value) {
  if (!value) return '';
  const { date, time } = splitDue(value);
  const d = new Date(date + 'T00:00:00');
  if (isNaN(d)) return value;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const diff = Math.round((d - today) / 86400000);
  let dateStr;
  if      (diff === 0)  dateStr = 'today';
  else if (diff === 1)  dateStr = 'tomorrow';
  else if (diff === -1) dateStr = 'yesterday';
  else dateStr = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  if (!time) return dateStr;
  const dt = new Date(`${date}T${time}`);
  const timeStr = dt.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' })
                    .toLowerCase().replace(/\s+/g, '');
  return `${dateStr} ${timeStr}`;
}
function urgencyOf(card) {
  if (card.status === 'done')    return null;
  if (card.status === 'blocked') return 'overdue';
  if (card.due) {
    const s = dueStatus(card.due);
    if (s === 'overdue') return 'overdue';
    if (s === 'today')   return 'high';
  }
  if (card.status === 'doing')   return 'high';
  return null;
}

function dueStatus(value) {
  if (!value) return 'none';
  const { date, time } = splitDue(value);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const dayD = new Date(date + 'T00:00:00');
  if (isNaN(dayD)) return 'future';
  if (time) {
    const target = new Date(`${date}T${time}`);
    if (target < new Date()) return 'overdue';
    if (dayD.getTime() === today.getTime()) return 'today';
    return 'future';
  }
  if (dayD < today) return 'overdue';
  if (dayD.getTime() === today.getTime()) return 'today';
  return 'future';
}

function cardMatchesFilter(c) {
  if (activeTags.size === 0) return true;
  const t = c.tags || [];
  for (const want of activeTags) if (!t.includes(want)) return false;
  return true;
}

function renderAll() {
  list.innerHTML = '';
  // Walk parent→child tree so children always immediately follow their parent in DOM order.
  const byParent = new Map(); // parent_id (or null) → [cards]
  for (const c of cards.values()) {
    if (!showDone && c.status === 'done') continue;
    if (!cardMatchesFilter(c)) continue;
    const pid = c.parent_id || null;
    if (!byParent.has(pid)) byParent.set(pid, []);
    byParent.get(pid).push(c);
  }
  for (const arr of byParent.values()) arr.sort((a, b) => a.sort_order - b.sort_order);
  let rendered = 0;
  (function walk(parentId) {
    const children = byParent.get(parentId) || [];
    for (const c of children) {
      list.appendChild(renderCard(c));
      rendered++;
      walk(c.id);
    }
  })(null);
  rebuildGroups();
  applyCollapsedDefaults();
  emptyState.hidden = rendered > 0;
}

// ── Outstanding header chip + Billing panel ─────────────────
const headerOutstanding = document.getElementById('headerOutstanding');
const billingPanel      = document.getElementById('billingPanel');
const billingBody       = document.getElementById('billingBody');
const btnMenu           = document.getElementById('btnMenu');

function refreshOutstanding() {
  const t = outstandingTotal();
  if (t <= 0) { headerOutstanding.hidden = true; return; }
  headerOutstanding.hidden = false;
  headerOutstanding.textContent = fmtHours(t);
}

function openBilling() {
  billingPanel.classList.add('open');
  billingPanel.setAttribute('aria-hidden', 'false');
  renderBillingPanel();
}
function closeBilling() {
  billingPanel.classList.remove('open');
  billingPanel.setAttribute('aria-hidden', 'true');
}

function renderBillingPanel() {
  const groups = billingGroups();
  billingBody.innerHTML = '';
  if (groups.size === 0) {
    billingBody.innerHTML = '<div class="billing-empty">Nothing to bill.<br>Done cards with hours set will appear here.</div>';
    return;
  }
  // Sort groups: most outstanding hours first
  const entries = [...groups.entries()].sort((a, b) =>
    (b[1].hours.unbilled + b[1].hours.invoiced) - (a[1].hours.unbilled + a[1].hours.invoiced));
  for (const [tag, g] of entries) {
    const grp = document.createElement('div');
    grp.className = 'billing-group';

    const header = document.createElement('div');
    header.className = 'billing-group-header';
    const tagEl = document.createElement('span');
    tagEl.className = 'billing-group-tag';
    if (tag === '_untagged') {
      tagEl.textContent = '(untagged)';
      tagEl.style.color = 'var(--ink-3)';
      tagEl.style.fontStyle = 'italic';
    } else {
      tagEl.textContent = '#' + tag;
      const c = tagColor(tag);
      tagEl.style.color = c.fg;
    }
    header.appendChild(tagEl);
    const total = document.createElement('span');
    total.className = 'billing-group-total';
    total.textContent = fmtHours(g.hours.unbilled + g.hours.invoiced);
    header.appendChild(total);
    grp.appendChild(header);

    function renderItem(c, isInvoiced) {
      const it = document.createElement('div');
      it.className = 'billing-item';
      const title = document.createElement('span');
      title.className = 'billing-item-title';
      title.textContent = c.title;
      title.addEventListener('click', () => { closeBilling(); openChat(c.id); });
      it.appendChild(title);
      const hrs = document.createElement('span');
      hrs.className = 'billing-item-hours';
      hrs.textContent = fmtHours(c.hours);
      it.appendChild(hrs);
      const toggle = document.createElement('button');
      toggle.className = 'chat-billing ' + (isInvoiced ? 'invoiced' : 'unbilled');
      toggle.textContent = isInvoiced ? 'invoiced' : 'unbilled';
      toggle.addEventListener('click', () => {
        patchCard(c.id, { billing: BILLING_CYCLE[c.billing || 'unbilled'] }).catch(console.error);
      });
      it.appendChild(toggle);
      return it;
    }

    if (g.unbilled.length) {
      const label = document.createElement('div');
      label.style.cssText = 'font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);margin-top:6px;';
      label.textContent = `unbilled · ${fmtHours(g.hours.unbilled)}`;
      grp.appendChild(label);
      for (const c of g.unbilled.sort((a, b) => a.sort_order - b.sort_order)) {
        grp.appendChild(renderItem(c, false));
      }
    }
    if (g.invoiced.length) {
      const label = document.createElement('div');
      label.style.cssText = 'font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);margin-top:10px;';
      label.textContent = `invoiced · ${fmtHours(g.hours.invoiced)}`;
      grp.appendChild(label);
      for (const c of g.invoiced.sort((a, b) => a.sort_order - b.sort_order)) {
        grp.appendChild(renderItem(c, true));
      }
    }

    // Action row
    const actions = document.createElement('div');
    actions.className = 'billing-group-actions';

    if (g.unbilled.length) {
      const markAll = document.createElement('button');
      markAll.className = 'detail-btn';
      markAll.textContent = `mark ${g.unbilled.length} invoiced`;
      markAll.addEventListener('click', async () => {
        markAll.disabled = true;
        await Promise.all(g.unbilled.map(c => patchCard(c.id, { billing: 'invoiced' })));
      });
      actions.appendChild(markAll);
    }
    const copyBtn = document.createElement('button');
    copyBtn.className = 'detail-btn';
    copyBtn.textContent = 'copy invoice text';
    copyBtn.addEventListener('click', () => {
      const lines = [];
      lines.push(tag === '_untagged' ? 'Outstanding work:' : `[${tag}] outstanding work:`);
      const items = [...g.unbilled, ...g.invoiced].sort((a, b) => a.sort_order - b.sort_order);
      for (const c of items) lines.push(`- ${c.title} — ${fmtHours(c.hours)}`);
      lines.push(`Total: ${fmtHours(g.hours.unbilled + g.hours.invoiced)}`);
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const orig = copyBtn.textContent;
        copyBtn.textContent = 'copied ✓';
        setTimeout(() => { copyBtn.textContent = orig; }, 1200);
      });
    });
    actions.appendChild(copyBtn);
    grp.appendChild(actions);

    billingBody.appendChild(grp);
  }
}

headerOutstanding.addEventListener('click', openBilling);
btnMenu.addEventListener('click', openBilling);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && billingPanel.classList.contains('open')) closeBilling();
});

// ── Tag filter strip + tag mutators ─────────────────────────
const filterStrip = document.getElementById('filterStrip');

function saveActiveTags() {
  localStorage.setItem('runn:activeTags', JSON.stringify([...activeTags]));
}
function toggleTagFilter(tag) {
  if (activeTags.has(tag)) activeTags.delete(tag);
  else activeTags.add(tag);
  saveActiveTags();
  renderFilterStrip();
  renderAll();
}
function clearTagFilter() {
  activeTags.clear();
  saveActiveTags();
  renderFilterStrip();
  renderAll();
}
function renderFilterStrip() {
  filterStrip.innerHTML = '';
  if (!activeTags.size) { filterStrip.hidden = true; return; }
  filterStrip.hidden = false;
  const label = document.createElement('span');
  label.className = 'filter-strip-label';
  label.textContent = 'filter:';
  filterStrip.appendChild(label);
  for (const tag of activeTags) {
    const el = document.createElement('span');
    el.className = 'filter-tag';
    el.innerHTML = `${escapeHtml(tag)} <button title="Remove">×</button>`;
    styleTag(el, tag);
    el.querySelector('button').addEventListener('click', () => toggleTagFilter(tag));
    filterStrip.appendChild(el);
  }
  const clr = document.createElement('button');
  clr.className = 'filter-clear';
  clr.textContent = 'clear';
  clr.addEventListener('click', clearTagFilter);
  filterStrip.appendChild(clr);
}
renderFilterStrip();

async function addTagToOpen(raw) {

  const card = cards.get(openCardId);
  if (!card) return;
  const tag = raw.trim().toLowerCase().replace(/^#+/, '');
  if (!tag) return;
  const existing = Array.isArray(card.tags) ? card.tags : [];
  if (existing.includes(tag)) return;
  try { await patchCard(openCardId, { tags: [...existing, tag] }); }
  catch (err) { console.error('add tag failed', err); }
}

async function removeTagFromOpen(tag) {
  if (!openCardId) return;
  const card = cards.get(openCardId);
  if (!card) return;
  const next = (card.tags || []).filter(t => t !== tag);
  try { await patchCard(openCardId, { tags: next }); }
  catch (err) { console.error('remove tag failed', err); }
}

// ── Group / chevron / collapse (lifted from scaffold) ────────
const allCardEls = () => [...document.querySelectorAll('.card')];
const getIndent = c => parseInt(c.dataset.indent || 0);
const setIndent = (c, n) => {
  n = Math.max(0, n);
  if (n === 0) delete c.dataset.indent; else c.dataset.indent = String(n);
};

function descendants(card) {
  const els = allCardEls();
  const base = getIndent(card);
  const idx  = els.indexOf(card);
  const out  = [];
  for (let i = idx + 1; i < els.length; i++) {
    if (getIndent(els[i]) > base) out.push(els[i]); else break;
  }
  return out;
}

function rebuildGroups() {
  document.querySelectorAll('.group').forEach(g => {
    [...g.children].forEach(c => list.insertBefore(c, g));
    g.remove();
  });
  const els = [...list.children].filter(el => el.classList.contains('card'));
  els.forEach(card => {
    if (getIndent(card) !== 0) return;
    const desc = descendants(card);
    if (!desc.length) return;
    const g = document.createElement('div');
    g.className = 'group';
    list.insertBefore(g, card);
    g.appendChild(card);
    desc.forEach(c => g.appendChild(c));
  });
  markParents();
}

function markParents() {
  const els = allCardEls();
  els.forEach((c, i) => {
    const next = els[i + 1];
    if (next && getIndent(next) > getIndent(c)) c.dataset.hasChildren = '1';
    else delete c.dataset.hasChildren;
  });
}

list.addEventListener('click', e => {
  if (e.target.closest('.card-controls') || e.target.closest('.chip')) return;
  const cardEl = e.target.closest('.card');

function toggleCollapse(e, chevron) {
  e.stopPropagation();
  const card = chevron.closest('.card');
  const id = card.dataset.cardId;

  if (collapsed) expandedCardIds.delete(id);
  else expandedCardIds.add(id);
  descendants(card).forEach(c => c.style.display = collapsed ? 'none' : '');
}

function inlineAddStep(e, btn) {
  e.stopPropagation();
  const parentCard = btn.closest('.card');
  const parentId   = parentCard.dataset.cardId;
  // If an input is already open for this parent, focus it instead
  const existing = document.querySelector(`.inline-step-input[data-parent="${CSS.escape(parentId)}"]`);
  if (existing) { existing.querySelector('input').focus(); return; }

  const row = document.createElement('div');
  row.className = 'inline-step-input';
  row.dataset.parent = parentId;
  const parentIndent = parseInt(parentCard.dataset.indent || 0);
  if (parentIndent + 1 > 0) row.dataset.indent = String(parentIndent + 1);
  row.innerHTML = `<input type="text" placeholder="add step under this card…" autocomplete="off">`;
  parentCard.after(row);

  const input = row.querySelector('input');
  input.focus();

  let dismissed = false;
  const dismiss = () => { if (!dismissed) { dismissed = true; row.remove(); } };
  const submit = async () => {
    if (dismissed) return;
    const val = input.value.trim();
    if (!val) { dismiss(); return; }
    input.value = '';
    try {
      await api('POST', '/cards', { title: val, parent_id: parentId, sort_order: Date.now() });
      // WS card.added → renderAll() will wipe this input anyway; that's fine.
      // But focus may have been lost mid-render; keep an option to re-open via the + button.
    } catch (err) {
      console.error('add step failed', err);
      input.value = val;
    }
  };
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter')  { ev.preventDefault(); submit(); }
    if (ev.key === 'Escape') { ev.preventDefault(); dismiss(); }
  });
  // Blur dismisses if empty, otherwise submits (gives mobile users a chance after tap-away)
  input.addEventListener('blur', () => {
    setTimeout(() => { if (input.value.trim()) submit(); else dismiss(); }, 120);
  });
}

// ── Drag-to-reorder + drag-to-indent (lifted from scaffold; now persists) ─
let dragged, dragGroup = [], dragMoved = false;

function getDragGroup(card) {
  const els = allCardEls();
  const base = getIndent(card);
  const idx  = els.indexOf(card);
  const grp  = [card];
  for (let i = idx + 1; i < els.length; i++) {
    if (getIndent(els[i]) > base) grp.push(els[i]); else break;
  }
  return grp;
}

function clearDropClasses() {
  document.querySelectorAll('.card').forEach(c =>
    c.classList.remove('drop-before', 'drop-after', 'drop-nest'));
}

function dropZone(e, rect) {
  const y = e.clientY - rect.top;
  if (y < 24)                return 'before';
  if (y > rect.height - 24)  return 'after';
  return 'nest';
}

list.addEventListener('dragstart', e => {
  // Drag only fires from the handle (it's the only draggable=true element).
  // Resolve the actual card by climbing to .card.
  dragged = e.target.closest('.card');
  if (!dragged) return;
  // Use the whole card as the drag image so the floating preview matches what you grabbed.
  if (e.dataTransfer && e.dataTransfer.setDragImage) {
    const r = dragged.getBoundingClientRect();
    e.dataTransfer.setDragImage(dragged, e.clientX - r.left, e.clientY - r.top);
    e.dataTransfer.effectAllowed = 'move';
  }
  dragGroup = getDragGroup(dragged);
  dragMoved = false;
  setTimeout(() => dragGroup.forEach(c => c.classList.add('dragging')), 0);
});

list.addEventListener('dragover', e => {
  if (!dragged) return;
  e.preventDefault();
  const target = e.target.closest('.card');
  if (!target || dragGroup.includes(target)) return;
  clearDropClasses();
  target.classList.add('drop-' + dropZone(e, target.getBoundingClientRect()));
});

list.addEventListener('dragleave', e => {
  if (!e.target.closest('.card')) clearDropClasses();
});

list.addEventListener('drop', e => {
  e.preventDefault();
  if (!dragged) return;
  const target = e.target.closest('.card');
  if (!target || dragGroup.includes(target)) return;
  const zone  = dropZone(e, target.getBoundingClientRect());
  const delta = (zone === 'nest' ? getIndent(target) + 1 : getIndent(target)) - getIndent(dragged);
  clearDropClasses();
  dragGroup.forEach(c => setIndent(c, getIndent(c) + delta));
  dragGroup.forEach(c => list.appendChild(c));
  if (zone === 'before') dragGroup.forEach(c => target.before(c));
  else { let ref = target; dragGroup.forEach(c => { ref.after(c); ref = c; }); }
  dragMoved = true;
});

list.addEventListener('dragend', async () => {
  dragGroup.forEach(c => c.classList.remove('dragging'));
  clearDropClasses();
  rebuildGroups();
  const moved = dragMoved;
  const draggedRef = dragged;
  dragged = null; dragGroup = []; dragMoved = false;
  if (moved && draggedRef) {
    try { await persistDragged(draggedRef); }
    catch (err) { console.error('drag persist failed', err); }
  }
});

async function persistDragged(cardEl) {
  const cardId = cardEl.dataset.cardId;
  const newIndent = getIndent(cardEl);

  // Determine new parent_id: walk back in flat DOM order, find first card at indent N-1.
  const allEls = allCardEls();
  const myIdx  = allEls.indexOf(cardEl);
  let newParentId = null;
  if (newIndent > 0) {
    for (let i = myIdx - 1; i >= 0; i--) {
      if (getIndent(allEls[i]) === newIndent - 1) {
        newParentId = allEls[i].dataset.cardId;
        break;
      }
    }
  }

  // Determine new sort_order: midpoint of immediate same-indent same-parent neighbours,
  // skipping over my descendants (which sit between me and the next sibling).
  let prevCard = null, nextCard = null;
  for (let i = myIdx - 1; i >= 0; i--) {
    const ind = getIndent(allEls[i]);
    if (ind < newIndent) break;            // exited the parent group
    if (ind === newIndent) { prevCard = cards.get(allEls[i].dataset.cardId); break; }
  }
  for (let i = myIdx + 1; i < allEls.length; i++) {
    const ind = getIndent(allEls[i]);
    if (ind < newIndent) break;
    if (ind === newIndent) { nextCard = cards.get(allEls[i].dataset.cardId); break; }
  }
  let newSortOrder;
  if (prevCard && nextCard)      newSortOrder = (prevCard.sort_order + nextCard.sort_order) / 2;
  else if (prevCard)             newSortOrder = prevCard.sort_order + 1024;
  else if (nextCard)             newSortOrder = nextCard.sort_order - 1024;
  else                           newSortOrder = Date.now();

  await patchCard(cardId, { parent_id: newParentId, sort_order: newSortOrder });
}

function renderSteps() {
  chatSteps.innerHTML = '';

  const children = [...cards.values()]
    .filter(c => c.parent_id === openCardId)
    .sort((a, b) => a.sort_order - b.sort_order);
  for (const step of children) {
    const el = document.createElement('div');
    el.className = 'chat-step';
    if (step.status === 'done') el.classList.add('done');
    el.dataset.stepId = step.id;
    el.innerHTML = `
      <button class="chip chip-${step.status}">${step.status}</button>
      <div class="chat-step-title"></div>
      <span class="badge-ext" hidden>ext</span>
    `;
    el.querySelector('.chat-step-title').textContent = step.title;
    el.querySelector('.badge-ext').hidden = step.origin !== 'external';
    el.querySelector('.chip').addEventListener('click', (ev) => {
      ev.stopPropagation();
      const next = STATUS_CYCLE[step.status] || 'todo';
      patchCard(step.id, { status: next }).catch(console.error);
    });
    el.addEventListener('click', () => openChat(step.id));
    chatSteps.appendChild(el);
  }
}

function applyPanel(card) {
  if (!card) return;
  if (document.activeElement !== chatTitle) chatTitle.value = card.title;
  chatChip.className = `chip chip-${card.status}`;
  chatChip.textContent = card.status;
  chatBadgeExt.hidden = card.origin !== 'external';
  if (document.activeElement !== chatNotes) chatNotes.value = card.notes_md || '';
  const dueParts = splitDue(card.due);
  if (document.activeElement !== chatDue) chatDue.value = dueParts.date;
  if (document.activeElement !== chatDueTime) chatDueTime.value = dueParts.time;
  chatDueTime.disabled = !dueParts.date;
  chatDueClear.hidden = !card.due;
  // Hours + billing
  if (document.activeElement !== chatHours) {
    chatHours.value = (typeof card.hours === 'number') ? String(card.hours) : '';
  }
  const billing = card.billing || 'unbilled';
  chatBilling.className = `chat-billing ${billing}`;
  chatBilling.textContent = billing;
  renderPanelTags(card);
  const meta = [];
  if (card.session_id) meta.push(`session ${card.session_id.slice(0, 8)}`);
  if (card.location && card.location.cwd) meta.push(card.location.cwd);
  chatMetaText.textContent = meta.join(' · ');
  // Toggle which body section is active
  const hasSession = !!card.session_id;
  chatAiifyZone.hidden    = hasSession;
  chatTranscript.hidden   = !hasSession;
  chatFooter.hidden       = !hasSession;
  chatEmpty.hidden        = !hasSession; // only meaningful for session cards before turns load
}

async function openChat(cardId) {
  const wasOpen = !!openCardId;
  openCardId = cardId;
  const card = cards.get(cardId);
  applyPanel(card);
  renderSteps();
  chatTranscript.innerHTML = '';
  chatPanel.classList.add('open');
  chatBackdrop.classList.add('open');
  chatPanel.setAttribute('aria-hidden', 'false');
  // Reflect "active" on the card on the board
  for (const el of document.querySelectorAll('.card.active')) el.classList.remove('active');
  const cardEl = list.querySelector(`[data-card-id="${CSS.escape(cardId)}"]`);
  if (cardEl) cardEl.classList.add('active');
  // Push a history entry so the Android back button (and browser back) closes the sidebar.
  if (!wasOpen && history.state?.runnSidebar !== true) {
    history.pushState({ runnSidebar: true }, '');
  }
  if (card && card.session_id) {
    try {
      const t = await api('GET', `/cards/${cardId}/transcript`);
      if (openCardId !== cardId) return;
      renderTranscript(t.turns);
    } catch (err) {
      chatTranscript.innerHTML = `<div class="chat-empty">Failed to load transcript: ${err.message}</div>`;
    }
  }
}

function dismissPanel() {
  openCardId = null;
  chatPanel.classList.remove('open');
  chatBackdrop.classList.remove('open');
  chatPanel.setAttribute('aria-hidden', 'true');
  for (const el of document.querySelectorAll('.card.active')) el.classList.remove('active');
}

function closeChat() {
  const hadHistoryEntry = history.state?.runnSidebar === true;
  dismissPanel();
  if (hadHistoryEntry) history.back();
}

// Sidebar tag editor
const chatTags         = document.getElementById('chatTags');
const chatTagsInput    = document.getElementById('chatTagsInput');
const chatTagsDropdown = document.getElementById('chatTagsDropdown');

function allKnownTags() {
  const set = new Set();
  for (const c of cards.values()) for (const t of (c.tags || [])) set.add(t);
  return [...set].sort();
}

function renderTagSuggestions() {
  if (!openCardId) { chatTagsDropdown.hidden = true; return; }
  const card = cards.get(openCardId);
  const used = new Set(card ? (card.tags || []) : []);
  const q = chatTagsInput.value.trim().toLowerCase().replace(/^#+/, '');
  const candidates = allKnownTags().filter(t => !used.has(t));
  const filtered = q ? candidates.filter(t => t.includes(q)) : candidates;
  chatTagsDropdown.innerHTML = '';
  if (!filtered.length) { chatTagsDropdown.hidden = true; return; }
  for (const t of filtered) {
    const btn = document.createElement('button');
    btn.className = 'chat-tags-suggestion';
    btn.textContent = t;
    styleTag(btn, t);
    // mousedown fires BEFORE input blur — lets us add before the dropdown hides
    btn.addEventListener('mousedown', (ev) => {
      ev.preventDefault();
      addTagToOpen(t);
      chatTagsInput.value = '';
      chatTagsInput.focus();
      renderTagSuggestions();
    });
    chatTagsDropdown.appendChild(btn);
  }
  chatTagsDropdown.hidden = false;
}

function renderPanelTags(card) {
  for (const p of chatTags.querySelectorAll('.chat-tag-pill')) p.remove();
  for (const tag of (card.tags || [])) {
    const pill = document.createElement('span');
    pill.className = 'chat-tag-pill';
    pill.innerHTML = `${escapeHtml(tag)}<button title="Remove">×</button>`;
    styleTag(pill, tag);
    pill.querySelector('button').addEventListener('click', () => removeTagFromOpen(tag));
    chatTags.insertBefore(pill, chatTagsInput);
  }
  // If the dropdown is open, refresh it (the "used" set changed)
  if (!chatTagsDropdown.hidden) renderTagSuggestions();
}

chatTagsInput.addEventListener('focus', renderTagSuggestions);
chatTagsInput.addEventListener('input', renderTagSuggestions);
chatTagsInput.addEventListener('blur', () => {
  // delay so a tap on a suggestion (mousedown) can fire before we hide
  setTimeout(() => { chatTagsDropdown.hidden = true; }, 120);
});

chatTagsInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    addTagToOpen(chatTagsInput.value);
    chatTagsInput.value = '';
    renderTagSuggestions();
  } else if (e.key === 'Backspace' && !chatTagsInput.value && openCardId) {
    const card = cards.get(openCardId);
    const tags = (card && card.tags) || [];
    if (tags.length) removeTagFromOpen(tags[tags.length - 1]);
  } else if (e.key === ',' || e.key === ' ') {
    e.preventDefault();
    addTagToOpen(chatTagsInput.value);
    chatTagsInput.value = '';
    renderTagSuggestions();
  } else if (e.key === 'Escape') {
    chatTagsDropdown.hidden = true;
  }
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

function renderTurn(t) {
  if (t.kind === 'user') {
    const div = document.createElement('div');
    div.className = 'turn';
    div.innerHTML = `<div class="turn-user">${escapeHtml(t.text)}</div>`;
    return div;
  }
  if (t.kind === 'system') {
    const div = document.createElement('div');
    div.className = 'turn';
    div.innerHTML = `<div class="turn-system">${escapeHtml(t.text)}</div>`;
    return div;
  }
  // assistant
  const div = document.createElement('div');
  div.className = 'turn';
  div.innerHTML = `<div class="turn-assistant"><div class="turn-text">${escapeHtml(t.text)}</div></div>`;
  return div;
}

  const chatBody = document.getElementById('chatBody');
  const nearBottom = chatBody.scrollHeight - chatBody.scrollTop - chatBody.clientHeight < 80;
  chatTranscript.innerHTML = '';
  chatEmpty.hidden = turns.length > 0;
  for (const t of turns) chatTranscript.appendChild(renderTurn(t));
  if (nearBottom) chatBody.scrollTop = chatBody.scrollHeight;
}
