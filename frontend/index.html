      if (id === DRAFT) {
        const job = await postJson('/jobs', { client_id: state.draftClientId });
        state.jobs.set(job.id, job);
        id = job.id; state.currentId = job.id;
        state.draftClientId = null;
      }
      const role = state.noteMode ? 'note' : 'user';
      const body = { role, text };
      if (sendAttachments.length) body.attachments = sendAttachments;
      const updated = await postJson(`/jobs/${id}/turn`, body);
      if (updated && updated.id) state.jobs.set(updated.id, updated);
      renderList(); renderChat();
      clockSync();   // reconcile only — default-paused, so sending never auto-starts the clock

    } catch (e) {
      console.error('send failed', e);
      msgInput.value = text;          // restore so nothing is lost
      // Re-stage the files (without object-URL previews — the blobs are gone) so
      // the user can retry rather than silently losing them.
      for (const a of sendAttachments) state.pendingAttachments.push({ ...a, url: null });
      renderPendingAttachments();
    } finally {
      state.sending = false;
      sendBtn.disabled = msgInput.disabled;
      if (!isMobile()) msgInput.focus();   // keep the keyboard down so the reply is readable on mobile
    }
  }
  function autoGrow() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
  }
  // The handover: hand the private job over to AI. The server builds the first
  // prompt from everything written so far and starts Claude. Hidden afterward.
  async function inviteAi() {
    const id = state.currentId;
    if (!id || id === DRAFT || state.inviting) return;
    state.inviting = true; inviteAiBtn.disabled = true;
    try {
      const updated = await postJson(`/jobs/${id}/invite-ai`, {});
      if (updated && updated.id) state.jobs.set(updated.id, updated);
      renderList(); renderChat();
    } catch (e) {
      console.error('invite failed', e);
      toast(`Couldn't invite AI: ${e.message || e}`, 'err');
    } finally {
      state.inviting = false; inviteAiBtn.disabled = false;
    }
  }

  // ── Permission prompts (the gated AI model) ──────────────
  // Claude routes every Write/Edit/Bash through the worker; a pending request is
  // broadcast over /ws and parked here until the human clicks Allow/Deny.
  const chatPermissions = $('chatPermissions');
  const pendingPerms = new Map(); // request_id -> { request_id, job_id, tool_name, input }
  const escapeHtml = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  const isRawSshTool = (t) => /(?:^|__)raw_ssh_exec$/.test(String(t || ''));
  const isApplyPlanTool = (t) => /(?:^|__)apply_plan$/.test(String(t || ''));

  function renderPermissions() {
    if (!chatPermissions) return;
    chatPermissions.innerHTML = '';
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    for (const p of pendingPerms.values()) {
      if (p.job_id && p.job_id !== id) continue; // belongs to another job
      chatPermissions.appendChild(buildPermissionEl(p));
    }
  }

  function buildPermissionEl(p) {
    const el = document.createElement('div');
    const inp = p.input || {};
    const dangerous = isRawSshTool(p.tool_name);
    const applyPlan = isApplyPlanTool(p.tool_name);
    el.className = 'chat-permission' + (dangerous ? ' chat-permission-dangerous' : '');
    el.dataset.requestId = p.request_id;
    const detail = inp.file_path || inp.path || inp.command || '';
    const detailHtml = detail ? `<div class="perm-detail">${escapeHtml(String(detail))}</div>` : '';
    const why = dangerous && inp.justification
      ? `<div class="perm-detail"><em>${escapeHtml(String(inp.justification))}</em></div>` : '';
    const icon = dangerous ? '⚠️' : '🔐';
    const title = dangerous
      ? `Claude wants to run <code>${escapeHtml(p.tool_name)}</code> — RAW SSH ESCAPE HATCH`
      : `Claude wants to use <code>${escapeHtml(p.tool_name)}</code>`;
    const warningHtml = dangerous
      ? `<div class="perm-warning">Bypasses the curated client-ops boundary. Read it carefully — this approval is single-use.</div>` : '';
    // raw_ssh_exec and apply_plan are never blanket-approvable (the worker
    // independently refuses to persist a rule); drop the button to match.
    const alwaysBtn = (dangerous || applyPlan) ? ''
      : `<button class="perm-btn perm-allow-always">Always allow</button>`;
    el.innerHTML = `
      <div class="perm-head"><span class="perm-icon">${icon}</span><span class="perm-title">${title}</span></div>
      ${warningHtml}${detailHtml}${why}
      <div class="perm-actions">
        <button class="perm-btn perm-deny">Deny</button>
        ${alwaysBtn}
        <button class="perm-btn perm-allow primary">Allow</button>
      </div>`;
    el.querySelector('.perm-allow').addEventListener('click', () => decidePermission(p.request_id, 'allow', false));
    const al = el.querySelector('.perm-allow-always');
    if (al) al.addEventListener('click', () => decidePermission(p.request_id, 'allow', true));
    el.querySelector('.perm-deny').addEventListener('click', () => decidePermission(p.request_id, 'deny', false));
    return el;
  }

  async function decidePermission(requestId, decision, remember) {
    const el = chatPermissions.querySelector(`[data-request-id="${CSS.escape(requestId)}"]`);
    if (el) for (const b of el.querySelectorAll('button')) b.disabled = true;
    try {
      await postJson('/permissions/decide', { request_id: requestId, decision, remember });
    } catch (err) {
      // The worker no longer has this request (it restarted, or Claude's child
      // died) — the card is stale. Drop it locally and re-sync from the
      // authoritative pending list so it disappears instead of sticking with
      // dead buttons.
      console.error('permission decide failed', err);
      pendingPerms.delete(requestId);
      renderPermissions();
      load();
    }
  }

  // Editing a private (pre-invite) turn. state.editingTurn is scoped to {id, idx}
  // (distinct from state.editing, which is the invoice draft) so it only opens an
  // editor for that one turn of that one job, and clears itself when you navigate
  // away (the match fails on a different job).
  // A private note rendered inline in the thread, with its margin actions.
  function buildNoteTurn(idx, text) {
    const wrap = document.createElement('div');
    wrap.className = 'turn note';
    const card = document.createElement('div');
    card.className = 'note-card';
    const body = document.createElement('div');
    body.className = 'note-body';
    body.textContent = text;        // plaintext — notes aren't markdown-rendered
    card.appendChild(body);
    const actions = document.createElement('div');
    actions.className = 'note-actions';
    const promote = document.createElement('button');
    promote.type = 'button';
    promote.textContent = '↑ Send to Claude';
    promote.title = 'Promote this private note into a message to Claude';
    promote.addEventListener('click', () => promoteNote(idx));
    const del = document.createElement('button');
    del.type = 'button';
    del.textContent = '✕';
    del.title = 'Delete note';
    del.addEventListener('click', () => deleteNote(idx));
    actions.appendChild(promote);
    actions.appendChild(del);
    card.appendChild(actions);
    wrap.appendChild(card);
    return wrap;
  }
  async function promoteNote(idx) {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    try {
      const updated = await postJson(`/jobs/${id}/turns/${idx}/promote`, {});
      if (updated && updated.id) state.jobs.set(updated.id, updated);
      renderList(); renderChat(); clockSync();
    } catch (e) { console.error('promote note failed', e); }
  }
  async function deleteNote(idx) {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    if (!confirm('Delete this private note? This can’t be undone.')) return;
    try {
      const updated = await delJson(`/jobs/${id}/turns/${idx}`);
      if (updated && updated.id) state.jobs.set(updated.id, updated);
      renderList(); renderChat();
    } catch (e) { console.error('delete note failed', e); }
  }
  // Demote a pre-invite user turn into a private note so it won't be sent to
  // Claude on invite. Reversible via the note's "↑ Send to Claude" (promote).
  async function demoteTurn(idx) {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    state.editingTurn = null;
    try {
      const updated = await postJson(`/jobs/${id}/turns/${idx}/demote`, {});
      if (updated && updated.id) state.jobs.set(updated.id, updated);
    } catch (e) { console.error('demote turn failed', e); }
    renderList(); renderChat();
  }
  function beginEditTurn(idx) {
    state.editingTurn = { id: state.currentId, idx };
    renderChat();
  }
  function cancelEditTurn() {
    state.editingTurn = null;
    renderChat();
  }
  async function saveEditTurn(idx, text) {
    const id = state.currentId;
    const t = text.trim();
    state.editingTurn = null;
    if (!t) { renderChat(); return; }          // empty = no change, just close
    try {
      const updated = await putJson(`/jobs/${id}/turns/${idx}`, { text: t });
      state.jobs.set(updated.id, updated);
    } catch (e) {
      console.error('edit failed', e);          // 409 = locked (AI already invited)
    }
    renderList(); renderChat();
  }
  function buildTurnEditor(wrap, idx, text) {
    const ta = document.createElement('textarea');
    ta.className = 'turn-edit-input';
    ta.value = text;
    ta.rows = 1;
    const grow = () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 200) + 'px'; };
    ta.addEventListener('input', grow);
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { e.preventDefault(); cancelEditTurn(); }
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); saveEditTurn(idx, ta.value); }
    });
    const actions = document.createElement('div');
    actions.className = 'turn-edit-actions';
    // Demote → note: pulls this turn out of the handover so it won't hit Claude
    // on invite. Reversible via the note card's "↑ Send to Claude".
    const note = document.createElement('button');
    note.type = 'button'; note.className = 'te-note'; note.textContent = '📝 Note';
    note.title = 'Make this a private note (not sent to Claude)';
    note.addEventListener('click', () => demoteTurn(idx));
    const cancel = document.createElement('button');
    cancel.type = 'button'; cancel.className = 'te-cancel'; cancel.textContent = 'Cancel';
    cancel.addEventListener('click', cancelEditTurn);
    const save = document.createElement('button');
    save.type = 'button'; save.className = 'te-save'; save.textContent = 'Save';
    save.addEventListener('click', () => saveEditTurn(idx, ta.value));
    actions.appendChild(note); actions.appendChild(cancel); actions.appendChild(save);
    wrap.appendChild(ta); wrap.appendChild(actions);
    setTimeout(() => { grow(); ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }, 0);
  }

  // ── Wiring ──────────────────────────────────────
  $('backBtn').addEventListener('click', () => closeChat());
  $('billingBtn').addEventListener('click', toggleInvoices);
  // The doc-pane chevron (mobile only) returns to the invoice list.
  $('billingBack').addEventListener('click', closeBillingDoc);
  // Device/browser back button: pop back toward the jobs list instead of leaving.
  window.addEventListener('popstate', () => {
    if (suppressPop) { suppressPop = false; return; }
    const preview = $('invPreview');
    if (preview && preview.classList.contains('open')) { closePreview({ fromPop: true }); return; }
    if (document.body.classList.contains('show-chat')) closeChat({ fromPop: true });
    else if (state.invoicesPane && state.billingSel) closeBillingDoc({ fromPop: true });
    else if (state.invoicesPane) exitInvoices({ fromPop: true });
  });
  $('newJobBtn').addEventListener('click', startNewJob);
  $('newJobPicker').addEventListener('change', (e) => {
    const v = e.target.value;
    if (!v) return;
    beginDraft(v === '__personal__' ? null : v);
  });
  // Logo = hard reset: drop the service worker + its caches, then reload, so a
  // fresh deploy is never masked by a stale cached copy.
  async function hardReset() {
    try {
      if (window.caches) {
        const keys = await caches.keys();
        await Promise.all(keys.map((k) => caches.delete(k)));
      }
      if (navigator.serviceWorker) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map((r) => r.unregister()));
      }
    } catch {}            // best effort — reload regardless
    location.reload();
  }
  $('logoReset').addEventListener('click', hardReset);
  $('chipMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item || !chipMenuJobId) return;
    const id = chipMenuJobId;
    const next = item.dataset.status;
    closeChipMenu();
    setJobStatus(id, next).catch((e) => console.error('status change failed', e));
  });
  $('chatStatus').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    ev.stopPropagation();
    const j = state.jobs.get(state.currentId);
    openChipMenu($('chatStatus'), state.currentId, j ? (j.status || 'open') : 'open');
  });
  $('chatDoneBtn').addEventListener('click', (ev) => {
    ev.stopPropagation();
    markCurrentJobDone();
  });
  $('chatDueBtn').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    ev.stopPropagation();
    const j = state.jobs.get(state.currentId);
    const input = $('chatDueInput');
    input.value = (j && j.due_at) || '';
    try { input.showPicker(); }
    catch { input.focus(); input.click(); }
  });
  $('chatDueInput').addEventListener('change', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    setJobDue(state.currentId, ev.target.value || null)
      .catch((e) => console.error('due change failed', e));
  });
  $('chatDueToday').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    ev.stopPropagation();
    setJobDue(state.currentId, today()).catch((e) => console.error('due today failed', e));
  });
  $('chatDueClear').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    ev.stopPropagation();
    setJobDue(state.currentId, null).catch((e) => console.error('due clear failed', e));
  });
  // Editable hours: commit on blur/change (Enter blurs). Ignored while running —
  // the input is readOnly then, but guard anyway. Re-paints on bad input.
  $('chatHoursInput').addEventListener('change', () => {
    const id = timer.jobId;
    if (!id) return;
    const j = state.jobs.get(id);
    if (jobRunning(j)) { renderTimerDisplay(); return; }
    const v = parseFloat($('chatHoursInput').value);
    if (!isFinite(v) || v < 0) { renderTimerDisplay(); return; }
    setJobHours(id, v).catch((e) => console.error('hours edit failed', e));
  });
  $('chatHoursInput').addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); $('chatHoursInput').blur(); }
  });
  // Editable $ amount: commit on blur/change (Enter blurs). Like hours, ignored
  // while the clock runs (the input is readOnly then; guard anyway). Empty clears
  // the override; a number sets a manual amount. Never touches the clock.
  $('chatAmountInput').addEventListener('change', () => {
    const id = timer.jobId;
    if (!id) return;
    const j = state.jobs.get(id);
    if (jobRunning(j)) { renderTimerDisplay(); return; }
    setJobAmount(id, $('chatAmountInput').value).catch((e) => console.error('amount edit failed', e));
  });
  $('chatAmountInput').addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); $('chatAmountInput').blur(); }
  });
  // Play/pause the work clock. Default paused; this is the only manual control.
  $('clockBtn').addEventListener('click', (ev) => { ev.stopPropagation(); clockToggle(); });
  // Click (or focus + Enter) the chat-header title to rename the job inline.
  $('chatTitle').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT || state.picking) return;
    ev.stopPropagation();
    beginRenameTitle();
  });
  $('chatTitle').addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); beginRenameTitle(); }
  });
  $('chatTitleInput').addEventListener('keydown', (ev) => {
    ev.stopPropagation();   // keep typing out of global shortcuts
    if (ev.key === 'Enter') { ev.preventDefault(); commitRenameTitle(); }
    else if (ev.key === 'Escape') { ev.preventDefault(); cancelRenameTitle(); }
  });
  // Click-away commits too. (Enter already committed above; the guard in
  // commitRenameTitle makes the resulting blur a no-op.)
  $('chatTitleInput').addEventListener('blur', () => {
    if (titleEditCancelled) { titleEditCancelled = false; return; }
    commitRenameTitle();
  });
  $('jobMenuBtn').addEventListener('click', (ev) => {
    ev.stopPropagation();
    if ($('jobMenu').hidden) openJobMenu($('jobMenuBtn')); else closeJobMenu();
  });
  $('chatClient').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    ev.stopPropagation();
    const j = state.jobs.get(state.currentId);
    openClientMenu($('chatClient'), state.currentId, j ? (j.client_id || null) : null);
  });
  $('clientMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item || !clientMenuJobId) return;
    const id = clientMenuJobId;
    const next = item.dataset.client || null;
    closeClientMenu();
    setJobClient(id, next).catch((e) => console.error('client change failed', e));
  });
  composerMoreBtn.addEventListener('click', (ev) => {
    ev.stopPropagation();
    if ($('composerMenu').hidden) openComposerMenu(composerMoreBtn); else closeComposerMenu();
  });
  $('composerMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item) return;
    closeComposerMenu();
    if (item.dataset.action === 'attach') { if (!attachBtn.disabled) attachInput.click(); }
    else if (item.dataset.action === 'note') { setNoteMode(!state.noteMode); }
  });
  $('jobMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item) return;
    const action = item.dataset.action;
    closeJobMenu();
    const run = action === 'archive' ? archiveCurrentJob() : deleteCurrentJob();
    run.catch((e) => { console.error(action + ' failed', e); alert(action + ' failed: ' + e.message); });
  });
  document.addEventListener('click', (ev) => {
    const cm = $('chipMenu');
    if (!cm.hidden && !cm.contains(ev.target)) closeChipMenu();
    const jm = $('jobMenu');
    if (!jm.hidden && !jm.contains(ev.target)) closeJobMenu();
    const com = $('composerMenu');
    if (!com.hidden && !com.contains(ev.target)) closeComposerMenu();
    if (palOpen() && !cmdPalette.contains(ev.target) && ev.target !== msgInput) closePalette();
    const clm = $('clientMenu');
    if (!clm.hidden && !clm.contains(ev.target)) closeClientMenu();
    const cfm = $('clientFilterMenu');
    if (!cfm.hidden && !cfm.contains(ev.target) && ev.target !== $('clientFilterChip')) closeClientFilterMenu();
    const dfm = $('dueFilterMenu');
    if (!dfm.hidden && !dfm.contains(ev.target) && ev.target !== $('dueFilterChip')) closeDueFilterMenu();
    const sfm = $('statusFilterMenu');
    if (!sfm.hidden && !sfm.contains(ev.target) && ev.target !== $('statusFilterChip')) closeStatusFilterMenu();
  });
  document.addEventListener('keydown', (ev) => {
    if (ev.key !== 'Escape') return;
    const preview = $('invPreview');
    if (preview && preview.classList.contains('open')) { ev.stopPropagation(); return closePreview(); }
    if (!$('chipMenu').hidden) { ev.stopPropagation(); closeChipMenu(); }
    if (!$('jobMenu').hidden) { ev.stopPropagation(); closeJobMenu(); }
    if (!$('composerMenu').hidden) { ev.stopPropagation(); closeComposerMenu(); }
    if (!$('clientMenu').hidden) { ev.stopPropagation(); closeClientMenu(); }
    if (!$('clientFilterMenu').hidden) { ev.stopPropagation(); closeClientFilterMenu(); }
    if (!$('dueFilterMenu').hidden) { ev.stopPropagation(); closeDueFilterMenu(); }
    if (!$('statusFilterMenu').hidden) { ev.stopPropagation(); closeStatusFilterMenu(); }
  });
  window.addEventListener('resize', scalePreview);
  $('clientFilterChip').addEventListener('click', (ev) => {
    ev.stopPropagation();
    if ($('clientFilterMenu').hidden) openClientFilterMenu($('clientFilterChip')); else closeClientFilterMenu();
  });
  $('clientFilterMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item) return;
    state.filterClient = item.dataset.client;
    state.filterProject = item.dataset.project || '';   // a project row narrows one level deeper
    closeClientFilterMenu();
    renderFilterOptions(); renderList();
  });
  $('dueFilterChip').addEventListener('click', (ev) => {
    ev.stopPropagation();
    if ($('dueFilterMenu').hidden) openDueFilterMenu($('dueFilterChip')); else closeDueFilterMenu();
  });
  $('dueFilterMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item) return;
    state.dueFilter = item.dataset.dueFilter;
    closeDueFilterMenu();
    renderFilterOptions(); renderList();
  });
  $('statusFilterChip').addEventListener('click', (ev) => {
    ev.stopPropagation();
    if ($('statusFilterMenu').hidden) openStatusFilterMenu($('statusFilterChip')); else closeStatusFilterMenu();
  });
  $('statusFilterMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item) return;
    state.statusFilter = item.dataset.statusFilter;
    closeStatusFilterMenu();
    renderFilterOptions(); renderList();
  });
  $('composer').addEventListener('submit', (e) => { e.preventDefault(); sendCurrent(); });
  inviteAiBtn.addEventListener('click', inviteAi);
  noteToggle.addEventListener('click', () => { setNoteMode(!state.noteMode); if (!isMobile()) msgInput.focus(); });
  msgInput.addEventListener('input', () => { autoGrow(); syncPalette(); });
  msgInput.addEventListener('keydown', (e) => {
    // Command palette steals the navigation keys while it's open.
    if (palOpen()) {
      if (e.key === 'ArrowDown') { e.preventDefault(); return movePalette(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); return movePalette(-1); }
      if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); return closePalette(); }
      if ((e.key === 'Enter' && !e.shiftKey && !e.isComposing) || e.key === 'Tab') {
        if (palIdx >= 0 && palItems[palIdx]) { e.preventDefault(); return acceptPalette(palItems[palIdx]); }
      }
    }
    // On mobile, Enter is a newline — never a send (the Send button submits).
    // Desktop keeps Enter-to-send (Shift+Enter for a newline).
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && !isMobile()) { e.preventDefault(); sendCurrent(); }
  });
  msgInput.addEventListener('blur', () => { if (palOpen()) setTimeout(closePalette, 120); });
  // Attachments: picker, clipboard paste, and drag-drop onto the transcript.
  attachBtn.addEventListener('click', () => { if (!attachBtn.disabled) attachInput.click(); });
  attachInput.addEventListener('change', () => { addFiles(attachInput.files); attachInput.value = ''; });
  msgInput.addEventListener('paste', (e) => {
    const files = Array.from(e.clipboardData ? e.clipboardData.files : []);
    if (files.length && !msgInput.disabled && !state.noteMode) { e.preventDefault(); addFiles(files); }
  });
  // Drag-drop: only meaningful when a job is open and the composer is live.
  const dropOk = () => !msgInput.disabled && !state.noteMode;
  turnsEl.addEventListener('dragover', (e) => {
    if (!dropOk() || !(e.dataTransfer && Array.from(e.dataTransfer.types).includes('Files'))) return;
    e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; turnsEl.classList.add('drop-target');
  });
  turnsEl.addEventListener('dragleave', (e) => { if (e.target === turnsEl) turnsEl.classList.remove('drop-target'); });
  turnsEl.addEventListener('drop', (e) => {
    turnsEl.classList.remove('drop-target');
    if (!dropOk() || !(e.dataTransfer && e.dataTransfer.files.length)) return;
    e.preventDefault(); addFiles(e.dataTransfer.files);
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

  load();
  connectWS();
})();
</script>
</body>
</html>
