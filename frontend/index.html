<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2f4a6b">
<title>Runn</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<style>
  :root {
    --bg: #f8f5ef;
    --surface: #fffdf9;
    --surface-2: #f1ece2;
    --ink: #2a2622;
    --muted: #8a8278;
    --border: #e6e0d6;
    --brand: #2f4a6b;
    --accent: #b85c1f;
    --user-bubble: #2f4a6b;
    --user-ink: #f8f5ef;
    --ai-bubble: #ffffff;
    --list-w: 340px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .app { display: flex; height: 100dvh; }

  /* ── Left: job list ─────────────────────────────── */
  .list-pane {
    width: var(--list-w);
    min-width: var(--list-w);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }
  .list-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .list-head .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--accent); color: var(--bg);
    display: grid; place-items: center;
    border: 0; padding: 0; cursor: pointer;
    font-family: inherit; font-size: 15px; font-weight: 700; line-height: 1;
  }
  .list-head .logo:hover { filter: brightness(0.92); }
  .list-head .logo:active { transform: translateY(1px); }
  .list-head h1 { font-size: 17px; margin: 0; letter-spacing: -0.2px; }
  .job-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .job-row {
    display: flex; flex-direction: column; gap: 4px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .job-row:hover { background: var(--surface-2); }
  .job-row.active { background: var(--surface-2); box-shadow: inset 3px 0 0 var(--accent); }
  .job-row .title {
    font-size: 15px; font-weight: 600; line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .job-row .title.untitled { color: var(--muted); font-weight: 500; font-style: italic; }
  .job-row .meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }

  .list-foot { padding: 12px; border-top: 1px solid var(--border); }
  .btn-newjob {
    width: 100%; padding: 12px; border: 0; border-radius: 10px;
    background: var(--brand); color: var(--bg); font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn-newjob:active { transform: translateY(1px); }

  /* status + client chips */
  .chip {
    display: inline-flex; align-items: center;
    padding: 4px 12px; border-radius: 999px;
    font-size: 13px; font-weight: 600; line-height: 1.5;
    background: var(--surface-2); color: var(--muted);
    white-space: nowrap;
  }
  .chip.client { background: #e7eef6; color: var(--brand); }
  .chip.st-open     { background:#e8e4db; color:#6b6357; }
  .chip.st-doing    { background:#dcebff; color:#1f5fb0; }
  .chip.st-review   { background:#fff0d6; color:#a9711a; }
  .chip.st-done     { background:#dff2e3; color:#2f7a45; }
  .chip.st-invoiced { background:#e7e2f5; color:#5b48a8; }
  .chip.st-paid     { background:#d7efe0; color:#1f7a55; }
  .chip.st-blocked  { background:#ffe1dc; color:#b23b2a; }
  .chip.st-hold     { background:#ececec; color:#777; }
  /* selectable status chip — click opens the status picker */
  .chip.pick { cursor: pointer; }
  .chip.pick::after { content: '▾'; margin-left: 5px; font-size: 11px; opacity: .55; }

  /* status picker menu (shared, body-level, fixed-positioned at the chip) */
  .chip-menu {
    position: fixed; z-index: 200; min-width: 210px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 6px; display: flex; flex-direction: column; gap: 3px;
  }
  .chip-menu[hidden] { display: none; }
  .chip-menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; background: none; border: 0; border-radius: 9px;
    cursor: pointer; font: inherit; font-size: 15px; color: var(--ink);
    text-align: left; width: 100%;
  }
  .chip-menu-item:hover { background: var(--surface-2); }
  .chip-menu-item.is-current { background: var(--surface-2); font-weight: 600; }
  .chip-menu-item.danger { color: #b23b2a; }
  .chip-menu-item .chip { pointer-events: none; }

  /* chat header overflow menu (archive / delete) */
  .job-menu-btn {
    flex-shrink: 0; border: 0; background: none; cursor: pointer;
    color: var(--muted); font-size: 24px; line-height: 1;
    padding: 4px 10px; border-radius: 8px;
  }
  .job-menu-btn:hover { background: var(--surface-2); color: var(--ink); }

  /* left-pane subheader: client filter + running $ total */
  .list-sub {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .client-filter {
    flex: 1; min-width: 0; font: inherit; font-size: 13px; color: var(--ink);
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 8px; -webkit-appearance: none; appearance: none;
  }
  .total { flex-shrink: 0; margin-left: auto; border: 0; background: none; padding: 0; }
  .total .amt {
    display: inline-flex; align-items: center; gap: 4px;
    height: 32px; padding: 0 12px;
    background: var(--surface); border: 1px solid #dbe3ec; border-radius: 8px;
    color: var(--brand);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .total .amt::before { content: '$'; opacity: .6; }
  .total.clickable { cursor: pointer; }
  .total.clickable:hover .amt { border-color: var(--brand); }

  /* ── Billing pane ───────────────────────────────── */
  .billing-pane { flex: 1; display: none; flex-direction: column; min-width: 0; }
  body.show-billing .billing-pane { display: flex; }
  body.show-billing .chat-pane { display: none; }
  .billing-body { flex: 1; overflow: auto; padding: 16px; }

  /* Billing list: draft + issued entries */
  .bill-section-h {
    font-size: 12px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); font-weight: 700; margin: 20px 2px 8px;
  }
  .bill-section-h:first-child { margin-top: 2px; }
  .bill-entry {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    padding: 14px; margin-bottom: 8px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--surface); cursor: pointer; font: inherit;
  }
  .bill-entry:hover { border-color: var(--brand); }
  .bill-entry .main { flex: 1; min-width: 0; }
  .bill-entry .ttl { font-weight: 600; font-size: 15px; }
  .bill-entry .sub { color: var(--muted); font-size: 13px; margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bill-entry .sum {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-weight: 700; color: var(--brand); white-space: nowrap;
  }
  .bill-entry .badge {
    font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .badge.st-sent { background: #fdeede; color: #a85513; }
  .badge.st-paid { background: #e2f3e6; color: #2f7a45; }

  /* Invoice document (draft = editable, issued = read-only) */
  .inv-doc { max-width: 720px; margin: 0 auto; }
  .inv-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .inv-actions button {
    font: inherit; font-size: 14px; font-weight: 600; padding: 10px 16px;
    border-radius: 8px; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--ink);
  }
  .inv-actions .primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .inv-actions .primary:disabled { opacity: .5; cursor: default; }
  .inv-actions .danger { color: #a33; margin-left: auto; }
  .inv-paper { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 28px; }
  .inv-top { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
  .inv-block .nm { font-weight: 700; font-size: 16px; }
  .inv-block .ln, .inv-block .label { font-size: 13px; color: var(--ink); }
  .inv-block .label { text-transform: uppercase; color: var(--muted); letter-spacing: .05em; font-size: 11px; margin-bottom: 4px; }
  .inv-meta { text-align: right; min-width: 230px; }
  .inv-meta .row { display: flex; gap: 10px; justify-content: flex-end; align-items: center; margin-bottom: 6px; }
  .inv-meta label { font-size: 12px; color: var(--muted); }
  .inv-meta input {
    font: inherit; font-size: 14px; padding: 6px 8px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--ink); width: 150px;
  }
  .inv-lines { width: 100%; border-collapse: collapse; margin: 8px 0 4px; }
  .inv-lines th {
    text-align: left; font-size: 11px; text-transform: uppercase; color: var(--muted);
    border-bottom: 2px solid var(--border); padding: 6px 4px; font-weight: 700;
  }
  .inv-lines th.r, .inv-lines td.r { text-align: right; }
  .inv-lines td { padding: 9px 4px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .inv-lines .rm { border: 0; background: none; color: #b33; cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px; }
  .inv-tot { margin-left: auto; width: 280px; margin-top: 10px; }
  .inv-tot .row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 14px; }
  .inv-tot .row.grand { border-top: 2px solid var(--border); margin-top: 4px; padding-top: 8px; font-weight: 700; font-size: 16px; }
  .inv-tot input {
    width: 96px; text-align: right; font: inherit; font-size: 14px;
    padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--ink);
  }
  .inv-notes { margin-top: 18px; }
  .inv-notes textarea {
    width: 100%; min-height: 60px; font: inherit; font-size: 14px; padding: 8px;
    border: 1px solid var(--border); border-radius: 8px; resize: vertical;
    background: var(--bg); color: var(--ink);
  }
  .inv-notes .label { text-transform: uppercase; color: var(--muted); letter-spacing: .05em; font-size: 11px; margin-bottom: 4px; }
  .inv-notes .ro { white-space: pre-wrap; font-size: 14px; }
  .inv-bank { margin-top: 16px; font-size: 13px; color: var(--ink); }
  .inv-bank .label { text-transform: uppercase; color: var(--muted); letter-spacing: .05em; font-size: 11px; margin-bottom: 4px; }

  /* + Job → client picker (lives in the left column footer) */
  .newjob-picker { width: 100%; font-size: 15px; padding: 12px; cursor: pointer; }

  /* ── Right: chat ────────────────────────────────── */
  .chat-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); min-height: 56px;
  }
  .chat-head .back {
    display: none; border: 0; background: none; font-size: 26px;
    color: var(--brand); cursor: pointer; padding: 0 6px 0 0; line-height: 1;
  }
  .chat-head .ttl { font-size: 16px; font-weight: 600; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-head .hours {
    font-size: 13px; color: var(--muted); white-space: nowrap;
    font-variant-numeric: tabular-nums; font-feature-settings: "tnum";
  }
  .chat-head .hours.running { color: #2f7a45; font-weight: 700; }
  .chat-head .hours.running::before {
    content: ''; display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: #2f7a45; margin-right: 5px; vertical-align: middle;
    animation: timerpulse 1.2s ease-in-out infinite;
  }
  @keyframes timerpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

  .turns { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px; }
  .empty {
    height: 100%; display: grid; place-items: center;
    color: var(--muted); font-size: 15px; text-align: center; padding: 0 32px;
  }

  .turn { display: flex; margin: 0 0 12px; }
  .turn.user { justify-content: flex-end; }
  .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 16px;
    font-size: 15px; line-height: 1.45; word-wrap: break-word; overflow-wrap: anywhere;
  }
  .turn.user .bubble { background: var(--user-bubble); color: var(--user-ink); border-bottom-right-radius: 5px; }
  .turn.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  .bubble :first-child { margin-top: 0; } .bubble :last-child { margin-bottom: 0; }
  .bubble pre { background: #f3efe7; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
  .turn.user .bubble pre { background: rgba(255,255,255,0.15); }
  .bubble code { font-family: ui-monospace, Menlo, monospace; font-size: 0.9em; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 2px; color: var(--muted); font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* composer */
  .composer { display: flex; gap: 8px; align-items: flex-end;
    padding: 10px 12px calc(10px + var(--safe-b)); border-top: 1px solid var(--border); background: var(--surface); }
  .composer textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 14px; font: inherit; font-size: 15px; max-height: 140px;
    background: var(--bg); color: var(--ink);
  }
  .composer textarea:focus { outline: none; border-color: var(--brand); }
  .composer button {
    border: 0; border-radius: 12px; background: var(--accent); color: var(--bg);
    font-size: 15px; font-weight: 600; padding: 0 18px; height: 44px; cursor: pointer;
  }
  .composer button:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── Responsive: collapse to one pane ───────────── */
  @media (max-width: 720px) {
    :root { --list-w: 100%; }
    .list-pane { width: 100%; min-width: 0; border-right: 0; }
    .chat-pane { position: fixed; inset: 0; background: var(--bg);
      transform: translateX(100%); transition: transform 0.22s ease; z-index: 5; }
    body.show-chat .chat-pane { transform: translateX(0); }
    .chat-head .back { display: block; }

    .billing-pane { display: flex; position: fixed; inset: 0; background: var(--bg);
      transform: translateX(100%); transition: transform 0.22s ease; z-index: 6; }
    body.show-billing .billing-pane { transform: translateX(0); }
    body.show-billing .chat-pane { display: flex; }   /* don't fight the overlay on mobile */
    .inv-paper { padding: 16px; }
    .inv-meta { min-width: 0; text-align: left; }
    .inv-meta .row { justify-content: flex-start; }
    .inv-meta input { width: 100%; }
    .inv-actions .danger { margin-left: 0; }

    /* bigger chips + menus = easier taps on a phone */
    .chip { font-size: 15px; padding: 6px 14px; }
    .chip.pick::after { font-size: 12px; margin-left: 6px; }
    .job-row .meta { gap: 10px; font-size: 13px; }
    .chip-menu { min-width: 260px; padding: 8px; gap: 4px; }
    .chip-menu-item { font-size: 17px; padding: 15px 16px; }
    .job-menu-btn { font-size: 28px; padding: 6px 12px; }
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="list-pane">
      <div class="list-head">
        <button class="logo" id="logoReset" type="button" title="Reload — clears cached copies for a clean test">R</button>
        <h1>Runn</h1>
        <button class="total clickable" id="billingBtn" type="button" title="Billing — outstanding work">
          <span class="amt" id="valueTotal">0.00</span>
        </button>
      </div>
      <div class="list-sub">
        <select class="client-filter" id="clientFilter" aria-label="Filter by client">
          <option value="">All clients</option>
        </select>
      </div>
      <div class="job-list" id="jobList"></div>
      <div class="list-foot">
        <button class="btn-newjob" id="newJobBtn">+ Job</button>
        <select class="client-filter newjob-picker" id="newJobPicker" aria-label="Pick a client for the new job" hidden></select>
      </div>
    </aside>

    <main class="chat-pane">
      <div class="chat-head">
        <button class="back" id="backBtn" aria-label="Back">‹</button>
        <span class="ttl" id="chatTitle"></span>
        <span class="chip client" id="chatClient" hidden></span>
        <span class="chip" id="chatStatus" hidden></span>
        <span class="hours" id="chatHours"></span>
        <button class="job-menu-btn" id="jobMenuBtn" type="button" aria-label="Job actions" hidden>⋯</button>
      </div>
      <div class="turns" id="turns">
        <div class="empty" id="emptyState">Select a job, or start a new one.</div>
      </div>
      <form class="composer" id="composer">
        <textarea id="msgInput" rows="1" placeholder="Select a job, or start a new one." disabled></textarea>
        <button type="submit" id="sendBtn" disabled>Send</button>
      </form>
    </main>

    <section class="billing-pane" id="billingPane">
      <div class="chat-head billing-head">
        <button class="back" id="billingBack" type="button" aria-label="Back">‹</button>
        <span class="ttl" id="billingTitle">Billing</span>
      </div>
      <div class="billing-body" id="billingBody"></div>
    </section>
  </div>
  <div class="chip-menu" id="chipMenu" hidden></div>
  <div class="chip-menu" id="jobMenu" hidden></div>
  <div class="chip-menu" id="clientMenu" hidden></div>

<script>
'use strict';
(function () {
  const DRAFT = '__draft__';   // a not-yet-persisted new job (created on first send)
  const state = {
    jobs: new Map(),       // id -> job
    clients: new Map(),    // id -> client
    currentId: null,
    sending: false,
    filterClient: '',      // '' = all clients
    picking: false,        // choosing a client for a new job
    draftClientId: null,   // client chosen for the not-yet-saved draft
    view: 'chat',          // 'chat' | 'billing' — what the main pane shows
    invoices: new Map(),   // id -> issued invoice record
    billingSel: null,      // null = list; {kind:'draft',clientId} | {kind:'invoice',id}
    editing: null,         // working copy of the draft being composed
    settings: {},          // business/bank/GST defaults for invoice snapshots
  };

  const $ = (id) => document.getElementById(id);
  const jobListEl = $('jobList');
  const turnsEl = $('turns');
  const msgInput = $('msgInput');
  const sendBtn = $('sendBtn');

  marked.setOptions({ breaks: true, gfm: true });
  const mdToHtml = (s) => DOMPurify.sanitize(marked.parse(s || ''));

  const clientName = (id) => (id && state.clients.get(id)?.name) || null;
  const clientOf = (id) => (id ? state.clients.get(id) : null);
  // Outstanding = done work not yet invoiced. Only 'done' billable jobs with a
  // rate and hours count toward the running $ total and the Outstanding tab.
  function jobValue(j) {
    const c = clientOf(j.client_id);
    if (!c || c.non_billable || !c.rate_per_hour) return 0;
    if (j.status !== 'done') return 0;
    return (Number(j.hours) || 0) * Number(c.rate_per_hour);
  }
  const fmtMoney = (n) => '$' + Math.round(n).toLocaleString();
  const money2 = (n) => (Number(n) || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const money = (n) => '$' + money2(n);
  const round2 = (n) => Math.round((Number(n) || 0) * 100) / 100;
  const today = () => new Date().toISOString().slice(0, 10);
  function addDays(iso, days) {
    const d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  }
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    if (isNaN(d)) return iso;
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${dd}/${mm}/${d.getFullYear()}`;
  }
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
    (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const titleOf = (j) => j.title || firstUserText(j) || null;
  function firstUserText(j) {
    const t = (j.turns || []).find((x) => x.role === 'user' && x.text);
    return t ? t.text.replace(/\s+/g, ' ').slice(0, 80) : null;
  }
  function fmtTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function dayLabel(iso) {
    return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── List rendering ──────────────────────────────
  function visibleJobs() {
    let jobs = [...state.jobs.values()].filter((j) => !j.archived);
    if (state.filterClient) jobs = jobs.filter((j) => j.client_id === state.filterClient);
    return jobs.sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)));
  }
  function renderTotal(jobs) {
    const total = jobs.reduce((s, j) => s + jobValue(j), 0);
    $('valueTotal').textContent = total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function renderFilterOptions() {
    const sel = $('clientFilter');
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    sel.innerHTML = '<option value="">All clients</option>';
    for (const c of clients) {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      sel.appendChild(o);
    }
    sel.value = state.filterClient;        // preserve, or fall back to All if gone
    state.filterClient = sel.value;
  }
  function renderList() {
    const jobs = visibleJobs();
    renderTotal(jobs);
    jobListEl.innerHTML = '';
    if (!jobs.length) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.style.padding = '40px 24px';
      e.textContent = state.filterClient ? 'No jobs for this client yet.' : 'No jobs yet — hit + Job to start.';
      jobListEl.appendChild(e);
      return;
    }
    for (const j of jobs) {
      const row = document.createElement('div');
      row.className = 'job-row' + (j.id === state.currentId ? ' active' : '');
      row.dataset.id = j.id;

      const ttl = titleOf(j);
      const title = document.createElement('div');
      title.className = 'title' + (ttl ? '' : ' untitled');
      title.textContent = ttl || 'Untitled job';
      row.appendChild(title);

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.appendChild(statusChip(j.status));   // static — no jobId, so not a button
      const cn = clientName(j.client_id);
      if (cn) { const c = document.createElement('span'); c.className = 'chip client'; c.textContent = cn; meta.appendChild(c); }
      const t = document.createElement('span'); t.textContent = fmtTime(j.updated_at); meta.appendChild(t);
      row.appendChild(meta);

      row.addEventListener('click', () => openJob(j.id));
      jobListEl.appendChild(row);
    }
  }

  function statusChip(status, jobId) {
    const c = document.createElement('span');
    const st = status || 'open';
    c.className = 'chip st-' + st + (jobId ? ' pick' : '');
    c.textContent = st;
    if (jobId) {
      c.addEventListener('click', (ev) => {
        ev.stopPropagation();          // don't open the job row
        openChipMenu(c, jobId, st);
      });
    }
    return c;
  }

  // ── Status picker (selectable chip → dropdown) ──
  const STATUS_ORDER = ['open', 'doing', 'review', 'blocked', 'hold', 'done', 'invoiced', 'paid'];
  let chipMenuJobId = null;
  function openChipMenu(anchorEl, jobId, current) {
    const menu = $('chipMenu');
    chipMenuJobId = jobId;
    menu.innerHTML = '';
    for (const st of STATUS_ORDER) {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (st === current ? ' is-current' : '');
      item.dataset.status = st;
      item.appendChild(statusChip(st));   // static colored chip (no jobId)
      menu.appendChild(item);
    }
    menu.hidden = false;
    const r = anchorEl.getBoundingClientRect();
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    let left = r.left;
    let top = r.bottom + 4;
    if (left + mw > window.innerWidth - 8) left = window.innerWidth - 8 - mw;
    if (top + mh > window.innerHeight - 8) top = r.top - 4 - mh;  // flip above if no room below
    menu.style.left = Math.max(8, left) + 'px';
    menu.style.top = Math.max(8, top) + 'px';
  }
  function closeChipMenu() { $('chipMenu').hidden = true; chipMenuJobId = null; }
  async function setJobStatus(id, status) {
    const j = await patchJson('/jobs/' + id, { status });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }

  // ── Job actions menu (archive / delete) ──
  function placeMenu(menu, anchorEl, align = 'left') {
    const r = anchorEl.getBoundingClientRect();
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    let left = align === 'right' ? r.right - mw : r.left;
    let top = r.bottom + 4;
    if (left + mw > window.innerWidth - 8) left = window.innerWidth - 8 - mw;
    if (top + mh > window.innerHeight - 8) top = r.top - 4 - mh;
    menu.style.left = Math.max(8, left) + 'px';
    menu.style.top = Math.max(8, top) + 'px';
  }
  function openJobMenu(anchorEl) {
    const menu = $('jobMenu');
    menu.innerHTML = '';
    const archive = document.createElement('button');
    archive.type = 'button';
    archive.className = 'chip-menu-item';
    archive.dataset.action = 'archive';
    archive.textContent = 'Archive job';
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'chip-menu-item danger';
    del.dataset.action = 'delete';
    del.textContent = 'Delete job';
    menu.appendChild(archive);
    menu.appendChild(del);
    menu.hidden = false;
    placeMenu(menu, anchorEl, 'right');
  }
  function closeJobMenu() { $('jobMenu').hidden = true; }

  // ── Client picker (click the client chip to re-assign the job) ──
  let clientMenuJobId = null;
  function openClientMenu(anchorEl, jobId, currentClientId) {
    const menu = $('clientMenu');
    clientMenuJobId = jobId;
    menu.innerHTML = '';
    const mk = (value, label, isCurrent) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (isCurrent ? ' is-current' : '');
      item.dataset.client = value;          // '' = Personal (no client)
      item.textContent = label;
      menu.appendChild(item);
    };
    mk('', 'Personal', !currentClientId);
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    for (const c of clients) mk(c.id, c.name, c.id === currentClientId);
    menu.hidden = false;
    placeMenu(menu, anchorEl);
  }
  function closeClientMenu() { $('clientMenu').hidden = true; clientMenuJobId = null; }
  async function setJobClient(id, clientId) {
    const j = await patchJson('/jobs/' + id, { client_id: clientId || null });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }
  async function archiveCurrentJob() {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    await patchJson('/jobs/' + id, { archived: true });
    state.jobs.delete(id);
    closeChat();
  }
  async function deleteCurrentJob() {
    const id = state.currentId;
    if (!id || id === DRAFT) return;
    const j = state.jobs.get(id);
    const name = (j && titleOf(j)) || 'this job';
    if (!confirm(`Delete ${name}? This removes the whole chat for good and can't be undone.`)) return;
    await delJson('/jobs/' + id);
    state.jobs.delete(id);
    closeChat();
  }

  // ── Active-work timer (v1 model) ────────────────
  // Time accrues only while a job's status is `doing` (the AI is working, or
  // it's set by hand). The server stamps doing_started_at on entering `doing`
  // and folds the elapsed time into the job on leaving — here we just paint a
  // live clock. timerSync() runs from renderChat, so it starts/stops the tick
  // as the open job changes or its status flips.
  const timer = { jobId: null, tickId: null };

  function jobSeconds(j) {
    if (!j) return 0;
    if (j.work_seconds != null) return Number(j.work_seconds) || 0;
    return Math.round((Number(j.hours) || 0) * 3600);   // back-fill from old jobs
  }
  function fmtDuration(totalSec) {
    const s = Math.max(0, Math.floor(totalSec));
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
    const pad = (n) => String(n).padStart(2, '0');
    return h ? `${h}:${pad(m)}:${pad(ss)}` : `${m}:${pad(ss)}`;
  }
  function jobRunning(j) { return !!(j && j.status === 'doing' && j.doing_started_at); }
  function liveSeconds(j) {
    let s = jobSeconds(j);
    if (jobRunning(j)) s += Math.max(0, (Date.now() - new Date(j.doing_started_at).getTime()) / 1000);
    return s;
  }
  function timerSync() {
    const id = (state.currentId && state.currentId !== DRAFT) ? state.currentId : null;
    timer.jobId = id;
    const running = jobRunning(id ? state.jobs.get(id) : null);
    if (running && !timer.tickId) timer.tickId = setInterval(renderTimerDisplay, 1000);
    if (!running && timer.tickId) { clearInterval(timer.tickId); timer.tickId = null; }
    renderTimerDisplay();
  }
  function renderTimerDisplay() {
    const el = $('chatHours');
    const j = timer.jobId ? state.jobs.get(timer.jobId) : null;
    if (!j) { el.textContent = ''; el.classList.remove('running'); return; }
    el.textContent = fmtDuration(liveSeconds(j));
    el.classList.toggle('running', jobRunning(j));
  }

  // ── Billing ─────────────────────────────────────
  // Opens in the main pane (same surface as a job). On mobile it's a slide-over
  // like the chat, with its own history entry so the device back button returns
  // to the list.
  function openBilling() {
    state.view = 'billing';
    state.currentId = null;
    state.picking = false;
    state.billingSel = null;
    state.editing = null;
    resetNewJobPicker();
    document.body.classList.add('show-billing');
    if (window.matchMedia('(max-width: 720px)').matches &&
        !(history.state && history.state.runnBilling)) {
      history.pushState({ runnBilling: true }, '');
    }
    renderList();
    renderBilling();
  }
  function closeBilling(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    state.view = 'chat';
    state.billingSel = null;
    state.editing = null;
    document.body.classList.remove('show-billing');
    renderList();
    renderChat();
    if (!fromPop && history.state && history.state.runnBilling) history.back();
  }
  // Don't auto-rerender billing out from under an in-progress draft edit.
  function maybeRenderBilling() {
    if (state.view !== 'billing') return;
    if (state.billingSel && state.billingSel.kind === 'draft') return;
    renderBilling();
  }
  function billingGroups() {
    const groups = new Map();   // clientId -> { client, rows:[], total }
    for (const j of state.jobs.values()) {
      if (j.archived) continue;
      const v = jobValue(j);
      if (v <= 0) continue;     // jobValue already gates on done + billable client
      const c = clientOf(j.client_id);
      let g = groups.get(c.id);
      if (!g) { g = { client: c, rows: [], total: 0 }; groups.set(c.id, g); }
      g.rows.push({ job: j, hours: Number(j.hours) || 0, amount: v });
      g.total += v;
    }
    const out = [...groups.values()];
    out.forEach((g) => g.rows.sort((a, b) => String(a.job.done_at || a.job.updated_at).localeCompare(String(b.job.done_at || b.job.updated_at))));
    return out.sort((a, b) => b.total - a.total);
  }
  // Dispatcher: list ⇆ open document (a live draft, or an issued invoice).
  function renderBilling() {
    const body = $('billingBody');
    const titleEl = $('billingTitle');
    body.innerHTML = '';
    if (state.billingSel && state.billingSel.kind === 'draft') return renderDraftDoc(body, titleEl);
    if (state.billingSel && state.billingSel.kind === 'invoice') return renderIssuedDoc(body, titleEl);
    titleEl.textContent = 'Billing';
    renderBillingList(body);
  }

  function renderBillingList(body) {
    const groups = billingGroups();
    const invs = [...state.invoices.values()].sort((a, b) => String(b.issued_at).localeCompare(String(a.issued_at)));
    if (!groups.length && !invs.length) {
      body.innerHTML = '<div class="empty">Nothing to bill yet. Mark a job “done” and it lands here as a draft.</div>';
      return;
    }
    if (groups.length) {
      const h = document.createElement('div'); h.className = 'bill-section-h'; h.textContent = 'Drafts';
      body.appendChild(h);
      for (const g of groups) {
        const n = g.rows.length;
        body.appendChild(billEntry({
          title: g.client.name || 'Client',
          sub: `${n} ${n === 1 ? 'item' : 'items'} · not yet invoiced`,
          sum: money(g.total),
          onClick: () => openDraft(g.client.id),
        }));
      }
    }
    const ih = document.createElement('div'); ih.className = 'bill-section-h'; ih.textContent = 'Invoices';
    body.appendChild(ih);
    if (!invs.length) {
      const e = document.createElement('div'); e.className = 'empty'; e.style.padding = '20px 8px';
      e.textContent = 'No issued invoices yet.';
      body.appendChild(e);
    } else {
      for (const inv of invs) {
        const company = inv.snapshot?.to?.company || clientName(inv.client_id) || '';
        body.appendChild(billEntry({
          title: '#' + inv.id,
          sub: `${company} · ${fmtDate(inv.issued_at)}`,
          badge: inv.status,
          sum: money(inv.total),
          onClick: () => { state.billingSel = { kind: 'invoice', id: inv.id }; renderBilling(); },
        }));
      }
    }
  }

  function billEntry({ title, sub, sum, badge, onClick }) {
    const e = document.createElement('button'); e.type = 'button'; e.className = 'bill-entry';
    const main = document.createElement('div'); main.className = 'main';
    const t = document.createElement('div'); t.className = 'ttl'; t.textContent = title;
    const s = document.createElement('div'); s.className = 'sub'; s.textContent = sub;
    main.append(t, s);
    e.appendChild(main);
    if (badge) { const b = document.createElement('span'); b.className = 'badge st-' + badge; b.textContent = badge; e.appendChild(b); }
    const m = document.createElement('div'); m.className = 'sum'; m.textContent = sum; e.appendChild(m);
    e.addEventListener('click', onClick);
    return e;
  }

  // Build the working copy for a client's live draft and open the editable doc.
  function openDraft(clientId) {
    const group = billingGroups().find((g) => g.client.id === clientId);
    if (!group) { state.billingSel = null; return renderBilling(); }
    const s = state.settings || {};
    const c = group.client;
    const gstRate = (typeof c.gst_rate === 'number') ? c.gst_rate
                  : (typeof s.default_gst_rate === 'number') ? s.default_gst_rate : 0;
    const issued = today();
    state.editing = {
      clientId, client: c, gstRate,
      number: issued,                            // date-coded default; hand-editable
      issued, due: addDays(issued, s.default_due_days || 14),
      discount: 0, notes: '',
      items: group.rows.map((r) => ({
        job_id: r.job.id,
        description: titleOf(r.job) || 'Work',
        date: (r.job.done_at || r.job.updated_at || '').slice(0, 10) || issued,
        hours: r.hours,
        amount: round2(r.amount),
      })),
    };
    state.billingSel = { kind: 'draft', clientId };
    renderBilling();
  }

  function calcTotals(items, discountRaw, gstRate) {
    const subtotal = round2(items.reduce((acc, it) => acc + (Number(it.amount) || 0), 0));
    const discount = Math.min(subtotal, Math.max(0, round2(discountRaw)));
    const taxable = round2(subtotal - discount);
    const gst = round2(taxable * (Number(gstRate) || 0));
    const total = round2(taxable + gst);
    return { subtotal, discount, taxable, gst, total };
  }

  // Inner HTML of .inv-paper. editable=true → draft (inputs + remove buttons);
  // editable=false → issued (read-only, uses precomputed frozen totals).
  function invPaperHtml(o) {
    const sym = o.sym || '$';
    const t = o.precomputed
      ? { subtotal: o.precomputed.subtotal, discount: o.precomputed.discount, gst: o.precomputed.gst, total: o.precomputed.total }
      : calcTotals(o.items, o.discount, o.gstRate);
    const fromLines = (o.from.lines || []).map((l) => `<div class="ln">${esc(l)}</div>`).join('');
    const toLines = (o.to.lines || []).map((l) => `<div class="ln">${esc(l)}</div>`).join('');
    const gstPct = Math.round((Number(o.gstRate) || 0) * 100);

    const meta = o.editable
      ? `<div class="inv-meta">
           <div class="label">Tax invoice</div>
           <div class="row"><label>No.</label><input id="invNum" value="${esc(o.number)}"></div>
           <div class="row"><label>Issued</label><input id="invIssued" type="date" value="${esc(o.issued)}"></div>
           <div class="row"><label>Due</label><input id="invDue" type="date" value="${esc(o.due)}"></div>
         </div>`
      : `<div class="inv-meta">
           <div class="label">Tax invoice</div>
           <div class="row"><label>No.</label><span>${esc(o.number)}</span></div>
           <div class="row"><label>Issued</label><span>${esc(fmtDate(o.issued))}</span></div>
           <div class="row"><label>Due</label><span>${esc(fmtDate(o.due))}</span></div>
         </div>`;

    const rows = o.items.map((it, i) => `<tr>
        <td>${esc(it.description)}</td>
        <td>${esc(fmtDate(it.date))}</td>
        <td class="r">${it.hours != null ? esc(it.hours) + 'h' : ''}</td>
        <td class="r">${sym}${money2(it.amount)}</td>
        ${o.editable ? `<td class="r"><button class="rm" type="button" data-i="${i}" title="Remove line">×</button></td>` : ''}
      </tr>`).join('');

    const discRow = o.editable
      ? `<div class="row"><span>Discount</span><span>${sym}<input id="invDisc" type="number" min="0" step="0.01" value="${Number(o.discount) || 0}"></span></div>`
      : (t.discount > 0 ? `<div class="row"><span>Discount</span><span id="totDisc">−${sym}${money2(t.discount)}</span></div>` : '');

    const notes = o.editable
      ? `<div class="inv-notes"><div class="label">Notes</div><textarea id="invNotes" placeholder="Optional note shown on the invoice">${esc(o.notes)}</textarea></div>`
      : (o.notes ? `<div class="inv-notes"><div class="label">Notes</div><div class="ro">${esc(o.notes)}</div></div>` : '');

    const bank = (!o.editable && o.bank && (o.bank.bank || o.bank.acc))
      ? `<div class="inv-bank"><div class="label">Pay to</div>
           <div>${esc(o.bank.bank || '')} ${esc(o.bank.name || '')}</div>
           <div>BSB ${esc(o.bank.bsb || '')} · Acc ${esc(o.bank.acc || '')}</div></div>`
      : '';

    return `
      <div class="inv-top">
        <div class="inv-block">
          <div class="nm">${esc(o.from.name) || '&nbsp;'}</div>${fromLines}
          ${o.from.abn ? `<div class="ln">ABN ${esc(o.from.abn)}</div>` : ''}
        </div>
        ${meta}
      </div>
      <div class="inv-block">
        <div class="label">Bill to</div>
        <div class="nm">${esc(o.to.company) || '&nbsp;'}</div>
        ${o.to.contact ? `<div class="ln">${esc(o.to.contact)}</div>` : ''}
        ${toLines}
        ${o.to.abn ? `<div class="ln">ABN ${esc(o.to.abn)}</div>` : ''}
      </div>
      <table class="inv-lines">
        <thead><tr><th>Description</th><th>Date</th><th class="r">Hours</th><th class="r">Amount</th>${o.editable ? '<th></th>' : ''}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="inv-tot">
        <div class="row"><span>Subtotal</span><span id="totSub">${sym}${money2(t.subtotal)}</span></div>
        ${discRow}
        <div class="row"><span>GST (${gstPct}%)</span><span id="totGst">${sym}${money2(t.gst)}</span></div>
        <div class="row grand"><span>Total</span><span id="totGrand">${sym}${money2(t.total)}</span></div>
      </div>
      ${notes}
      ${bank}`;
  }

  function updateDocTotals(paper, items, discount, gstRate, sym) {
    const t = calcTotals(items, discount, gstRate);
    const set = (id, v) => { const el = paper.querySelector('#' + id); if (el) el.textContent = v; };
    set('totSub', sym + money2(t.subtotal));
    set('totGst', sym + money2(t.gst));
    set('totGrand', sym + money2(t.total));
  }

  function fromSnapshot(s) {
    return { name: s.business_name || '', lines: s.business_address_lines || [], abn: s.business_abn_acn || '' };
  }
  function toSnapshot(c) {
    return { company: c.company || c.name || '', contact: c.contact || '', lines: c.address_lines || [], abn: c.abn || '' };
  }

  function renderDraftDoc(body, titleEl) {
    const ed = state.editing;
    if (!ed) { state.billingSel = null; return renderBilling(); }
    titleEl.textContent = 'New invoice — ' + (ed.client.name || '');
    const s = state.settings || {};
    const sym = s.currency_symbol || '$';

    const wrap = document.createElement('div'); wrap.className = 'inv-doc';
    const actions = document.createElement('div'); actions.className = 'inv-actions';
    const issueBtn = document.createElement('button'); issueBtn.type = 'button'; issueBtn.className = 'primary'; issueBtn.textContent = 'Issue invoice';
    actions.appendChild(issueBtn);
    wrap.appendChild(actions);

    const paper = document.createElement('div'); paper.className = 'inv-paper';
    paper.innerHTML = invPaperHtml({
      from: fromSnapshot(s), to: toSnapshot(ed.client), editable: true,
      number: ed.number, issued: ed.issued, due: ed.due,
      items: ed.items, gstRate: ed.gstRate, discount: ed.discount, notes: ed.notes, sym,
    });
    wrap.appendChild(paper);
    body.appendChild(wrap);

    paper.querySelectorAll('.inv-lines .rm').forEach((btn) => {
      btn.addEventListener('click', () => {
        ed.items.splice(Number(btn.dataset.i), 1);
        if (!ed.items.length) { state.billingSel = null; state.editing = null; }
        renderBilling();   // trimming the last line drops the draft back to the list
      });
    });
    const num = paper.querySelector('#invNum');
    const iss = paper.querySelector('#invIssued');
    const due = paper.querySelector('#invDue');
    const disc = paper.querySelector('#invDisc');
    const notes = paper.querySelector('#invNotes');
    num.addEventListener('input', () => { ed.number = num.value.trim(); });
    iss.addEventListener('input', () => { ed.issued = iss.value; });
    due.addEventListener('input', () => { ed.due = due.value; });
    notes.addEventListener('input', () => { ed.notes = notes.value; });
    disc.addEventListener('input', () => {
      ed.discount = Number(disc.value) || 0;
      updateDocTotals(paper, ed.items, ed.discount, ed.gstRate, sym);
    });
    issueBtn.addEventListener('click', () => issueInvoice(issueBtn));
  }

  async function issueInvoice(btn) {
    const ed = state.editing;
    if (!ed) return;
    const id = (ed.number || '').trim();
    if (!id) { alert('Give the invoice a number first.'); return; }
    if (!ed.items.length) { alert('There are no line items to invoice.'); return; }
    btn.disabled = true;
    try {
      const inv = await postJson('/invoices', {
        id, client_id: ed.clientId,
        items: ed.items.map((it) => ({ job_id: it.job_id, description: it.description, date: it.date, amount: it.amount })),
        discount: Number(ed.discount) || 0,
        gst_rate: ed.gstRate,
        notes: ed.notes || '',
        issued_at: ed.issued, due_at: ed.due,
      });
      state.invoices.set(inv.id, inv);
      state.editing = null;
      state.billingSel = { kind: 'invoice', id: inv.id };   // land on the issued doc
      renderBilling();
    } catch (e) {
      alert('Could not issue: ' + e.message);
      btn.disabled = false;
    }
  }

  function renderIssuedDoc(body, titleEl) {
    const inv = state.invoices.get(state.billingSel.id);
    if (!inv) { state.billingSel = null; return renderBilling(); }
    titleEl.textContent = '#' + inv.id;
    const sym = inv.snapshot?.currency_symbol || '$';

    const wrap = document.createElement('div'); wrap.className = 'inv-doc';
    const actions = document.createElement('div'); actions.className = 'inv-actions';
    if (inv.status !== 'paid') {
      const paid = document.createElement('button'); paid.type = 'button'; paid.className = 'primary'; paid.textContent = 'Mark paid';
      paid.addEventListener('click', () => markPaid(inv.id, paid));
      actions.appendChild(paid);
    }
    const print = document.createElement('button'); print.type = 'button'; print.textContent = 'Print / PDF';
    print.addEventListener('click', () => printInvoice(inv));
    actions.appendChild(print);
    const voidBtn = document.createElement('button'); voidBtn.type = 'button'; voidBtn.className = 'danger'; voidBtn.textContent = 'Void';
    voidBtn.addEventListener('click', () => voidInvoice(inv.id, voidBtn));
    actions.appendChild(voidBtn);
    wrap.appendChild(actions);

    const paper = document.createElement('div'); paper.className = 'inv-paper';
    const snap = inv.snapshot || {};
    paper.innerHTML = invPaperHtml({
      from: { name: snap.from?.name, lines: snap.from?.address_lines || [], abn: snap.from?.abn_acn },
      to: { company: snap.to?.company, contact: snap.to?.contact, lines: snap.to?.address_lines || [], abn: snap.to?.abn },
      bank: snap.bank,
      number: inv.id, issued: inv.issued_at, due: inv.due_at,
      items: inv.items, gstRate: inv.gst_rate,
      precomputed: { subtotal: inv.subtotal, discount: inv.discount, gst: inv.gst, total: inv.total },
      notes: inv.notes, sym, editable: false,
    });
    wrap.appendChild(paper);
    body.appendChild(wrap);
  }

  async function markPaid(id, btn) {
    btn.disabled = true;
    try {
      const inv = await patchJson('/invoices/' + id, { status: 'paid' });
      state.invoices.set(inv.id, inv);
      renderBilling();
    } catch (e) { alert('Could not mark paid: ' + e.message); btn.disabled = false; }
  }

  async function voidInvoice(id, btn) {
    if (!confirm(`Void invoice #${id}? Its jobs go back to “done” and roll into the next draft.`)) return;
    btn.disabled = true;
    try {
      await delJson('/invoices/' + id);
      state.invoices.delete(id);
      state.billingSel = null;
      renderBilling();
    } catch (e) { alert('Could not void: ' + e.message); btn.disabled = false; }
  }

  function printInvoice(inv) {
    const w = window.open('', '_blank');
    if (!w) { alert('Allow pop-ups to print or save the PDF.'); return; }
    w.document.write(invPrintHtml(inv));
    w.document.close();
    w.focus();
    setTimeout(() => { try { w.print(); } catch {} }, 250);
  }

  function invPrintHtml(inv) {
    const snap = inv.snapshot || {};
    const sym = snap.currency_symbol || '$';
    const from = { name: snap.from?.name, lines: snap.from?.address_lines || [], abn: snap.from?.abn_acn };
    const to = { company: snap.to?.company, contact: snap.to?.contact, lines: snap.to?.address_lines || [], abn: snap.to?.abn };
    const gstPct = Math.round((Number(inv.gst_rate) || 0) * 100);
    const rows = inv.items.map((it) => `<tr>
        <td>${esc(it.description)}</td><td>${esc(fmtDate(it.date))}</td>
        <td class="r">${sym}${money2(it.amount)}</td></tr>`).join('');
    const bank = (snap.bank && (snap.bank.bank || snap.bank.acc))
      ? `<div class="bank"><strong>Pay to</strong><br>${esc(snap.bank.bank || '')} ${esc(snap.bank.name || '')}<br>BSB ${esc(snap.bank.bsb || '')} · Acc ${esc(snap.bank.acc || '')}</div>` : '';
    return `<!doctype html><html><head><meta charset="utf-8"><title>Invoice ${esc(inv.id)}</title>
      <style>
        @page { size: A4; margin: 18mm; }
        body { font: 13px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; color: #222; }
        h1 { font-size: 22px; margin: 0 0 2px; }
        .top { display: flex; justify-content: space-between; gap: 24px; margin-bottom: 20px; }
        .meta { text-align: right; }
        .lbl { text-transform: uppercase; font-size: 10px; color: #888; letter-spacing: .05em; }
        table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        th { text-align: left; font-size: 10px; text-transform: uppercase; color: #888; border-bottom: 2px solid #ccc; padding: 6px 4px; }
        th.r, td.r { text-align: right; }
        td { padding: 8px 4px; border-bottom: 1px solid #eee; }
        .tot { width: 280px; margin-left: auto; }
        .tot .row { display: flex; justify-content: space-between; padding: 4px 0; }
        .tot .grand { border-top: 2px solid #ccc; margin-top: 4px; padding-top: 8px; font-weight: 700; font-size: 15px; }
        .notes, .bank { margin-top: 18px; }
      </style></head><body>
      <div class="top">
        <div><h1>${esc(from.name) || 'Tax invoice'}</h1>
          ${from.lines.map((l) => esc(l)).join('<br>')}
          ${from.abn ? `<div>ABN ${esc(from.abn)}</div>` : ''}</div>
        <div class="meta"><div class="lbl">Tax invoice</div>
          <div><strong>#${esc(inv.id)}</strong></div>
          <div>Issued ${esc(fmtDate(inv.issued_at))}</div>
          <div>Due ${esc(fmtDate(inv.due_at))}</div></div>
      </div>
      <div><div class="lbl">Bill to</div><strong>${esc(to.company)}</strong><br>
        ${to.contact ? esc(to.contact) + '<br>' : ''}
        ${to.lines.map((l) => esc(l)).join('<br>')}
        ${to.abn ? `<div>ABN ${esc(to.abn)}</div>` : ''}</div>
      <table><thead><tr><th>Description</th><th>Date</th><th class="r">Amount</th></tr></thead>
        <tbody>${rows}</tbody></table>
      <div class="tot">
        <div class="row"><span>Subtotal</span><span>${sym}${money2(inv.subtotal)}</span></div>
        ${inv.discount > 0 ? `<div class="row"><span>Discount</span><span>−${sym}${money2(inv.discount)}</span></div>` : ''}
        <div class="row"><span>GST (${gstPct}%)</span><span>${sym}${money2(inv.gst)}</span></div>
        <div class="row grand"><span>Total</span><span>${sym}${money2(inv.total)}</span></div>
      </div>
      ${inv.notes ? `<div class="notes"><div class="lbl">Notes</div>${esc(inv.notes)}</div>` : ''}
      ${bank}
      </body></html>`;
  }

  // ── Chat rendering ──────────────────────────────
  // On mobile the chat is a slide-over. Push a history entry when it opens so
  // the device back button returns to the list instead of leaving the app.
  function enterChatView() {
    document.body.classList.add('show-chat');
    if (window.matchMedia('(max-width: 720px)').matches &&
        !(history.state && history.state.runnChat)) {
      history.pushState({ runnChat: true }, '');
    }
  }
  function openJob(id) {
    if (state.view === 'billing') { state.view = 'chat'; state.billingSel = null; state.editing = null; document.body.classList.remove('show-billing'); }
    state.currentId = id;
    state.picking = false;
    resetNewJobPicker();
    enterChatView();
    renderList();
    renderChat();
    if (window.matchMedia('(min-width: 721px)').matches) msgInput.focus();
  }
  function startNewJob() {
    state.picking = true;
    state.draftClientId = null;
    state.currentId = null;
    const sel = $('newJobPicker');
    sel.innerHTML = '';
    const ph = document.createElement('option');
    ph.value = ''; ph.textContent = 'New job for…'; ph.disabled = true; ph.selected = true;
    sel.appendChild(ph);
    const personal = document.createElement('option');
    personal.value = '__personal__'; personal.textContent = 'Personal';
    sel.appendChild(personal);
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    for (const c of clients) {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      sel.appendChild(o);
    }
    $('newJobBtn').hidden = true;
    sel.hidden = false;
    renderList();
    renderChat();
    sel.focus();
    try { sel.showPicker(); } catch {}
  }
  function resetNewJobPicker() {
    const sel = $('newJobPicker');
    sel.hidden = true;
    sel.value = '';
    $('newJobBtn').hidden = false;
  }
  function beginDraft(clientId) {
    state.picking = false;
    state.draftClientId = clientId;
    state.currentId = DRAFT;
    resetNewJobPicker();
    enterChatView();
    renderList();
    renderChat();
    msgInput.focus();
  }
  function closeChat(opts) {
    const fromPop = opts === true || (opts && opts.fromPop === true);
    document.body.classList.remove('show-chat');
    state.currentId = null;
    state.picking = false;
    state.draftClientId = null;
    resetNewJobPicker();
    renderList();
    renderChat();
    // Consume the pushed entry unless the browser already did (device back).
    if (!fromPop && history.state && history.state.runnChat) history.back();
  }
  function setComposer(enabled, placeholder) {
    msgInput.disabled = !enabled;
    sendBtn.disabled = !enabled || state.sending;
    msgInput.placeholder = placeholder;
  }

  function renderChat() {
    $('jobMenuBtn').hidden = true;
    timerSync();                 // attach/detach the work timer to the open job
    if (state.picking) {
      $('chatTitle').textContent = 'New job';
      $('chatClient').hidden = true;
      $('chatStatus').hidden = true;
      $('chatHours').textContent = '';
      turnsEl.innerHTML = '<div class="empty">Pick a client to start.</div>';
      setComposer(false, 'Pick a client to begin…');
      return;
    }
    if (state.currentId === DRAFT) {
      $('chatTitle').textContent = 'New job';
      const clEl = $('chatClient');
      clEl.textContent = clientName(state.draftClientId) || 'Personal';
      clEl.className = 'chip client';
      clEl.hidden = false;
      $('chatStatus').hidden = true;
      $('chatHours').textContent = '';
      turnsEl.innerHTML = '<div class="empty">Type your first message to start this job.</div>';
      setComposer(true, 'Message…  (Enter to send)');
      return;
    }
    const j = state.jobs.get(state.currentId);
    if (!j) {
      $('chatTitle').textContent = '';
      $('chatClient').hidden = true;
      $('chatStatus').hidden = true;
      $('chatHours').textContent = '';
      turnsEl.innerHTML = '<div class="empty">Select a job, or start a new one.</div>';
      setComposer(false, 'Select a job, or start a new one.');
      return;
    }
    setComposer(true, 'Message…  (Enter to send)');
    $('chatTitle').textContent = titleOf(j) || 'Untitled job';
    const cn = clientName(j.client_id);
    const clEl = $('chatClient');
    clEl.textContent = cn || 'Personal';
    clEl.className = 'chip client pick';
    clEl.hidden = false;
    const stEl = $('chatStatus');
    stEl.textContent = j.status || 'open';
    stEl.className = 'chip pick st-' + (j.status || 'open');
    stEl.hidden = false;
    $('jobMenuBtn').hidden = false;     // #chatHours is the live timer, owned by renderTimerDisplay

    turnsEl.innerHTML = '';
    const turns = j.turns || [];
    if (!turns.length) {
      turnsEl.innerHTML = '<div class="empty">No messages yet.</div>';
      return;
    }
    let lastDay = null;
    for (const turn of turns) {
      const day = turn.at ? turn.at.slice(0, 10) : null;
      if (turn.session_event || (day && day !== lastDay)) {
        const div = document.createElement('div');
        div.className = 'divider';
        div.textContent = turn.session_event || dayLabel(turn.at);
        turnsEl.appendChild(div);
      }
      lastDay = day;

      const wrap = document.createElement('div');
      wrap.className = 'turn ' + (turn.role === 'user' ? 'user' : 'ai');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = mdToHtml(turn.text);
      wrap.appendChild(bubble);
      turnsEl.appendChild(wrap);
    }
    turnsEl.scrollTop = turnsEl.scrollHeight;
  }

  // ── Data load ───────────────────────────────────
  async function load() {
    try {
      const [jobs, clients, invoices, settings] = await Promise.all([
        fetch('/jobs').then((r) => r.json()),
        fetch('/clients').then((r) => r.json()),
        fetch('/invoices').then((r) => r.json()),
        fetch('/settings').then((r) => r.json()),
      ]);
      for (const c of clients) state.clients.set(c.id, c);
      for (const j of jobs) state.jobs.set(j.id, j);
      for (const inv of invoices) state.invoices.set(inv.id, inv);
      state.settings = settings || {};
      renderFilterOptions();
      renderList();
      renderChat();
    } catch (e) {
      console.error('load failed', e);
    }
  }

  // ── WebSocket live updates ──────────────────────
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onmessage = (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === 'job.added' || m.type === 'job.changed') {
        state.jobs.set(m.job.id, m.job);
        renderList();
        if (m.job.id === state.currentId) renderChat();
        maybeRenderBilling();
      } else if (m.type === 'job.removed') {
        state.jobs.delete(m.job.id);
        if (m.job.id === state.currentId) closeChat();
        renderList();
        maybeRenderBilling();
      } else if (m.type === 'client.added' || m.type === 'client.changed') {
        state.clients.set(m.client.id, m.client);
        renderFilterOptions(); renderList(); renderChat();
        maybeRenderBilling();
      } else if (m.type === 'client.removed') {
        state.clients.delete(m.client.id);
        renderFilterOptions(); renderList(); renderChat();
        maybeRenderBilling();
      } else if (m.type === 'invoice.added' || m.type === 'invoice.changed') {
        state.invoices.set(m.invoice.id, m.invoice);
        maybeRenderBilling();
      } else if (m.type === 'invoice.removed') {
        state.invoices.delete(m.invoice.id);
        if (state.billingSel && state.billingSel.kind === 'invoice' && state.billingSel.id === m.invoice.id) state.billingSel = null;
        maybeRenderBilling();
      }
    };
    ws.onclose = () => setTimeout(connectWS, 1500);
    ws.onerror = () => { try { ws.close(); } catch {} };
  }

  // ── Send a turn (storage only; AI spawn comes later) ──
  async function errMsg(r, url) {
    try { const j = await r.json(); if (j && j.error) return j.error; } catch {}
    return `${url} → ${r.status}`;
  }
  async function postJson(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await errMsg(r, url));
    return r.json();
  }
  async function patchJson(url, body) {
    const r = await fetch(url, {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await errMsg(r, url));
    return r.json();
  }
  async function delJson(url) {
    const r = await fetch(url, { method: 'DELETE' });
    if (!r.ok) throw new Error(await errMsg(r, url));
    return r.json();
  }
  async function sendCurrent() {
    const text = msgInput.value.trim();
    if (!text || state.sending) return;
    state.sending = true; sendBtn.disabled = true;
    msgInput.value = ''; autoGrow();
    try {
      let id = state.currentId;
      if (id === DRAFT) {
        const job = await postJson('/jobs', { client_id: state.draftClientId });
        state.jobs.set(job.id, job);
        id = job.id; state.currentId = job.id;
        state.draftClientId = null;
      }
      const updated = await postJson(`/jobs/${id}/turn`, { role: 'user', text });
      state.jobs.set(updated.id, updated);
      renderList(); renderChat();
    } catch (e) {
      console.error('send failed', e);
      msgInput.value = text;          // restore so nothing is lost
    } finally {
      state.sending = false;
      sendBtn.disabled = msgInput.disabled;
      msgInput.focus();
    }
  }
  function autoGrow() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
  }

  // ── Wiring ──────────────────────────────────────
  $('backBtn').addEventListener('click', () => closeChat());
  $('billingBtn').addEventListener('click', openBilling);
  // Back: a deeper view (open doc) returns to the billing list; the list closes billing.
  $('billingBack').addEventListener('click', () => {
    if (state.billingSel) { state.billingSel = null; state.editing = null; renderBilling(); }
    else closeBilling();
  });
  // Device/browser back button: pop back to the list instead of leaving.
  window.addEventListener('popstate', () => {
    if (document.body.classList.contains('show-billing')) closeBilling({ fromPop: true });
    else if (document.body.classList.contains('show-chat')) closeChat({ fromPop: true });
  });
  $('newJobBtn').addEventListener('click', startNewJob);
  $('newJobPicker').addEventListener('change', (e) => {
    const v = e.target.value;
    if (!v) return;
    beginDraft(v === '__personal__' ? null : v);
  });
  // Logo = hard reset: drop the service worker + its caches, then reload, so a
  // fresh deploy is never masked by a stale cached copy.
  async function hardReset() {
    try {
      if (window.caches) {
        const keys = await caches.keys();
        await Promise.all(keys.map((k) => caches.delete(k)));
      }
      if (navigator.serviceWorker) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map((r) => r.unregister()));
      }
    } catch {}            // best effort — reload regardless
    location.reload();
  }
  $('logoReset').addEventListener('click', hardReset);
  $('chipMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item || !chipMenuJobId) return;
    const id = chipMenuJobId;
    const next = item.dataset.status;
    closeChipMenu();
    setJobStatus(id, next).catch((e) => console.error('status change failed', e));
  });
  $('chatStatus').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    ev.stopPropagation();
    const j = state.jobs.get(state.currentId);
    openChipMenu($('chatStatus'), state.currentId, j ? (j.status || 'open') : 'open');
  });
  $('jobMenuBtn').addEventListener('click', (ev) => {
    ev.stopPropagation();
    if ($('jobMenu').hidden) openJobMenu($('jobMenuBtn')); else closeJobMenu();
  });
  $('chatClient').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    ev.stopPropagation();
    const j = state.jobs.get(state.currentId);
    openClientMenu($('chatClient'), state.currentId, j ? (j.client_id || null) : null);
  });
  $('clientMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item || !clientMenuJobId) return;
    const id = clientMenuJobId;
    const next = item.dataset.client || null;
    closeClientMenu();
    setJobClient(id, next).catch((e) => console.error('client change failed', e));
  });
  $('jobMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item) return;
    const action = item.dataset.action;
    closeJobMenu();
    const run = action === 'archive' ? archiveCurrentJob() : deleteCurrentJob();
    run.catch((e) => { console.error(action + ' failed', e); alert(action + ' failed: ' + e.message); });
  });
  document.addEventListener('click', (ev) => {
    const cm = $('chipMenu');
    if (!cm.hidden && !cm.contains(ev.target)) closeChipMenu();
    const jm = $('jobMenu');
    if (!jm.hidden && !jm.contains(ev.target)) closeJobMenu();
    const clm = $('clientMenu');
    if (!clm.hidden && !clm.contains(ev.target)) closeClientMenu();
  });
  document.addEventListener('keydown', (ev) => {
    if (ev.key !== 'Escape') return;
    if (!$('chipMenu').hidden) { ev.stopPropagation(); closeChipMenu(); }
    if (!$('jobMenu').hidden) { ev.stopPropagation(); closeJobMenu(); }
    if (!$('clientMenu').hidden) { ev.stopPropagation(); closeClientMenu(); }
  });
  $('clientFilter').addEventListener('change', (e) => { state.filterClient = e.target.value; renderList(); });
  $('composer').addEventListener('submit', (e) => { e.preventDefault(); sendCurrent(); });
  msgInput.addEventListener('input', autoGrow);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendCurrent(); }
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

  load();
  connectWS();
})();
</script>
</body>
</html>
