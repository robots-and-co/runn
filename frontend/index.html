<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2f4a6b">
<title>Runn</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<style>
  :root {
    --bg: #f8f5ef;
    --surface: #fffdf9;
    --surface-2: #f1ece2;
    --ink: #2a2622;
    --muted: #8a8278;
    --border: #e6e0d6;
    --brand: #2f4a6b;
    --accent: #b85c1f;
    --user-bubble: #2f4a6b;
    --user-ink: #f8f5ef;
    --ai-bubble: #ffffff;
    --list-w: 340px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .app { display: flex; height: 100dvh; }

  /* ── Left: job list ─────────────────────────────── */
  .list-pane {
    width: var(--list-w);
    min-width: var(--list-w);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }
  .list-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .list-head .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--accent); color: var(--bg);
    display: grid; place-items: center; font-weight: 700;
  }
  .list-head h1 { font-size: 17px; margin: 0; letter-spacing: -0.2px; }
  .job-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .job-row {
    display: flex; flex-direction: column; gap: 4px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .job-row:hover { background: var(--surface-2); }
  .job-row.active { background: var(--surface-2); box-shadow: inset 3px 0 0 var(--accent); }
  .job-row .title {
    font-size: 15px; font-weight: 600; line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .job-row .title.untitled { color: var(--muted); font-weight: 500; font-style: italic; }
  .job-row .meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }

  .list-foot { padding: 12px; border-top: 1px solid var(--border); }
  .btn-newjob {
    width: 100%; padding: 12px; border: 0; border-radius: 10px;
    background: var(--brand); color: var(--bg); font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn-newjob:active { transform: translateY(1px); }

  /* status + client chips */
  .chip {
    display: inline-flex; align-items: center;
    padding: 1px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; line-height: 1.6;
    background: var(--surface-2); color: var(--muted);
    white-space: nowrap;
  }
  .chip.client { background: #e7eef6; color: var(--brand); }
  .chip.st-open     { background:#e8e4db; color:#6b6357; }
  .chip.st-doing    { background:#dcebff; color:#1f5fb0; }
  .chip.st-review   { background:#fff0d6; color:#a9711a; }
  .chip.st-done     { background:#dff2e3; color:#2f7a45; }
  .chip.st-invoiced { background:#e7e2f5; color:#5b48a8; }
  .chip.st-paid     { background:#d7efe0; color:#1f7a55; }
  .chip.st-blocked  { background:#ffe1dc; color:#b23b2a; }
  .chip.st-hold     { background:#ececec; color:#777; }
  /* selectable status chip — click opens the status picker */
  .chip.pick { cursor: pointer; }
  .chip.pick::after { content: '▾'; margin-left: 3px; font-size: 9px; opacity: .55; }

  /* status picker menu (shared, body-level, fixed-positioned at the chip) */
  .chip-menu {
    position: fixed; z-index: 200; min-width: 150px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 4px; display: flex; flex-direction: column; gap: 2px;
  }
  .chip-menu[hidden] { display: none; }
  .chip-menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; background: none; border: 0; border-radius: 6px;
    cursor: pointer; font: inherit; font-size: 13px; color: var(--ink);
    text-align: left; width: 100%;
  }
  .chip-menu-item:hover { background: var(--surface-2); }
  .chip-menu-item.is-current { background: var(--surface-2); font-weight: 600; }
  .chip-menu-item .chip { pointer-events: none; }

  /* left-pane subheader: client filter + running $ total */
  .list-sub {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .client-filter {
    flex: 1; min-width: 0; font: inherit; font-size: 13px; color: var(--ink);
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 8px; -webkit-appearance: none; appearance: none;
  }
  .total { flex-shrink: 0; }
  .total .amt {
    display: inline-flex; align-items: center; gap: 4px;
    height: 32px; padding: 0 12px;
    background: var(--surface); border: 1px solid #dbe3ec; border-radius: 8px;
    color: var(--brand);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .total .amt::before { content: '$'; opacity: .6; }

  /* + Job → client picker */
  .picker { max-width: 520px; margin: 4px auto; }
  .picker-head { font-size: 14px; color: var(--muted); margin: 4px 4px 14px; }
  .choice {
    display: block; width: 100%; text-align: left; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; margin-bottom: 10px; color: var(--ink); font: inherit;
  }
  .choice:hover { background: var(--surface-2); border-color: var(--brand); }
  .choice:active { transform: translateY(1px); }
  .choice .nm { font-size: 15px; font-weight: 600; }
  .choice .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .choice.personal .nm { color: var(--muted); }

  /* ── Right: chat ────────────────────────────────── */
  .chat-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); min-height: 56px;
  }
  .chat-head .back {
    display: none; border: 0; background: none; font-size: 26px;
    color: var(--brand); cursor: pointer; padding: 0 6px 0 0; line-height: 1;
  }
  .chat-head .ttl { font-size: 16px; font-weight: 600; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-head .hours { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .turns { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px; }
  .empty {
    height: 100%; display: grid; place-items: center;
    color: var(--muted); font-size: 15px; text-align: center; padding: 0 32px;
  }

  .turn { display: flex; margin: 0 0 12px; }
  .turn.user { justify-content: flex-end; }
  .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 16px;
    font-size: 15px; line-height: 1.45; word-wrap: break-word; overflow-wrap: anywhere;
  }
  .turn.user .bubble { background: var(--user-bubble); color: var(--user-ink); border-bottom-right-radius: 5px; }
  .turn.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  .bubble :first-child { margin-top: 0; } .bubble :last-child { margin-bottom: 0; }
  .bubble pre { background: #f3efe7; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
  .turn.user .bubble pre { background: rgba(255,255,255,0.15); }
  .bubble code { font-family: ui-monospace, Menlo, monospace; font-size: 0.9em; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 2px; color: var(--muted); font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* composer */
  .composer { display: flex; gap: 8px; align-items: flex-end;
    padding: 10px 12px calc(10px + var(--safe-b)); border-top: 1px solid var(--border); background: var(--surface); }
  .composer textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 14px; font: inherit; font-size: 15px; max-height: 140px;
    background: var(--bg); color: var(--ink);
  }
  .composer textarea:focus { outline: none; border-color: var(--brand); }
  .composer button {
    border: 0; border-radius: 12px; background: var(--accent); color: var(--bg);
    font-size: 15px; font-weight: 600; padding: 0 18px; height: 44px; cursor: pointer;
  }
  .composer button:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── Responsive: collapse to one pane ───────────── */
  @media (max-width: 720px) {
    :root { --list-w: 100%; }
    .list-pane { width: 100%; min-width: 0; border-right: 0; }
    .chat-pane { position: fixed; inset: 0; background: var(--bg);
      transform: translateX(100%); transition: transform 0.22s ease; z-index: 5; }
    body.show-chat .chat-pane { transform: translateX(0); }
    .chat-head .back { display: block; }
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="list-pane">
      <div class="list-head">
        <div class="logo">R</div>
        <h1>Runn</h1>
      </div>
      <div class="list-sub">
        <select class="client-filter" id="clientFilter" aria-label="Filter by client">
          <option value="">All clients</option>
        </select>
        <div class="total">
          <span class="amt" id="valueTotal" title="Outstanding — done work not yet invoiced">0.00</span>
        </div>
      </div>
      <div class="job-list" id="jobList"></div>
      <div class="list-foot">
        <button class="btn-newjob" id="newJobBtn">+ Job</button>
      </div>
    </aside>

    <main class="chat-pane">
      <div class="chat-head">
        <button class="back" id="backBtn" aria-label="Back">‹</button>
        <span class="ttl" id="chatTitle"></span>
        <span class="chip client" id="chatClient" hidden></span>
        <span class="chip" id="chatStatus" hidden></span>
        <span class="hours" id="chatHours"></span>
      </div>
      <div class="turns" id="turns">
        <div class="empty" id="emptyState">Select a job, or start a new one.</div>
      </div>
      <form class="composer" id="composer">
        <textarea id="msgInput" rows="1" placeholder="Select a job, or start a new one." disabled></textarea>
        <button type="submit" id="sendBtn" disabled>Send</button>
      </form>
    </main>
  </div>
  <div class="chip-menu" id="chipMenu" hidden></div>

<script>
'use strict';
(function () {
  const DRAFT = '__draft__';   // a not-yet-persisted new job (created on first send)
  const state = {
    jobs: new Map(),       // id -> job
    clients: new Map(),    // id -> client
    currentId: null,
    sending: false,
    filterClient: '',      // '' = all clients
    picking: false,        // choosing a client for a new job
    draftClientId: null,   // client chosen for the not-yet-saved draft
  };

  const $ = (id) => document.getElementById(id);
  const jobListEl = $('jobList');
  const turnsEl = $('turns');
  const msgInput = $('msgInput');
  const sendBtn = $('sendBtn');

  marked.setOptions({ breaks: true, gfm: true });
  const mdToHtml = (s) => DOMPurify.sanitize(marked.parse(s || ''));

  const clientName = (id) => (id && state.clients.get(id)?.name) || null;
  const clientOf = (id) => (id ? state.clients.get(id) : null);
  function jobValue(j) {
    const c = clientOf(j.client_id);
    if (!c || c.non_billable || !c.rate_per_hour) return 0;
    if (j.status === 'paid') return 0;             // already settled
    return (Number(j.hours) || 0) * Number(c.rate_per_hour);
  }
  const fmtMoney = (n) => '$' + Math.round(n).toLocaleString();
  const titleOf = (j) => j.title || firstUserText(j) || null;
  function firstUserText(j) {
    const t = (j.turns || []).find((x) => x.role === 'user' && x.text);
    return t ? t.text.replace(/\s+/g, ' ').slice(0, 80) : null;
  }
  function fmtTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function dayLabel(iso) {
    return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── List rendering ──────────────────────────────
  function visibleJobs() {
    let jobs = [...state.jobs.values()];
    if (state.filterClient) jobs = jobs.filter((j) => j.client_id === state.filterClient);
    return jobs.sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)));
  }
  function renderTotal(jobs) {
    const total = jobs.reduce((s, j) => s + jobValue(j), 0);
    $('valueTotal').textContent = total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function renderFilterOptions() {
    const sel = $('clientFilter');
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    sel.innerHTML = '<option value="">All clients</option>';
    for (const c of clients) {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      sel.appendChild(o);
    }
    sel.value = state.filterClient;        // preserve, or fall back to All if gone
    state.filterClient = sel.value;
  }
  function renderList() {
    const jobs = visibleJobs();
    renderTotal(jobs);
    jobListEl.innerHTML = '';
    if (!jobs.length) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.style.padding = '40px 24px';
      e.textContent = state.filterClient ? 'No jobs for this client yet.' : 'No jobs yet — hit + Job to start.';
      jobListEl.appendChild(e);
      return;
    }
    for (const j of jobs) {
      const row = document.createElement('div');
      row.className = 'job-row' + (j.id === state.currentId ? ' active' : '');
      row.dataset.id = j.id;

      const ttl = titleOf(j);
      const title = document.createElement('div');
      title.className = 'title' + (ttl ? '' : ' untitled');
      title.textContent = ttl || 'Untitled job';
      row.appendChild(title);

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.appendChild(statusChip(j.status, j.id));
      const cn = clientName(j.client_id);
      if (cn) { const c = document.createElement('span'); c.className = 'chip client'; c.textContent = cn; meta.appendChild(c); }
      const t = document.createElement('span'); t.textContent = fmtTime(j.updated_at); meta.appendChild(t);
      row.appendChild(meta);

      row.addEventListener('click', () => openJob(j.id));
      jobListEl.appendChild(row);
    }
  }

  function statusChip(status, jobId) {
    const c = document.createElement('span');
    const st = status || 'open';
    c.className = 'chip st-' + st + (jobId ? ' pick' : '');
    c.textContent = st;
    if (jobId) {
      c.addEventListener('click', (ev) => {
        ev.stopPropagation();          // don't open the job row
        openChipMenu(c, jobId, st);
      });
    }
    return c;
  }

  // ── Status picker (selectable chip → dropdown) ──
  const STATUS_ORDER = ['open', 'doing', 'review', 'blocked', 'hold', 'done', 'invoiced', 'paid'];
  let chipMenuJobId = null;
  function openChipMenu(anchorEl, jobId, current) {
    const menu = $('chipMenu');
    chipMenuJobId = jobId;
    menu.innerHTML = '';
    for (const st of STATUS_ORDER) {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'chip-menu-item' + (st === current ? ' is-current' : '');
      item.dataset.status = st;
      item.appendChild(statusChip(st));   // static colored chip (no jobId)
      menu.appendChild(item);
    }
    menu.hidden = false;
    const r = anchorEl.getBoundingClientRect();
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    let left = r.left;
    let top = r.bottom + 4;
    if (left + mw > window.innerWidth - 8) left = window.innerWidth - 8 - mw;
    if (top + mh > window.innerHeight - 8) top = r.top - 4 - mh;  // flip above if no room below
    menu.style.left = Math.max(8, left) + 'px';
    menu.style.top = Math.max(8, top) + 'px';
  }
  function closeChipMenu() { $('chipMenu').hidden = true; chipMenuJobId = null; }
  async function setJobStatus(id, status) {
    const j = await patchJson('/jobs/' + id, { status });
    state.jobs.set(j.id, j);
    renderList(); renderChat();
  }

  // ── Chat rendering ──────────────────────────────
  function openJob(id) {
    state.currentId = id;
    document.body.classList.add('show-chat');
    renderList();
    renderChat();
    if (window.matchMedia('(min-width: 721px)').matches) msgInput.focus();
  }
  function startNewJob() {
    state.picking = true;
    state.draftClientId = null;
    state.currentId = null;
    document.body.classList.add('show-chat');
    renderList();
    renderPicker();
  }
  function renderPicker() {
    $('chatTitle').textContent = 'New job';
    $('chatClient').hidden = true;
    $('chatStatus').hidden = true;
    $('chatHours').textContent = '';
    setComposer(false, 'Pick a client to begin…');
    const clients = [...state.clients.values()].sort((a, b) => String(a.name).localeCompare(String(b.name)));
    turnsEl.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'picker';
    const head = document.createElement('div');
    head.className = 'picker-head';
    head.textContent = 'Who is this job for?';
    wrap.appendChild(head);
    wrap.appendChild(choiceEl(null, 'Personal', 'No client — household / personal', true));
    for (const c of clients) {
      wrap.appendChild(choiceEl(c.id, c.name, c.workspace || c.company || '', false));
    }
    turnsEl.appendChild(wrap);
  }
  function choiceEl(id, name, sub, personal) {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'choice' + (personal ? ' personal' : '');
    const n = document.createElement('div'); n.className = 'nm'; n.textContent = name; b.appendChild(n);
    if (sub) { const s = document.createElement('div'); s.className = 'sub'; s.textContent = sub; b.appendChild(s); }
    b.addEventListener('click', () => beginDraft(id));
    return b;
  }
  function beginDraft(clientId) {
    state.picking = false;
    state.draftClientId = clientId;
    state.currentId = DRAFT;
    renderList();
    renderChat();
    msgInput.focus();
  }
  function closeChat() {
    document.body.classList.remove('show-chat');
    state.currentId = null;
    state.picking = false;
    state.draftClientId = null;
    renderList();
    renderChat();
  }
  function setComposer(enabled, placeholder) {
    msgInput.disabled = !enabled;
    sendBtn.disabled = !enabled || state.sending;
    msgInput.placeholder = placeholder;
  }

  function renderChat() {
    if (state.picking) { renderPicker(); return; }
    if (state.currentId === DRAFT) {
      $('chatTitle').textContent = 'New job';
      const clEl = $('chatClient');
      clEl.textContent = clientName(state.draftClientId) || 'Personal';
      clEl.hidden = false;
      $('chatStatus').hidden = true;
      $('chatHours').textContent = '';
      turnsEl.innerHTML = '<div class="empty">Type your first message to start this job.</div>';
      setComposer(true, 'Message…  (Enter to send)');
      return;
    }
    const j = state.jobs.get(state.currentId);
    if (!j) {
      $('chatTitle').textContent = '';
      $('chatClient').hidden = true;
      $('chatStatus').hidden = true;
      $('chatHours').textContent = '';
      turnsEl.innerHTML = '<div class="empty">Select a job, or start a new one.</div>';
      setComposer(false, 'Select a job, or start a new one.');
      return;
    }
    setComposer(true, 'Message…  (Enter to send)');
    $('chatTitle').textContent = titleOf(j) || 'Untitled job';
    const cn = clientName(j.client_id);
    const clEl = $('chatClient');
    if (cn) { clEl.textContent = cn; clEl.hidden = false; } else clEl.hidden = true;
    const stEl = $('chatStatus');
    stEl.textContent = j.status || 'open';
    stEl.className = 'chip pick st-' + (j.status || 'open');
    stEl.hidden = false;
    $('chatHours').textContent = j.hours ? `${j.hours}h` : '';

    turnsEl.innerHTML = '';
    const turns = j.turns || [];
    if (!turns.length) {
      turnsEl.innerHTML = '<div class="empty">No messages yet.</div>';
      return;
    }
    let lastDay = null;
    for (const turn of turns) {
      const day = turn.at ? turn.at.slice(0, 10) : null;
      if (turn.session_event || (day && day !== lastDay)) {
        const div = document.createElement('div');
        div.className = 'divider';
        div.textContent = turn.session_event || dayLabel(turn.at);
        turnsEl.appendChild(div);
      }
      lastDay = day;

      const wrap = document.createElement('div');
      wrap.className = 'turn ' + (turn.role === 'user' ? 'user' : 'ai');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = mdToHtml(turn.text);
      wrap.appendChild(bubble);
      turnsEl.appendChild(wrap);
    }
    turnsEl.scrollTop = turnsEl.scrollHeight;
  }

  // ── Data load ───────────────────────────────────
  async function load() {
    try {
      const [jobs, clients] = await Promise.all([
        fetch('/jobs').then((r) => r.json()),
        fetch('/clients').then((r) => r.json()),
      ]);
      for (const c of clients) state.clients.set(c.id, c);
      for (const j of jobs) state.jobs.set(j.id, j);
      renderFilterOptions();
      renderList();
      renderChat();
    } catch (e) {
      console.error('load failed', e);
    }
  }

  // ── WebSocket live updates ──────────────────────
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onmessage = (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === 'job.added' || m.type === 'job.changed') {
        state.jobs.set(m.job.id, m.job);
        renderList();
        if (m.job.id === state.currentId) renderChat();
      } else if (m.type === 'job.removed') {
        state.jobs.delete(m.job.id);
        if (m.job.id === state.currentId) closeChat();
        renderList();
      } else if (m.type === 'client.added' || m.type === 'client.changed') {
        state.clients.set(m.client.id, m.client);
        renderFilterOptions(); renderList(); renderChat();
      } else if (m.type === 'client.removed') {
        state.clients.delete(m.client.id);
        renderFilterOptions(); renderList(); renderChat();
      }
    };
    ws.onclose = () => setTimeout(connectWS, 1500);
    ws.onerror = () => { try { ws.close(); } catch {} };
  }

  // ── Send a turn (storage only; AI spawn comes later) ──
  async function postJson(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${url} → ${r.status}`);
    return r.json();
  }
  async function patchJson(url, body) {
    const r = await fetch(url, {
      method: 'PATCH',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${url} → ${r.status}`);
    return r.json();
  }
  async function sendCurrent() {
    const text = msgInput.value.trim();
    if (!text || state.sending) return;
    state.sending = true; sendBtn.disabled = true;
    msgInput.value = ''; autoGrow();
    try {
      let id = state.currentId;
      if (id === DRAFT) {
        const job = await postJson('/jobs', { client_id: state.draftClientId });
        state.jobs.set(job.id, job);
        id = job.id; state.currentId = job.id;
        state.draftClientId = null;
      }
      const updated = await postJson(`/jobs/${id}/turn`, { role: 'user', text });
      state.jobs.set(updated.id, updated);
      renderList(); renderChat();
    } catch (e) {
      console.error('send failed', e);
      msgInput.value = text;          // restore so nothing is lost
    } finally {
      state.sending = false;
      sendBtn.disabled = msgInput.disabled;
      msgInput.focus();
    }
  }
  function autoGrow() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
  }

  // ── Wiring ──────────────────────────────────────
  $('backBtn').addEventListener('click', closeChat);
  $('newJobBtn').addEventListener('click', startNewJob);
  $('chipMenu').addEventListener('click', (ev) => {
    const item = ev.target.closest('.chip-menu-item');
    if (!item || !chipMenuJobId) return;
    const id = chipMenuJobId;
    const next = item.dataset.status;
    closeChipMenu();
    setJobStatus(id, next).catch((e) => console.error('status change failed', e));
  });
  $('chatStatus').addEventListener('click', (ev) => {
    if (!state.currentId || state.currentId === DRAFT) return;
    ev.stopPropagation();
    const j = state.jobs.get(state.currentId);
    openChipMenu($('chatStatus'), state.currentId, j ? (j.status || 'open') : 'open');
  });
  document.addEventListener('click', (ev) => {
    const menu = $('chipMenu');
    if (menu.hidden || menu.contains(ev.target)) return;
    closeChipMenu();
  });
  document.addEventListener('keydown', (ev) => {
    if (ev.key === 'Escape' && !$('chipMenu').hidden) { ev.stopPropagation(); closeChipMenu(); }
  });
  $('clientFilter').addEventListener('change', (e) => { state.filterClient = e.target.value; renderList(); });
  $('composer').addEventListener('submit', (e) => { e.preventDefault(); sendCurrent(); });
  msgInput.addEventListener('input', autoGrow);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendCurrent(); }
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

  load();
  connectWS();
})();
</script>
</body>
</html>
